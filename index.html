/* ============================================================================
   15. MODUL: POŠILJKE (F5) — mock BEX adapter
   ============================================================================ */
const posStanje = {status:'', od:'', do:'', pretraga:'', redovi:[], kraj:false};

const SHIPMENT_PRELAZI = {
  u_pripremi:   [],
  najavljena:   ['preuzeta'],
  preuzeta:     ['u_transportu', 'isporucena'],
  u_transportu: ['isporucena', 'neuspela'],
  neuspela:     ['u_transportu', 'vracena'],
  isporucena:   [],
  vracena:      []
};

function renderPosiljke(el, ruta){
  if (!Store.firmaId()) { el.innerHTML = praznoIzaberiFirmu(); return; }
  const statusi = pod('statusi', PODRAZUMEVANI_STATUSI).shipment || PODRAZUMEVANI_STATUSI.shipment;
  const f = posStanje;

  el.innerHTML = `
    <div class="sadrzaj-zaglavlje"><h1>Pošiljke</h1>
      <p class="podnaslov">BEX adapter radi u mock režimu dok se ne poveže courier-proxy (modul Integracije).</p></div>
    <div class="filter-traka">
      <div class="polje"><label>Status</label>
        <select class="unos" id="ps-status"><option value="">Svi</option>
          ${Object.keys(statusi).map(k => `<option value="${k}" ${f.status === k ? 'selected' : ''}>${esc(statusi[k].naziv)}</option>`).join('')}</select></div>
      <div class="polje"><label>Od</label><input class="unos" type="date" id="ps-od" value="${escAttr(f.od)}"></div>
      <div class="polje"><label>Do</label><input class="unos" type="date" id="ps-do" value="${escAttr(f.do)}"></div>
      <div class="polje" style="flex:1;min-width:170px"><label>Tracking broj</label>
        <input class="unos" id="ps-pretraga" placeholder="npr. BX2607…" value="${escAttr(f.pretraga)}"></div>
      <button class="dugme" id="ps-primeni">Primeni</button>
    </div>
    ${infoTraka('info','Pošiljka se kreira iz detalja porudžbine (dugme „Kreiraj pošiljku“).')}
    <div id="ps-lista">${ucitavanjeHTML()}</div>
    <div class="centar mt"><button class="dugme" id="ps-jos" style="display:none">Učitaj još</button></div>`;

  el.querySelector('#ps-primeni').addEventListener('click', () => {
    Object.assign(f, {
      status: el.querySelector('#ps-status').value,
      od: el.querySelector('#ps-od').value,
      do: el.querySelector('#ps-do').value,
      pretraga: el.querySelector('#ps-pretraga').value.trim(),
      redovi: [], kraj: false
    });
    ucitajPosiljke();
  });
  el.querySelector('#ps-jos').addEventListener('click', () => ucitajPosiljke(true));

  f.redovi = []; f.kraj = false;
  ucitajPosiljke().then(() => {
    if (ruta.pod === 'detalj' && ruta.id) otvoriPosiljkaDetalj(ruta.id);
  });
}

async function ucitajPosiljke(dodaj = false){
  const lista = document.getElementById('ps-lista');
  const jos = document.getElementById('ps-jos');
  if (!lista) return;
  if (!dodaj) lista.innerHTML = ucitavanjeHTML();
  const f = posStanje;

  let upit = sb.from('shipments').select('*')
    .eq('company_id', Store.firmaId())
    .order('created_at', {ascending: false})
    .range(f.redovi.length, f.redovi.length + 24);
  if (f.status) upit = upit.eq('status', f.status);
  if (f.od) upit = upit.gte('created_at', f.od + 'T00:00:00');
  if (f.do) upit = upit.lte('created_at', f.do + 'T23:59:59');
  if (f.pretraga) upit = upit.ilike('tracking_broj', `%${f.pretraga}%`);
  const {data, error} = await upit;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  f.redovi = f.redovi.concat(data || []);
  f.kraj = !data || data.length < 25;

  // brojevi porudžbina za prikaz
  const oids = [...new Set(f.redovi.map(p => p.order_id).filter(Boolean))];
  const oMapa = {};
  if (oids.length) {
    const {data: ord} = await sb.from('orders').select('id,broj,kupac_ime').in('id', oids);
    (ord || []).forEach(o => oMapa[o.id] = o);
  }

  lista.innerHTML = tabelaHTML([
    {naziv:'Tracking', cel: p => `<b class="mono">${esc(p.tracking_broj || '— u pripremi —')}</b>`},
    {naziv:'Porudžbina', cel: p => {
      const o = oMapa[p.order_id];
      return o ? `<span class="mono">${esc(o.broj)}</span><div style="font-size:12px;color:var(--tekst-3)">${esc(o.kupac_ime || '')}</div>` : '—';
    }},
    {naziv:'Status', cel: p => plombaStatusa('shipment', p.status)},
    {naziv:'Otkupnina', klasa:'desno', cel: p => fmtNovac(p.otkupni_iznos)},
    {naziv:'Paketa', klasa:'desno', cel: p => fmtBroj(p.broj_paketa, 0)},
    {naziv:'Kreirana', cel: p => fmtDatum(p.created_at)},
    {naziv:'', klasa:'akcije', cel: p => `<button class="dugme malo" data-pd="${escAttr(p.id)}">Otvori</button>`}
  ], f.redovi, 'Nema pošiljki za izabrane filtere.');
  if (jos) jos.style.display = f.kraj ? 'none' : '';
  lista.querySelectorAll('[data-pd]').forEach(b =>
    b.addEventListener('click', () => otvoriPosiljkaDetalj(b.dataset.pd)));
}

/* ---------- kreiranje pošiljke (poziva se iz detalja porudžbine) ---------- */
async function kreirajPosiljku(order, poUspehu){
  const {data: nalozi} = await sb.from('courier_accounts').select('*')
    .eq('company_id', Store.firmaId()).eq('aktivan', true).order('created_at');
  if (!nalozi || !nalozi.length) {
    toast('Nema aktivnog kurirskog naloga — dodajte ga u Administracija → Kurirski nalozi.', 'greska', 7000);
    return;
  }
  // procena težine iz kataloga
  let tezina = 0;
  const {data: stavke} = await sb.from('order_items').select('variant_id,kolicina').eq('order_id', order.id);
  const vids = (stavke || []).map(s => s.variant_id).filter(Boolean);
  if (vids.length) {
    const {data: varijante} = await sb.from('product_variants').select('id,product_id').in('id', vids);
    const pids = [...new Set((varijante || []).map(v => v.product_id))];
    const {data: proizvodi} = pids.length ? await sb.from('products').select('id,tezina_kg').in('id', pids) : {data: []};
    const pT = {}; (proizvodi || []).forEach(p => pT[p.id] = Number(p.tezina_kg || 0));
    const vP = {}; (varijante || []).forEach(v => vP[v.id] = v.product_id);
    (stavke || []).forEach(s => { if (s.variant_id) tezina += (pT[vP[s.variant_id]] || 0) * Number(s.kolicina); });
  }
  const prviCfg = (nalozi[0].config && nalozi[0].config.podrazumevano) || {};

  modal({
    naslov: `Nova pošiljka · ${order.broj}`,
    telo: `
      <form id="kp-forma">
        ${poljeSelectHTML({naziv:'Kurirski nalog', ime:'courier_account_id',
          opcije: nalozi.map(n => ({v: n.id, t: `${n.naziv} (${(n.config && n.config.mode) === 'live' ? 'live' : 'mock'})`}))})}
        <div class="red-polja">
          ${poljeHTML({naziv:'Otkupni iznos (RSD)', ime:'otkupni_iznos',
            vrednost: fmtBroj(order.nacin_placanja === 'pouzece' ? order.iznos_ukupno : 0), atributi:'inputmode="decimal"',
            napomena: order.nacin_placanja === 'pouzece' ? 'Pouzeće — predlog je pun iznos porudžbine.' : 'Porudžbina nije pouzeće.'})}
          ${poljeHTML({naziv:'Broj paketa', ime:'broj_paketa', tip:'number',
            vrednost: prviCfg.broj_paketa ?? 1, atributi:'min="1"'})}
          ${poljeHTML({naziv:'Težina (kg)', ime:'tezina_kg', vrednost: tezina ? fmtBroj(tezina, 3) : '', atributi:'inputmode="decimal"',
            napomena: tezina ? 'Procena iz kataloga.' : ''})}
        </div>
        ${poljeHTML({naziv:'Sadržaj (za najavu)', ime:'sadrzaj', vrednost: prviCfg.sadrzaj || 'Roba iz e-prodavnice'})}
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Kreiraj pošiljku', klasa:'primarno', klik: async (r, b) => {
        const d = podaciForme(r.telo.querySelector('#kp-forma'));
        b.disabled = true;
        const {data: p, error} = await sb.from('shipments').insert({
          company_id: Store.firmaId(), order_id: order.id,
          courier_account_id: d.courier_account_id,
          otkupni_iznos: Math.max(0, parsirajBroj(d.otkupni_iznos)),
          broj_paketa: Math.max(1, parseInt(d.broj_paketa, 10) || 1),
          tezina_kg: d.tezina_kg === '' ? null : parsirajBroj(d.tezina_kg),
          najava_payload: {sadrzaj: d.sadrzaj || 'Roba iz e-prodavnice'}
        }).select().single();
        b.disabled = false;
        if (error) { toast(porukaGreske(error), 'greska', 7000); return; }
        r.zatvori();
        toast('Pošiljka je kreirana (u pripremi).', 'uspeh');
        if (order.status === 'potvrdjena') {
          if (await potvrdi('Označiti porudžbinu kao spakovanu?', {tekstDa:'Da, spakovana'})) {
            await sb.from('orders').update({status: 'spakovana'}).eq('id', order.id);
          }
        }
        if (poUspehu) poUspehu();
        otvoriPosiljkaDetalj(p.id);
      }}
    ]
  });
}

/* ---------- detalj pošiljke ---------- */
async function otvoriPosiljkaDetalj(pid){
  const [{data: p, error}, ] = await Promise.all([
    sb.from('shipments').select('*').eq('id', pid).maybeSingle()
  ]);
  if (error || !p) { toast('Pošiljka nije pronađena.', 'greska'); return; }
  const [{data: o}, {data: log}, {data: nalog}] = await Promise.all([
    p.order_id ? sb.from('orders').select('*').eq('id', p.order_id).maybeSingle() : Promise.resolve({data: null}),
    sb.from('shipment_status_log').select('*').eq('shipment_id', pid).order('dogodjeno_at', {ascending: false}),
    p.courier_account_id ? sb.from('courier_accounts').select('naziv,config').eq('id', p.courier_account_id).maybeSingle() : Promise.resolve({data: null})
  ]);
  const mozeO = Store.mozeDaPise('admin', 'operater');
  const prelazi = mozeO ? (SHIPMENT_PRELAZI[p.status] || []) : [];

  const m = modal({
    naslov: `Pošiljka ${p.tracking_broj ? '· ' + p.tracking_broj : ''}`,
    sirok: true,
    telo: `
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
        ${plombaStatusa('shipment', p.status)}
        ${nalog ? `<span class="cip ${(nalog.config && nalog.config.mode) === 'live' ? 'live' : 'mock'}">${esc(nalog.naziv)} · ${(nalog.config && nalog.config.mode) === 'live' ? 'live' : 'mock'}</span>` : ''}
      </div>
      <div class="dva-stupca">
        <dl class="kv">
          <dt>Porudžbina</dt><dd>${o ? `<a href="#/porudzbine/detalj/${escAttr(o.id)}" class="mono" id="pd-order-link">${esc(o.broj)}</a>` : '—'}</dd>
          <dt>Primalac</dt><dd>${esc(o ? o.kupac_ime : '—')}</dd>
          <dt>Adresa</dt><dd>${esc(o ? [o.kupac_adresa, o.kupac_postanski_broj, o.kupac_mesto].filter(Boolean).join(', ') || '—' : '—')}</dd>
          <dt>Telefon</dt><dd>${esc(o && o.kupac_telefon || '—')}</dd>
        </dl>
        <dl class="kv">
          <dt>Otkupnina</dt><dd><b>${fmtNovac(p.otkupni_iznos)}</b></dd>
          <dt>Paketa</dt><dd>${fmtBroj(p.broj_paketa, 0)}</dd>
          <dt>Težina</dt><dd>${p.tezina_kg ? fmtBroj(p.tezina_kg, 3) + ' kg' : '—'}</dd>
          <dt>Kreirana</dt><dd>${fmtDatumVreme(p.created_at)}</dd>
        </dl>
      </div>
      <div class="traka-akcije" style="margin:14px 0" id="pd-akcije">
        ${p.status === 'u_pripremi' && mozeO ? `
          <button class="dugme primarno" id="pd-najavi">${ikona('kamion',15)} Najavi pošiljku (mock)</button>
          <button class="dugme opasno" id="pd-obrisi">Obriši</button>` : ''}
        ${prelazi.map(s => `<button class="dugme malo" data-sim="${s}">Simuliraj: ${esc(statusInfo('shipment', s).naziv)}</button>`).join('')}
        ${p.tracking_broj ? `<button class="dugme" id="pd-adresnica">${ikona('dokument',15)} Adresnica (PDF)</button>` : ''}
        ${p.adresnica_path ? `<button class="dugme tiho" id="pd-preuzmi">Preuzmi sačuvanu</button>` : ''}
      </div>
      <h3 style="font-size:14px;margin-bottom:8px">Istorija statusa</h3>
      <div style="max-height:220px;overflow:auto">
        ${(log && log.length) ? log.map(l => `
          <div style="padding:7px 0;border-bottom:1px dashed var(--linija);font-size:13px">
            ${l.status_mapiran ? plombaStatusa('shipment', l.status_mapiran) : ''}
            ${l.kurirski_kod ? `<span class="kod-tag" style="margin-left:6px">${esc(l.kurirski_kod)}</span>` : ''}
            ${l.opis ? `<span style="margin-left:6px">${esc(l.opis)}</span>` : ''}
            <div style="color:var(--tekst-3);font-size:11.5px;margin-top:2px">${fmtDatumVreme(l.dogodjeno_at || l.created_at)}</div>
          </div>`).join('') : '<p style="color:var(--tekst-3);font-size:13px">Nema zapisa.</p>'}
      </div>`,
    akcije: [{tekst:'Zatvori', klasa:'primarno', klik: r => r.zatvori()}],
    poZatvaranju: () => {
      if (trenutnaRuta().modul === 'posiljke' && trenutnaRuta().pod === 'detalj')
        history.replaceState(null, '', '#/posiljke');
    }
  });

  const link = m.telo.querySelector('#pd-order-link');
  if (link) link.addEventListener('click', e => { e.preventDefault(); m.zatvori(); idiNaDetalj('porudzbine', o.id); });

  const osvezi = () => { m.zatvori(); otvoriPosiljkaDetalj(pid); };

  const bNajavi = m.telo.querySelector('#pd-najavi');
  if (bNajavi) bNajavi.addEventListener('click', async () => {
    bNajavi.disabled = true;
    const d = new Date();
    const yymmdd = String(d.getFullYear()).slice(2) + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
    const tracking = 'BX' + yymmdd + String(Math.floor(1000 + Math.random() * 9000));
    const payload = {
      ...(p.najava_payload || {}),
      primalac: o ? o.kupac_ime : '', telefon: o ? o.kupac_telefon : '',
      adresa: o ? [o.kupac_adresa, o.kupac_postanski_broj, o.kupac_mesto].filter(Boolean).join(', ') : '',
      otkupnina: Number(p.otkupni_iznos), broj_paketa: p.broj_paketa
    };
    const {error: ge} = await sb.from('shipments').update({
      tracking_broj: tracking, status: 'najavljena',
      najava_payload: payload,
      najava_response: {mock: true, tracking, ts: new Date().toISOString()}
    }).eq('id', pid);
    bNajavi.disabled = false;
    if (ge) { toast(porukaGreske(ge), 'greska', 7000); return; }
    toast(`Pošiljka je najavljena · ${tracking}`, 'uspeh');
    if (o && ['potvrdjena', 'spakovana'].includes(o.status) && Store.mozeDaPise('admin', 'operater')) {
      m.zatvori();
      if (await potvrdi('Označiti porudžbinu kao poslatu (razduženje zaliha)?', {tekstDa:'Da, poslata'})) {
        const {data: st} = await sb.from('order_items').select('*').eq('order_id', o.id);
        promeniStatusPorudzbine(o, st || [], 'poslata', () => otvoriPosiljkaDetalj(pid));
        return;
      }
      otvoriPosiljkaDetalj(pid);
      return;
    }
    osvezi();
  });

  const bObrisi = m.telo.querySelector('#pd-obrisi');
  if (bObrisi) bObrisi.addEventListener('click', async () => {
    if (!await potvrdi('Obrisati pošiljku u pripremi?', {tekstDa:'Obriši', opasno:true})) return;
    const {error: ge} = await sb.from('shipments').delete().eq('id', pid);
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    toast('Pošiljka je obrisana.', 'uspeh');
    m.zatvori();
    posStanje.redovi = []; ucitajPosiljke();
  });

  m.telo.querySelectorAll('[data-sim]').forEach(b => b.addEventListener('click', async () => {
    const novi = b.dataset.sim;
    b.disabled = true;
    const {error: ge} = await sb.from('shipments').update({status: novi}).eq('id', pid);
    b.disabled = false;
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    toast(`Status pošiljke: ${statusInfo('shipment', novi).naziv}.`, 'uspeh');
    if (o && novi === 'isporucena' && o.status === 'poslata' && Store.mozeDaPise('admin', 'operater')) {
      if (await potvrdi('Označiti i porudžbinu kao isporučenu?', {tekstDa:'Da'})) {
        await sb.from('orders').update({status: 'isporucena'}).eq('id', o.id);
      }
    }
    if (o && novi === 'vracena' && ['poslata', 'isporucena'].includes(o.status) && Store.mozeDaPise('admin', 'operater')) {
      if (await potvrdi('Označiti porudžbinu kao vraćenu? Fizički prijem robe evidentirajte kroz modul Povrati.', {tekstDa:'Da'})) {
        await sb.from('orders').update({status: 'vracena'}).eq('id', o.id);
      }
    }
    osvezi();
  }));

  const bAdr = m.telo.querySelector('#pd-adresnica');
  if (bAdr) bAdr.addEventListener('click', () => generisiAdresnicu(p, o, osvezi));
  const bPre = m.telo.querySelector('#pd-preuzmi');
  if (bPre) bPre.addEventListener('click', async () => {
    try { await preuzmiFajl('adresnice', p.adresnica_path, `adresnica_${p.tracking_broj}.pdf`); }
    catch (e) { toast(porukaGreske(e), 'greska'); }
  });
}

/* ---------- adresnica PDF ---------- */
async function generisiAdresnicu(p, o, poUspehu){
  const doc = noviPDF();
  if (!doc) return;
  const f = Store.st.firma || {};
  const T = s => bezDijakritika(s || '');

  doc.setLineWidth(0.7);
  doc.rect(12, 12, 186, 130);
  doc.setFontSize(10); doc.setFont(undefined, 'bold');
  doc.text('BEX EXPRESS — ADRESNICA', 16, 21);
  doc.setFont(undefined, 'normal'); doc.setFontSize(8); doc.setTextColor(110);
  doc.text(T(`Kreirana kroz BEXCOM · ${fmtDatum(new Date())}`), 16, 26);
  doc.setTextColor(0);
  doc.line(12, 30, 198, 30);

  doc.setFontSize(8); doc.setTextColor(110);
  doc.text('POSILJALAC', 16, 37);
  doc.setTextColor(0); doc.setFontSize(10);
  doc.text(T(f.naziv || ''), 16, 43);
  doc.setFontSize(9);
  doc.text(T([f.adresa, f.mesto].filter(Boolean).join(', ')), 16, 48.5);
  doc.text(T(f.telefon ? 'Tel: ' + f.telefon : ''), 16, 53.5);

  doc.setFontSize(8); doc.setTextColor(110);
  doc.text('PRIMALAC', 110, 37);
  doc.setTextColor(0); doc.setFontSize(12); doc.setFont(undefined, 'bold');
  doc.text(T(o ? o.kupac_ime : ''), 110, 44);
  doc.setFont(undefined, 'normal'); doc.setFontSize(10);
  doc.text(T(o ? (o.kupac_adresa || '') : ''), 110, 50);
  doc.text(T(o ? [o.kupac_postanski_broj, o.kupac_mesto].filter(Boolean).join(' ') : ''), 110, 55.5);
  doc.text(T(o && o.kupac_telefon ? 'Tel: ' + o.kupac_telefon : ''), 110, 61);

  doc.line(12, 68, 198, 68);
  // pseudo-barkod
  let x = 16;
  const kod = p.tracking_broj || 'BX0000000000';
  for (let i = 0; i < kod.length; i++) {
    const c = kod.charCodeAt(i);
    const w = 0.6 + (c % 4) * 0.5;
    doc.setFillColor(0);
    doc.rect(x, 74, w, 18, 'F');
    x += w + 1.1;
  }
  doc.setFontSize(16); doc.setFont(undefined, 'bold');
  doc.text(T(kod), 16, 100);
  doc.setFont(undefined, 'normal');

  doc.setFontSize(10);
  doc.text(T(`Otkupnina: ${fmtNovac(p.otkupni_iznos)}`), 110, 80);
  doc.text(T(`Broj paketa: ${fmtBroj(p.broj_paketa, 0)}`), 110, 87);
  if (p.tezina_kg) doc.text(T(`Tezina: ${fmtBroj(p.tezina_kg, 3)} kg`), 110, 94);
  const sadrzaj = p.najava_payload && p.najava_payload.sadrzaj;
  if (sadrzaj) doc.text(T(`Sadrzaj: ${sadrzaj}`), 110, 101);
  if (o) doc.text(T(`Porudzbina: ${o.broj}`), 110, 108);

  doc.setFontSize(7.5); doc.setTextColor(110);
  doc.text('Napomena: slova bez dijakritika zbog ugradjenog PDF fonta.', 16, 138);
  doc.setTextColor(0);

  const ime = `adresnica_${kod}.pdf`;
  doc.save(ime);
  try {
    const blob = doc.output('blob');
    const putanja = `${Store.firmaId()}/${p.id}.pdf`;
    await otpremiFajl('adresnice', putanja, blob, 'application/pdf');
    await sb.from('shipments').update({adresnica_path: putanja}).eq('id', p.id);
    toast('Adresnica je preuzeta i sačuvana u Storage.', 'uspeh');
    if (poUspehu) poUspehu();
  } catch (e) {
    toast('Adresnica je preuzeta lokalno; Storage čuvanje nije prošlo: ' + porukaGreske(e), 'greska', 7000);
  }
}

/* ---------- uvoz + sravnjenje ---------- */
function uvozSpecifikacije(){
  let redoviFajla = []; // array-of-arrays
  const m = modal({
    naslov: 'Uvoz specifikacije isplate',
    sirok: true,
    telo: `
      <form id="uv-forma">
        <div class="red-polja">
          ${poljeHTML({naziv:'Broj specifikacije', ime:'broj_specifikacije', obavezno:true, placeholder:'npr. BEX-2026-1234'})}
          ${poljeHTML({naziv:'Datum isplate', ime:'datum', tip:'date', vrednost:danasISO(), obavezno:true})}
        </div>
        <div class="polje">
          <label>Fajl specifikacije (CSV ili Excel)</label>
          <input class="unos" type="file" id="uv-fajl" accept=".csv,.xlsx,.xls,.txt">
          <div class="napomena">…ili nalepite redove ispod (jedan red = jedna pošiljka).</div>
        </div>
        <div class="polje">
          <label>Nalepljeni podaci</label>
          <textarea class="unos" id="uv-paste" rows="5" placeholder="BX2607011234;4990,00&#10;BX2607015678;12.350,00"></textarea>
        </div>
        <label class="red-cekbox"><input type="checkbox" name="zaglavlje" id="uv-zaglavlje"><span>Prvi red je zaglavlje (preskoči ga)</span></label>
        <div class="red-polja" id="uv-mapiranje" style="display:none">
          ${poljeSelectHTML({naziv:'Kolona sa tracking brojem', ime:'kol_tracking', opcije:[]})}
          ${poljeSelectHTML({naziv:'Kolona sa iznosom', ime:'kol_iznos', opcije:[]})}
        </div>
        <div id="uv-pregled"></div>
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Uvezi i sravni', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#uv-forma');
        const d = podaciForme(forma);
        if (!d.broj_specifikacije) { toast('Broj specifikacije je obavezan.', 'greska'); return; }
        if (!redoviFajla.length) { toast('Učitajte fajl ili nalepite podatke.', 'greska'); return; }
        const kt = parseInt(d.kol_tracking, 10), ki = parseInt(d.kol_iznos, 10);
        let redovi = redoviFajla.map(r0 => ({
          tracking: String(r0[kt] ?? '').trim(),
          iznos: parsirajBroj(r0[ki])
        })).filter(x => x.tracking);
        if (forma.querySelector('#uv-zaglavlje').checked) redovi = redovi.slice(1);
        if (!redovi.length) { toast('Nema upotrebljivih redova.', 'greska'); return; }

        b.disabled = true; b.textContent = 'Sravnjenje…';
        try {
          const fid = Store.firmaId();
          const trackinzi = [...new Set(redovi.map(x => x.tracking))];
          // pošiljke po tracking brojevima (u komadima)
          const sMapa = {};
          for (let i = 0; i < trackinzi.length; i += 150) {
            const {data: ships, error} = await sb.from('shipments')
              .select('id,tracking_broj,otkupni_iznos,status')
              .eq('company_id', fid).in('tracking_broj', trackinzi.slice(i, i + 150));
            if (error) throw error;
            (ships || []).forEach(s => sMapa[s.tracking_broj] = s);
          }
          // već sravnjene (ok) stavke iz ranijih specifikacija
          const vecOK = new Set();
          for (let i = 0; i < trackinzi.length; i += 150) {
            const {data: st} = await sb.from('cod_payout_items')
              .select('tracking_broj').eq('company_id', fid)
              .eq('status_sravnjenja', 'ok').in('tracking_broj', trackinzi.slice(i, i + 150));
            (st || []).forEach(x => vecOK.add(x.tracking_broj));
          }
          const videno = new Set();
          const stavke = redovi.map(x => {
            let status;
            const ship = sMapa[x.tracking];
            if (videno.has(x.tracking) || vecOK.has(x.tracking)) status = 'duplikat';
            else if (!ship) status = 'nema_posiljke';
            else if (Math.abs(x.iznos - Number(ship.otkupni_iznos)) < 0.005) status = 'ok';
            else status = 'razlika_iznosa';
            videno.add(x.tracking);
            return {tracking_broj: x.tracking, iznos: x.iznos,
                    shipment_id: ship ? ship.id : null, status_sravnjenja: status};
          });
          const sveOK = stavke.every(s => s.status_sravnjenja === 'ok');
          const {data: payout, error: pe} = await sb.from('cod_payouts').insert({
            company_id: fid, broj_specifikacije: d.broj_specifikacije, datum: d.datum,
            iznos_ukupno: stavke.reduce((a, s) => a + s.iznos, 0),
            status: sveOK ? 'sravnjena' : 'sa_razlikama'
          }).select().single();
          if (pe) throw pe;
          for (let i = 0; i < stavke.length; i += 400) {
            const {error: ie} = await sb.from('cod_payout_items')
              .insert(stavke.slice(i, i + 400).map(s => ({company_id: fid, payout_id: payout.id, ...s})));
            if (ie) throw ie;
          }
          r.zatvori();
          const nesravnjeno = stavke.filter(s => s.status_sravnjenja !== 'ok').length;
          toast(sveOK ? `Specifikacija je uvezena — svih ${stavke.length} stavki je sravnjeno.`
                      : `Uvezeno ${stavke.length} stavki, ${nesravnjeno} sa razlikama.`, sveOK ? 'uspeh' : 'greska', 7000);
          location.hash = '#/otkupnine/specifikacija/' + payout.id;
        } catch (e) {
          toast(porukaGreske(e), 'greska', 8000);
        } finally {
          b.disabled = false; b.textContent = 'Uvezi i sravni';
        }
      }}
    ]
  });

  const prikaziMapiranje = () => {
    if (!redoviFajla.length) return;
    const brojKolona = Math.max(...redoviFajla.slice(0, 5).map(r => r.length));
    const prvi = redoviFajla[0] || [];
    const opcije = Array.from({length: brojKolona}, (_, i) =>
      `<option value="${i}">Kolona ${i + 1} — „${esc(String(prvi[i] ?? '').slice(0, 22))}“</option>`).join('');
    const omot = m.telo.querySelector('#uv-mapiranje');
    omot.style.display = '';
    const selT = omot.querySelector('[name=kol_tracking]');
    const selI = omot.querySelector('[name=kol_iznos]');
    selT.innerHTML = opcije; selI.innerHTML = opcije;
    // heuristika: tracking = prva kolona sa slovima+ciframa, iznos = prva čisto numerička
    let it = 0, ii = Math.min(1, brojKolona - 1);
    for (let i = 0; i < brojKolona; i++) {
      const v = String(prvi[i] ?? '');
      if (/[A-Za-z]/.test(v) && /\d/.test(v)) { it = i; break; }
    }
    for (let i = 0; i < brojKolona; i++) {
      if (i !== it && parsirajBroj(prvi[i]) > 0) { ii = i; break; }
    }
    selT.value = String(it); selI.value = String(ii);
    m.telo.querySelector('#uv-pregled').innerHTML =
      `<div class="napomena" style="margin-bottom:6px">Pregled prvih ${Math.min(5, redoviFajla.length)} redova (ukupno ${redoviFajla.length}):</div>
       <pre class="json-pregled" style="max-height:130px">${esc(redoviFajla.slice(0, 5).map(r => r.join(' | ')).join('\n'))}</pre>`;
  };

  m.telo.querySelector('#uv-fajl').addEventListener('change', async e => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      if (/\.(xlsx|xls)$/i.test(f.name)) {
        if (typeof XLSX === 'undefined') { toast('Excel biblioteka nije učitana.', 'greska'); return; }
        const wb = XLSX.read(await f.arrayBuffer());
        const ws = wb.Sheets[wb.SheetNames[0]];
        redoviFajla = XLSX.utils.sheet_to_json(ws, {header: 1, raw: false, defval: ''})
          .filter(r => r.some(c => String(c).trim()));
      } else {
        const tekst = await f.text();
        redoviFajla = tekst.split(/\r?\n/).map(l => l.trim()).filter(Boolean)
          .map(l => l.split(l.includes(';') ? ';' : l.includes('\t') ? '\t' : ','));
      }
      prikaziMapiranje();
    } catch (err) { toast('Fajl nije pročitan: ' + porukaGreske(err), 'greska'); }
  });
  m.telo.querySelector('#uv-paste').addEventListener('input', debounce(e => {
    const t = e.target.value.trim();
    if (!t) return;
    redoviFajla = t.split(/\r?\n/).map(l => l.trim()).filter(Boolean)
      .map(l => l.split(l.includes(';') ? ';' : l.includes('\t') ? '\t' : ','));
    prikaziMapiranje();
  }, 400));
}

/* ---------- detalj specifikacije ---------- */
async function renderPayoutDetalj(el, sid){
  el.innerHTML = ucitavanjeHTML('Učitavanje specifikacije…');
  const mozeF = Store.mozeDaPise('admin', 'finansije');
  const [{data: p, error}, {data: stavke}] = await Promise.all([
    sb.from('cod_payouts').select('*').eq('id', sid).maybeSingle(),
    sb.from('cod_payout_items').select('*').eq('payout_id', sid).order('created_at')
  ]);
  if (error || !p) {
    el.innerHTML = `<div class="prazno"><h3>Specifikacija nije pronađena</h3>
      <button class="dugme" onclick="idiNa('otkupnine')">Nazad</button></div>`;
    return;
  }
  // otkupni iznosi pošiljki radi prikaza razlike
  const sids = [...new Set((stavke || []).map(s => s.shipment_id).filter(Boolean))];
  const shipMapa = {};
  for (let i = 0; i < sids.length; i += 150) {
    const {data: sh} = await sb.from('shipments').select('id,otkupni_iznos,order_id').in('id', sids.slice(i, i + 150));
    (sh || []).forEach(s => shipMapa[s.id] = s);
  }
  const PAYOUT_STATUS = {uvezena:{t:'Uvezena', b:'#0b6ba8'}, sravnjena:{t:'Sravnjena', b:'#16803c'}, sa_razlikama:{t:'Sa razlikama', b:'#b45309'}};
  const ps = PAYOUT_STATUS[p.status] || {t: p.status, b:'#64748b'};
  const okZbir = (stavke || []).filter(s => s.status_sravnjenja === 'ok').reduce((a, s) => a + Number(s.iznos), 0);
  const brojPoStatusu = {};
  (stavke || []).forEach(s => brojPoStatusu[s.status_sravnjenja] = (brojPoStatusu[s.status_sravnjenja] || 0) + 1);

  el.innerHTML = `
    <div class="detalj-zaglavlje">
      <button class="dugme tiho malo" onclick="idiNa('otkupnine')">← Specifikacije</button>
      <h1 class="mono">${esc(p.broj_specifikacije)}</h1>
      ${plomba(ps.t, ps.b)}
      ${mozeF ? `<div class="traka-akcije">
        <button class="dugme" id="py-priliv">${ikona('novcanik',15)} Knjiži priliv (${fmtNovac(okZbir)})</button>
      </div>` : ''}
    </div>
    <div class="mreza-kartica">
      <div class="kartica"><h3>Pregled</h3>
        <dl class="kv mt">
          <dt>Datum isplate</dt><dd>${fmtDatum(p.datum)}</dd>
          <dt>Ukupan iznos</dt><dd><b>${fmtNovac(p.iznos_ukupno)}</b></dd>
          <dt>Stavki</dt><dd>${fmtBroj((stavke || []).length, 0)}</dd>
          <dt>Sravnjeno (OK)</dt><dd class="pozitivno"><b>${fmtNovac(okZbir)}</b> · ${fmtBroj(brojPoStatusu.ok || 0, 0)} stavki</dd>
        </dl>
      </div>
      <div class="kartica"><h3>Sravnjenje po statusu</h3>
        <div class="mt" style="display:flex;flex-direction:column;gap:8px">
          ${Object.entries(SRAVNJENJE).map(([k, v]) =>
            `<div style="display:flex;justify-content:space-between;align-items:center">
              ${plomba(v.t, v.b)}<b>${fmtBroj(brojPoStatusu[k] || 0, 0)}</b></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="kartica">
      <div class="kartica-zaglavlje"><h3>Stavke</h3>
        <div class="polje" style="margin:0"><select class="unos" id="py-filter">
          <option value="">Sve stavke</option>
          ${Object.entries(SRAVNJENJE).map(([k, v]) => `<option value="${k}">${esc(v.t)}</option>`).join('')}
        </select></div></div>
      <div id="py-stavke"></div>
    </div>`;

  const nacrtaj = (filter) => {
    const lista = filter ? (stavke || []).filter(s => s.status_sravnjenja === filter) : (stavke || []);
    document.getElementById('py-stavke').innerHTML = tabelaHTML([
      {naziv:'Tracking', cel: s => `<span class="mono">${esc(s.tracking_broj)}</span>`},
      {naziv:'Isplaćeno', klasa:'desno', cel: s => fmtNovac(s.iznos)},
      {naziv:'Očekivano', klasa:'desno', cel: s => {
        const sh = shipMapa[s.shipment_id];
        return sh ? fmtNovac(sh.otkupni_iznos) : '—';
      }},
      {naziv:'Razlika', klasa:'desno', cel: s => {
        const sh = shipMapa[s.shipment_id];
        if (!sh) return '—';
        const r = Number(s.iznos) - Number(sh.otkupni_iznos);
        return Math.abs(r) < 0.005 ? '0' : `<b class="${r < 0 ? 'negativno' : 'pozitivno'}">${fmtNovac(r)}</b>`;
      }},
      {naziv:'Sravnjenje', cel: s => { const x = SRAVNJENJE[s.status_sravnjenja]; return plomba(x.t, x.b); }},
      {naziv:'', klasa:'akcije', cel: s => (mozeF && s.status_sravnjenja !== 'ok')
        ? `<button class="dugme tiho malo" data-rk="${escAttr(s.id)}">Reklamacija</button>` : ''}
    ], lista, 'Nema stavki za izabrani filter.');
    document.querySelectorAll('[data-rk]').forEach(b => b.addEventListener('click', () => {
      const s = (stavke || []).find(x => x.id === b.dataset.rk);
      const sh = shipMapa[s.shipment_id];
      const razlika = sh ? Number(sh.otkupni_iznos) - Number(s.iznos) : Number(s.iznos);
      novaReklamacija({
        shipment_id: s.shipment_id, payout_item_id: s.id,
        tip: s.status_sravnjenja === 'razlika_iznosa' ? 'manjak' : 'ostalo',
        iznos_razlike: Math.abs(razlika),
        napomena: `Specifikacija ${p.broj_specifikacije} · ${s.tracking_broj}`
      });
    }));
  };
  nacrtaj('');
  document.getElementById('py-filter').addEventListener('change', e => nacrtaj(e.target.value));

  const bp = document.getElementById('py-priliv');
  if (bp) bp.addEventListener('click', async () => {
    if (!await potvrdi(`Knjižiti priliv od ${fmtNovac(okZbir)} u tok novca (kategorija Otkupnina)?`, {tekstDa:'Knjiži'})) return;
    const {error: ge} = await sb.from('cashflow_items').insert({
      company_id: Store.firmaId(), tip: 'priliv', kategorija: 'otkupnina',
      opis: `Specifikacija ${p.broj_specifikacije}`, ocekivani_datum: p.datum,
      iznos: okZbir, status: 'realizovano', ref_tip: 'cod_payout', ref_id: p.id});
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    toast('Priliv je proknjižen u tok novca.', 'uspeh');
  });
}

/* ---------- neisplaćene ---------- */
async function tabNeisplacene(el){
  const mozeF = Store.mozeDaPise('admin', 'finansije');
  el.innerHTML = `
    ${infoTraka('info','Isporučene pošiljke sa otkupninom za koje još nije stigla OK stavka ni u jednoj specifikaciji.')}
    <div id="ne-lista">${ucitavanjeHTML()}</div>`;
  const {data, error} = await sb.from('v_cod_neisplacene').select('*')
    .eq('company_id', Store.firmaId()).order('isporucena_at', {ascending: true}).limit(300);
  const lista = document.getElementById('ne-lista');
  if (!lista) return;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  const zbir = (data || []).reduce((a, r) => a + Number(r.otkupni_iznos), 0);
  lista.innerHTML = `
    <div class="zbir-red" style="justify-content:flex-start">Ukupno čeka isplatu: <b class="negativno">${fmtNovac(zbir)}</b> · ${fmtBroj((data || []).length, 0)} pošiljki</div>
    ${tabelaHTML([
      {naziv:'Tracking', cel: r => `<span class="mono">${esc(r.tracking_broj)}</span>`},
      {naziv:'Porudžbina', cel: r => `<span class="mono">${esc(r.porudzbina || '—')}</span>`},
      {naziv:'Kupac', cel: r => esc(r.kupac_ime || '—')},
      {naziv:'Isporučena', cel: r => fmtDatum(r.isporucena_at)},
      {naziv:'Otkupnina', klasa:'desno', cel: r => `<b>${fmtNovac(r.otkupni_iznos)}</b>`},
      {naziv:'', klasa:'akcije', cel: r => mozeF
        ? `<button class="dugme tiho malo" data-nr="${escAttr(r.shipment_id)}" data-iznos="${escAttr(r.otkupni_iznos)}" data-tr="${escAttr(r.tracking_broj)}">Reklamacija</button>` : ''}
    ], data || [], 'Sve isporučene otkupnine su isplaćene. 🙂')}`;
  lista.querySelectorAll('[data-nr]').forEach(b => b.addEventListener('click', () =>
    novaReklamacija({shipment_id: b.dataset.nr, tip: 'nije_isplaceno',
      iznos_razlike: Number(b.dataset.iznos), napomena: `Tracking ${b.dataset.tr} — nije na specifikaciji`})));
}

  const f = codStanje.reklamacije;
  el.innerHTML = `
    <div class="filter-traka">
      <div class="polje"><label>Status</label>
        <select class="unos" id="rk-status"><option value="">Svi</option>
          ${Object.entries(REKLAMACIJA_STATUS).map(([k, v]) => `<option value="${k}" ${f.status === k ? 'selected' : ''}>${esc(v.t)}</option>`).join('')}</select></div>
      ${mozeF ? `<button class="dugme primarno" id="rk-nova">${ikona('plus',16)} Nova reklamacija</button>` : ''}
    </div>
    <div id="rk-lista">${ucitavanjeHTML()}</div>`;
  el.querySelector('#rk-status').addEventListener('change', e => { f.status = e.target.value; tabReklamacije(el); });
  if (mozeF) el.querySelector('#rk-nova').addEventListener('click', () => novaReklamacija({}, () => tabReklamacije(el)));

  let upit = sb.from('cod_claims').select('*')
    .eq('company_id', Store.firmaId()).order('created_at', {ascending: false}).limit(100);
  if (f.status) upit = upit.eq('status', f.status);
  const {data, error} = await upit;
  const lista = document.getElementById('rk-lista');
  if (!lista) return;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  lista.innerHTML = tabelaHTML([
    {naziv:'Otvorena', cel: r => fmtDatum(r.created_at)},
    {naziv:'Tip', cel: r => esc(REKLAMACIJA_TIP[r.tip] || r.tip)},
    {naziv:'Iznos razlike', klasa:'desno', cel: r => `<b>${fmtNovac(r.iznos_razlike)}</b>`},
    {naziv:'Status', cel: r => { const x = REKLAMACIJA_STATUS[r.status]; return plomba(x.t, x.b); }},
    {naziv:'Napomena', cel: r => esc(r.napomena || '—')},
    {naziv:'', klasa:'akcije', cel: r => mozeF
      ? `<button class="dugme tiho malo" data-ru="${escAttr(r.id)}">${ikona('olovka',15)}</button>` : ''}
  ], data || [], 'Nema reklamacija.');
  lista.querySelectorAll('[data-ru]').forEach(b => b.addEventListener('click', () =>
    urediReklamaciju((data || []).find(x => x.id === b.dataset.ru), () => tabReklamacije(el))));
}

const POVRAT_STATUS = {najavljen:{t:'Najavljen', b:'#b45309'}, primljen:{t:'Primljen', b:'#0b6ba8'}, obradjen:{t:'Obrađen', b:'#16803c'}};

function renderPovrati(el, ruta){
  if (!Store.firmaId()) { el.innerHTML = praznoIzaberiFirmu(); return; }
  if (ruta.pod === 'detalj' && ruta.id) { renderPovratDetalj(el, ruta.id); return; }

  const tabovi = [{id:'lista', naziv:'Povrati'}, {id:'razlozi', naziv:'Razlozi povrata'}];
  const aktivan = tabovi.some(t => t.id === ruta.pod) ? ruta.pod : 'lista';
  el.innerHTML = `
    <div class="sadrzaj-zaglavlje"><h1>Povrati</h1></div>
    <div class="tabovi">${tabovi.map(t =>
      `<button class="tab ${t.id === aktivan ? 'aktivan' : ''}" data-tab="${t.id}">${esc(t.naziv)}</button>`).join('')}</div>
    <div id="pov-sadrzaj"></div>`;
  el.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => idiNa('povrati', b.dataset.tab)));
  const cilj = document.getElementById('pov-sadrzaj');
  ({lista: tabPovratiLista, razlozi: tabRazlozi}[aktivan])(cilj);
}

async function tabPovratiLista(el){
  const mozeP = Store.mozeDaPise('admin', 'operater', 'magacioner');
  el.innerHTML = `
    <div class="kartica-zaglavlje">
      <div><h3>Povrati pošiljki</h3>
        <div class="podnaslov" style="margin:0">Tok: najavljen → primljen → obrađen (ispravna roba se vraća na zalihe).</div></div>
      ${mozeP ? `<button class="dugme primarno" id="pv-novi">${ikona('plus',16)} Novi povrat</button>` : ''}
    </div>
    <div id="pv-lista">${ucitavanjeHTML()}</div>`;
  if (mozeP) el.querySelector('#pv-novi').addEventListener('click', () => noviPovrat(null, () => tabPovratiLista(el)));

  const {data, error} = await sb.from('returns').select('*')
    .eq('company_id', Store.firmaId()).order('created_at', {ascending: false}).limit(60);
  const lista = document.getElementById('pv-lista');
  if (!lista) return;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }

    (ords || []).forEach(o => oMapa[o.id] = o);
  }
  lista.innerHTML = tabelaHTML([
    {naziv:'Otvoren', cel: r => fmtDatum(r.created_at)},
    {naziv:'Porudžbina', cel: r => {
      const o = oMapa[r.order_id];
      return o ? `<span class="mono">${esc(o.broj)}</span><div style="font-size:12px;color:var(--tekst-3)">${esc(o.kupac_ime || '')}</div>` : '—';
    }},
    {naziv:'Status', cel: r => { const s = POVRAT_STATUS[r.status]; return plomba(s.t, s.b); }},
    {naziv:'Trošak povrata', klasa:'desno', cel: r => fmtNovac(r.trosak_povrata)},
    {naziv:'Napomena', cel: r => esc(r.napomena || '—')},
    {naziv:'', klasa:'akcije', cel: r => `<button class="dugme malo" data-pv="${escAttr(r.id)}">Otvori</button>`}
  ], data || [], 'Nema povrata.');
  lista.querySelectorAll('[data-pv]').forEach(b =>
    b.addEventListener('click', () => { location.hash = '#/povrati/detalj/' + b.dataset.pv; }));
}

/* ---------- novi povrat (poziva se i iz detalja porudžbine) ---------- */
async function noviPovrat(order, poUspehu){
  const otvoriFormu = async (o) => {
    const [{data: stavke}, {data: razlozi}, {data: posiljke}] = await Promise.all([
      sb.from('order_items').select('*').eq('order_id', o.id).order('created_at'),
      sb.from('return_reasons').select('*').eq('company_id', Store.firmaId()).eq('aktivan', true).order('naziv'),
      sb.from('shipments').select('id,tracking_broj,status').eq('order_id', o.id).order('created_at', {ascending: false})
    ]);
    if (!stavke || !stavke.length) { toast('Porudžbina nema stavki.', 'greska'); return; }

    modal({
      naslov: `Novi povrat · ${o.broj}`,
      sirok: true,
      telo: `
        <form id="pn-forma">
          <div class="red-polja">
            ${poljeSelectHTML({naziv:'Razlog povrata', ime:'reason_id',
              opcije: [{v:'', t:'— bez razloga —'}, ...(razlozi || []).map(x => ({v:x.id, t:x.naziv}))]})}
            ${poljeSelectHTML({naziv:'Pošiljka', ime:'shipment_id',
              opcije: [{v:'', t:'— bez pošiljke —'}, ...(posiljke || []).map(x => ({v:x.id, t:(x.tracking_broj || 'bez broja') + ' · ' + statusInfo('shipment', x.status).naziv}))]})}
            ${poljeHTML({naziv:'Trošak povrata (RSD)', ime:'trosak_povrata', vrednost:'0', atributi:'inputmode="decimal"'})}
          </div>
          ${poljeHTML({naziv:'Napomena', ime:'napomena'})}
          <h3 style="font-size:14px;margin:10px 0 8px">Stavke koje se vraćaju</h3>
          <div class="omot-tabele"><table class="tabela"><thead><tr>
            <th style="width:36px"></th><th>Artikal</th><th class="desno">Poručeno</th><th class="desno kol-uska">Vraća se</th>
          </tr></thead><tbody>
            ${stavke.map((s, i) => `<tr>
              <td><input type="checkbox" data-cek="${i}" checked></td>
              <td>${esc(s.naziv_snapshot)}${!s.variant_id ? ' <span class="cip">slobodna</span>' : ''}</td>
              <td class="desno">${fmtBroj(s.kolicina, 0)}</td>
              <td class="desno"><input class="unos" style="text-align:right" data-kol="${i}" value="${escAttr(fmtBroj(s.kolicina, 0))}" inputmode="decimal"></td>
            </tr>`).join('')}
          </tbody></table></div>
        </form>`,
      akcije: [
        {tekst:'Odustani', klik: r => r.zatvori()},
        {tekst:'Najavi povrat', klasa:'primarno', klik: async (r, b) => {
          const forma = r.telo.querySelector('#pn-forma');
          const d = podaciForme(forma);
          const izabrane = [];
          stavke.forEach((s, i) => {
            if (!forma.querySelector(`[data-cek="${i}"]`).checked) return;
            const kol = Math.min(Number(s.kolicina), Math.max(0, parsirajBroj(forma.querySelector(`[data-kol="${i}"]`).value)));
            if (kol > 0) izabrane.push({order_item_id: s.id, kolicina: kol});
          });
          if (!izabrane.length) { toast('Izaberite bar jednu stavku.', 'greska'); return; }
          b.disabled = true;
          const {data: pv, error} = await sb.from('returns').insert({
            company_id: Store.firmaId(), order_id: o.id,
            shipment_id: d.shipment_id || null, reason_id: d.reason_id || null,
            trosak_povrata: parsirajBroj(d.trosak_povrata), napomena: d.napomena || null
          }).select().single();
          if (error) { b.disabled = false; toast(porukaGreske(error), 'greska'); return; }
          const {error: ie} = await sb.from('return_items').insert(izabrane.map(x => ({
            company_id: Store.firmaId(), return_id: pv.id, ...x})));
          b.disabled = false;
          if (ie) { toast('Povrat je otvoren, ali stavke nisu upisane: ' + porukaGreske(ie), 'greska', 8000); }
          r.zatvori();
          toast('Povrat je najavljen.', 'uspeh');
          location.hash = '#/povrati/detalj/' + pv.id;
          if (poUspehu) poUspehu();
        }}
      ]
    });
  };

  if (order) { otvoriFormu(order); return; }
  // izbor porudžbine
  const m = modal({
    naslov: 'Novi povrat — izbor porudžbine',
    telo: `
      <div class="polje"><input class="unos" id="pb-pretraga" placeholder="Broj porudžbine ili ime kupca… (min. 2 znaka)" autocomplete="off"></div>
      <div id="pb-rezultati"><div class="prazno"><p>Ukucajte broj porudžbine.</p></div></div>`,
    akcije: [{tekst:'Zatvori', klik: r => r.zatvori()}]
  });
  const rez = m.telo.querySelector('#pb-rezultati');
  m.telo.querySelector('#pb-pretraga').addEventListener('input', debounce(async e => {
    const q = e.target.value.trim();
    if (q.length < 2) return;
    rez.innerHTML = ucitavanjeHTML('Pretraga…');
    const like = `%${q}%`;
    const {data} = await sb.from('orders').select('id,broj,kupac_ime,status,iznos_ukupno,created_at')
      .eq('company_id', Store.firmaId())
      .or(`broj.ilike.${like},kupac_ime.ilike.${like}`)
      .order('created_at', {ascending: false}).limit(8);
    rez.innerHTML = (data || []).map(o => `
      <div class="rezultat-stavka" data-oid="${escAttr(o.id)}">
        <div><b class="mono">${esc(o.broj)}</b><div style="font-size:12px;color:var(--tekst-3)">${esc(o.kupac_ime || '')} · ${fmtDatum(o.created_at)}</div></div>
        <div style="display:flex;gap:8px;align-items:center">${plombaStatusa('order', o.status)}<b>${fmtNovac(o.iznos_ukupno)}</b></div>
      </div>`).join('') || '<div class="prazno"><p>Nema porudžbina.</p></div>';
    rez.querySelectorAll('[data-oid]').forEach(x => x.addEventListener('click', () => {
      const o = data.find(y => y.id === x.dataset.oid);
      m.zatvori(); otvoriFormu(o);
    }));
  }, 320));
}

/* ---------- detalj povrata ---------- */
async function renderPovratDetalj(el, rid){
  el.innerHTML = ucitavanjeHTML('Učitavanje povrata…');
  const mozeP = Store.mozeDaPise('admin', 'operater', 'magacioner');
  const [{data: pv, error}, {data: stavke}, magacini, {data: razlozi}] = await Promise.all([
    sb.from('returns').select('*').eq('id', rid).maybeSingle(),
    sb.from('return_items').select('*').eq('return_id', rid).order('id'),
    aktivniMagacini(),
    sb.from('return_reasons').select('id,naziv').eq('company_id', Store.firmaId())
  ]);
  if (error || !pv) {
    el.innerHTML = `<div class="prazno"><h3>Povrat nije pronađen</h3>
      <button class="dugme" onclick="idiNa('povrati')">Nazad</button></div>`;
    return;
  }
  const [{data: o}, {data: orderItems}] = await Promise.all([
    sb.from('orders').select('id,broj,kupac_ime').eq('id', pv.order_id).maybeSingle(),
    sb.from('order_items').select('id,naziv_snapshot,variant_id,kolicina').eq('order_id', pv.order_id)
  ]);
  const oiMapa = {}; (orderItems || []).forEach(x => oiMapa[x.id] = x);
  const rMapa = {}; (razlozi || []).forEach(x => rMapa[x.id] = x.naziv);
  const mMapa = {}; magacini.forEach(x => mMapa[x.id] = x.naziv);
  const s0 = POVRAT_STATUS[pv.status];

  el.innerHTML = `
    <div class="detalj-zaglavlje">
      <button class="dugme tiho malo" onclick="idiNa('povrati')">← Povrati</button>
      <h1>Povrat · <span class="mono">${esc(o ? o.broj : '')}</span></h1>
      ${plomba(s0.t, s0.b)}
      ${mozeP ? `<div class="traka-akcije">
        ${pv.status === 'najavljen' ? `<button class="dugme primarno" id="rv-primi">${ikona('kvacica',15)} Označi kao primljen</button>` : ''}
        ${pv.status === 'primljen' ? `<button class="dugme primarno" id="rv-obradi">${ikona('povrat',15)} Obradi povrat</button>` : ''}
      </div>` : ''}
    </div>
    <div class="mreza-kartica">
      <div class="kartica"><h3>Podaci</h3>
        <dl class="kv mt">
          <dt>Porudžbina</dt><dd><a href="#/porudzbine/detalj/${escAttr(pv.order_id)}" class="mono">${esc(o ? o.broj : '')}</a> · ${esc(o ? o.kupac_ime || '' : '')}</dd>
          <dt>Razlog</dt><dd>${esc(rMapa[pv.reason_id] || '—')}</dd>
          <dt>Trošak povrata</dt><dd>${fmtNovac(pv.trosak_povrata)}</dd>
          <dt>Otvoren</dt><dd>${fmtDatumVreme(pv.created_at)}</dd>
          ${pv.napomena ? `<dt>Napomena</dt><dd>${esc(pv.napomena)}</dd>` : ''}
        </dl>
      </div>
      <div class="kartica"><h3>Kako radi obrada?</h3>
        <p class="mt" style="font-size:13px;color:var(--tekst-2)">Pri obradi za svaku stavku birate stanje: <b>ispravna</b> roba se knjiži kao promet „povrat“ u izabrani magacin i vraća na zalihe; <b>oštećena</b> se samo evidentira.</p>
      </div>
    </div>
    <div class="kartica"><h3>Stavke povrata</h3><div id="rv-stavke" class="mt"></div></div>`;

  document.getElementById('rv-stavke').innerHTML = tabelaHTML([
    {naziv:'Artikal', cel: s => esc((oiMapa[s.order_item_id] || {}).naziv_snapshot || '—')},
    {naziv:'Količina', klasa:'desno', cel: s => fmtBroj(s.kolicina, 0)},
    {naziv:'Stanje', cel: s => s.stanje === 'ispravna' ? plomba('Ispravna','#16803c') : plomba('Oštećena','#c0262b')},
    {naziv:'Na zalihe', cel: s => s.vracena_na_zalihe
      ? `${ikona('kvacica',14)} ${esc(mMapa[s.warehouse_id] || '')}` : '—'}
  ], stavke || [], 'Povrat nema stavki.');

  const bPrimi = document.getElementById('rv-primi');
  if (bPrimi) bPrimi.addEventListener('click', async () => {

    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    toast('Povrat je označen kao primljen.', 'uspeh');
    renderPovratDetalj(el, rid);

  const bObradi = document.getElementById('rv-obradi');

    if (!magacini.length) { toast('Nema aktivnog magacina za vraćanje robe.', 'greska'); return; }
    modal({
      naslov: 'Obrada povrata',
      sirok: true,
      telo: `

          </tr></thead><tbody>

  lista.querySelectorAll('[data-fe]').forEach(b => b.addEventListener('click', () =>
    urediFakturu((data || []).find(x => x.id === b.dataset.fe), () => tabFakture(el))));
  lista.querySelectorAll('[data-fu]').forEach(b => b.addEventListener('click', () => {
    const fa = (data || []).find(x => x.id === b.dataset.fu);
    const ostatak = Number(fa.iznos) - Number(fa.placeno);
    modal({
      naslov: `Uplata · ${fa.broj}`,
      telo: `<form id="up-forma">${poljeHTML({naziv:'Iznos uplate (RSD)', ime:'iznos',
        vrednost: fmtBroj(ostatak), atributi:'inputmode="decimal"',
        napomena: `Preostalo: ${fmtNovac(ostatak)}`})}</form>`,
      akcije: [
        {tekst:'Odustani', klik: r => r.zatvori()},
        {tekst:'Evidentiraj uplatu', klasa:'primarno', klik: async (r, b2) => {
          const d = podaciForme(r.telo.querySelector('#up-forma'));
          const novoPlaceno = Number(fa.placeno) + parsirajBroj(d.iznos);
          b2.disabled = true;
          const {error: ge} = await sb.from('supplier_invoices').update({
            placeno: novoPlaceno, status: statusFakture(fa.iznos, novoPlaceno)}).eq('id', fa.id);
          b2.disabled = false;
          if (ge) { toast(porukaGreske(ge), 'greska'); return; }
          r.zatvori(); toast('Uplata je evidentirana.', 'uspeh');
          tabFakture(el);
        }}
      ]
    });
  }));
}

function statusFakture(iznos, placeno){
  const i = Number(iznos), p = Number(placeno);
  return p <= 0 ? 'neplaceno' : p < i - 0.005 ? 'delimicno' : 'placeno';
}

      {naziv:'Status', cel: r => { const x = CF_STATUS[r.status]; return plomba(x.t, x.b); }},
      {naziv:'', klasa:'akcije', cel: r => mozeF ? `

const Grafikoni = {};
function crtajGrafikon(id, config){
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (Grafikoni[id]) { try { Grafikoni[id].destroy(); } catch (e) {} }
  Grafikoni[id] = new Chart(canvas.getContext('2d'), config);
}

      </div>
    </div>

      <div class="kartica-zaglavlje"><h3>Poslednje porudžbine</h3>

  const prihodDanas = danasnje.reduce((a, o) => a + Number(o.iznos_ukupno), 0);

      ${nov ? '<div class="napomena">Ako šablon za ovaj kanal + događaj već postoji, biće prepisan.</div>' : ''}
    </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Sačuvaj šablon', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#sb-forma');
        const d = podaciForme(forma);
        b.disabled = true;
        const {error} = await sb.from('notification_templates').upsert({
          company_id: Store.firmaId(), kanal: d.kanal, dogadjaj: d.dogadjaj,
          naslov: d.naslov || '', telo: d.telo || '',

        const d = podaciForme(forma);
        if (!d.provajder) { toast('Naziv provajdera je obavezan.', 'greska'); return; }

async function generisiIzvestaj(tip, format, dugme){
  const fid = Store.firmaId();
  const f = izvStanje;
  if (dugme) dugme.disabled = true;
  try {
    let naslov = '', zaglavlje = [], redovi = [];
    if (tip === 'prodaja') {
      naslov = `Prodaja ${fmtDatum(f.od)} — ${fmtDatum(f.do)}`;
      const {data, error} = await sb.from('orders').select('broj,created_at,kupac_ime,status,nacin_placanja,iznos_ukupno')
        .eq('company_id', fid)
        .gte('created_at', f.od + 'T00:00:00').lte('created_at', f.do + 'T23:59:59')
        .order('created_at').limit(2000);
      if (error) throw error;
      zaglavlje = ['Broj', 'Datum', 'Kupac', 'Status', 'Placanje', 'Iznos'];
      redovi = (data || []).map(o => [o.broj, fmtDatum(o.created_at), o.kupac_ime || '',
        statusInfo('order', o.status).naziv, NACIN_PLACANJA[o.nacin_placanja] || o.nacin_placanja, fmtBroj(o.iznos_ukupno)]);
      redovi.push(['', '', '', '', 'UKUPNO', fmtBroj((data || []).reduce((a, o) => a + Number(o.iznos_ukupno), 0))]);
    } else if (tip === 'marza') {
      naslov = 'Marža po proizvodu';
      const {data, error} = await sb.from('v_marza_po_proizvodu').select('*')
        .eq('company_id', fid).order('marza', {ascending: false}).limit(1000);
      if (error) throw error;
      zaglavlje = ['Proizvod', 'Porudzbina', 'Prodato', 'Prihod', 'COGS', 'Marza'];
      redovi = (data || []).map(r => [r.proizvod, fmtBroj(r.broj_porudzbina, 0), fmtBroj(r.prodata_kolicina, 0),
        fmtBroj(r.prihod), fmtBroj(r.cogs), fmtBroj(r.marza)]);
    } else if (tip === 'pnl') {
      naslov = 'P&L — mesečni rezultat';
      const {data, error} = await sb.from('v_pnl_mesecno').select('*')
        .eq('company_id', fid).order('mesec', {ascending: false}).limit(24);
      if (error) throw error;
      zaglavlje = ['Mesec', 'Prihod', 'COGS', 'Troskovi', 'Rezultat'];
      redovi = (data || []).map(r => [String(r.mesec).slice(0, 7), fmtBroj(r.prihod), fmtBroj(r.cogs),
        fmtBroj(r.troskovi), fmtBroj(r.rezultat)]);
    } else if (tip === 'zalihe') {
      naslov = 'Zalihe — trenutno stanje';
      const [{data, error}, magacini] = await Promise.all([
        sb.from('stock').select('*').eq('company_id', fid).limit(1000),
        aktivniMagacini()
      ]);
      if (error) throw error;
      const mapa = await nazivVarijantiMapa((data || []).map(r => r.variant_id));
      const mMapa = {}; magacini.forEach(m => mMapa[m.id] = m.naziv);
      zaglavlje = ['Artikal', 'SKU', 'Magacin', 'Kolicina', 'Rezervisano', 'Dostupno'];
      redovi = (data || []).map(r => [(mapa[r.variant_id] || {}).naziv || '', (mapa[r.variant_id] || {}).sku || '',
        mMapa[r.warehouse_id] || '', fmtBroj(r.kolicina, 0), fmtBroj(r.rezervisano, 0), fmtBroj(r.dostupno, 0)]);
    } else if (tip === 'cod') {
      naslov = 'Neisplaćene otkupnine';
      const {data, error} = await sb.from('v_cod_neisplacene').select('*')
        .eq('company_id', fid).order('isporucena_at').limit(1000);
      if (error) throw error;
      zaglavlje = ['Tracking', 'Porudzbina', 'Kupac', 'Isporucena', 'Otkupnina'];
      redovi = (data || []).map(r => [r.tracking_broj, r.porudzbina || '', r.kupac_ime || '',
        fmtDatum(r.isporucena_at), fmtBroj(r.otkupni_iznos)]);
      redovi.push(['', '', '', 'UKUPNO', fmtBroj((data || []).reduce((a, r) => a + Number(r.otkupni_iznos), 0))]);
    }
    if (!redovi.length) { toast('Nema podataka za izveštaj.', 'greska'); return; }

    const imeFajla = `bexcom_${tip}_${danasISO()}`;
    if (format === 'xlsx') {
      izveziXLSX(imeFajla + '.xlsx', [{naziv: naslov.slice(0, 31), zaglavlje, redovi}]);
    } else {
      const doc = noviPDF();
      if (!doc) return;
      pdfTabela(doc, naslov, zaglavlje, redovi);
      doc.save(imeFajla + '.pdf');
    }
    toast('Izveštaj je preuzet.', 'uspeh');
  } catch (e) {
    toast(porukaGreske(e), 'greska', 7000);
  } finally {
    if (dugme) dugme.disabled = false;
  }
}

async function sha256hex(tekst){
  if (!(window.crypto && crypto.subtle)) return null;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(tekst));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

function noviApiKljuc(poUspehu){
  if (!(window.crypto && crypto.subtle)) {
    toast('Generisanje ključa zahteva bezbedan kontekst (https ili localhost).', 'greska', 7000);
    return;
  }
  modal({
    naslov: 'Novi API ključ',
    telo: `<form id="ak-forma">
      ${poljeHTML({naziv:'Naziv', ime:'naziv', obavezno:true, placeholder:'npr. WooCommerce sinhronizacija'})}
      <div class="polje"><label>Dozvole (scopes)</label>
        ${API_SCOPES.map(s => `<label class="red-cekbox" style="margin-bottom:4px">
          <input type="checkbox" name="scope_${s.replace(':', '_')}" ${s.endsWith(':read') ? 'checked' : ''}><span class="mono" style="font-size:13px">${esc(s)}</span>
        </label>`).join('')}
      </div>
    </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Generiši ključ', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#ak-forma');
        const d = podaciForme(forma);
        if (!d.naziv) { toast('Naziv je obavezan.', 'greska'); return; }
        const scopes = API_SCOPES.filter(s => forma.querySelector(`[name=scope_${s.replace(':', '_')}]`).checked);
        b.disabled = true;
        const bajtovi = new Uint8Array(24);
        crypto.getRandomValues(bajtovi);
        const plain = 'bxk_' + [...bajtovi].map(x => x.toString(16).padStart(2, '0')).join('');
        const hash = await sha256hex(plain);
        const {error} = await sb.from('api_keys').insert({
          company_id: Store.firmaId(), naziv: d.naziv, key_hash: hash, scopes});
        b.disabled = false;
        if (error) { toast(porukaGreske(error), 'greska'); return; }
        r.zatvori();
        modal({
          naslov: 'API ključ je kreiran',
          telo: `
            ${infoTraka('upozorenje','Ključ se prikazuje SAMO SADA — sačuvajte ga odmah. U bazi ostaje samo heš.')}
            <div class="polje" style="margin-top:12px">
              <input class="unos mono" value="${escAttr(plain)}" readonly onclick="this.select()">
            </div>`,
          akcije: [
            {tekst: ikona('kopiraj',15) + ' Kopiraj', klik: async () => {
              const ok = await kopirajTekst(plain);
              toast(ok ? 'Ključ je kopiran.' : 'Kopiranje nije uspelo.', ok ? 'uspeh' : 'greska');
            }},
            {tekst:'Zatvori', klasa:'primarno', klik: r2 => { r2.zatvori(); if (poUspehu) poUspehu(); }}
          ]
        });
      }}
    ]
  });
}

  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  const eMapa = {}; (endpoints || []).forEach(x => eMapa[x.id] = x.izvor);
  lista.innerHTML = tabelaHTML([
    {naziv:'Vreme', cel: r => fmtDatumVreme(r.created_at)},
    {naziv:'Izvor', cel: r => esc(KANAL_TIP[eMapa[r.endpoint_id]] || eMapa[r.endpoint_id] || '—')},
    {naziv:'Pravac', cel: r => esc(r.pravac || '—')},
    {naziv:'Status', cel: r => esc(String(r.status ?? '—'))},
    {naziv:'Greška', cel: r => esc(r.greska || '—')},
    {naziv:'', klasa:'akcije', cel: r => `<button class="dugme tiho malo" data-wd="${escAttr(String(r.id))}">Payload</button>`}
  ], data || [], 'Još nema primljenih webhook poziva.');
  lista.querySelectorAll('[data-wd]').forEach(b => b.addEventListener('click', () => {
    const r = (data || []).find(x => String(x.id) === b.dataset.wd);
    modal({
      naslov: 'Webhook payload',
      sirok: true,
      telo: `<pre class="json-pregled" style="max-height:400px">${esc(JSON.stringify(r ? r.payload : {}, null, 2))}</pre>`,
      akcije: [{tekst:'Zatvori', klasa:'primarno', klik: m => m.zatvori()}]
    });
  }));
}

/* ---------- globalna pretraga ---------- */
async function otvoriGlobalnuPretragu(pocetni){
  const m = modal({
    naslov: 'Pretraga',
    sirok: true,
    telo: `
      <div class="polje"><input class="unos" id="gp-unos" placeholder="Broj porudžbine, kupac, SKU, tracking… (min. 2 znaka)"
        value="${escAttr(pocetni || '')}" autocomplete="off"></div>
      <div id="gp-rezultati"><div class="prazno" style="padding:16px"><p>Pretražuju se porudžbine, kupci, proizvodi i pošiljke.</p></div></div>`,
    akcije: [{tekst:'Zatvori', klik: r => r.zatvori()}]
  });
  const unos = m.telo.querySelector('#gp-unos');
  const rez = m.telo.querySelector('#gp-rezultati');
  unos.focus();

  const pretrazi = debounce(async (q) => {
    if (!q || q.length < 2) return;
    if (!Store.firmaId()) { rez.innerHTML = infoTraka('info', 'Izaberite firmu za pretragu.'); return; }
    rez.innerHTML = ucitavanjeHTML('Pretraga…');
    const fid = Store.firmaId();
    const like = `%${q}%`;
    const [ord, kup, pro, varr, shp] = await Promise.all([
      sb.from('orders').select('id,broj,kupac_ime,status,iznos_ukupno')
        .eq('company_id', fid).or(`broj.ilike.${like},kupac_ime.ilike.${like}`)
        .order('created_at', {ascending: false}).limit(5),
      sb.from('customers').select('id,ime_prezime,telefon,mesto')
        .eq('company_id', fid).or(`ime_prezime.ilike.${like},telefon.ilike.${like}`)
        .limit(5),
      sb.from('products').select('id,naziv,sku')
        .eq('company_id', fid).or(`naziv.ilike.${like},sku.ilike.${like},barkod.ilike.${like}`)
        .limit(5),
      sb.from('product_variants').select('product_id,sku')
        .eq('company_id', fid).ilike('sku', like).limit(5),
      sb.from('shipments').select('id,tracking_broj,status,otkupni_iznos')
        .eq('company_id', fid).ilike('tracking_broj', like).limit(5)
    ]);
    // proizvodi iz varijanti (dopuna)
    const proIds = new Set((pro.data || []).map(p => p.id));
    const dodatniIds = (varr.data || []).map(v => v.product_id).filter(id => !proIds.has(id));
    let dodatni = [];
    if (dodatniIds.length) {
      const {data} = await sb.from('products').select('id,naziv,sku').in('id', dodatniIds.slice(0, 5));
      dodatni = data || [];
    }
    const proizvodi = [...(pro.data || []), ...dodatni];

    const grupa = (naslov, stavke) => stavke.length
      ? `<div class="pretraga-grupa"><h4>${esc(naslov)}</h4>${stavke.join('')}</div>` : '';
    const html =
      grupa('Porudžbine', (ord.data || []).map(o => `
        <div class="rezultat-stavka" data-go="${escAttr(o.id)}">
          <div><b class="mono">${esc(o.broj)}</b> <span style="color:var(--tekst-3);font-size:12px">${esc(o.kupac_ime || '')}</span></div>
          <div style="display:flex;gap:8px;align-items:center">${plombaStatusa('order', o.status)}<b>${fmtNovac(o.iznos_ukupno)}</b></div>
        </div>`)) +
      grupa('Kupci', (kup.data || []).map(k => `
        <div class="rezultat-stavka" data-gk="${escAttr(k.ime_prezime)}">
          <div><b>${esc(k.ime_prezime)}</b></div>
          <div style="color:var(--tekst-3);font-size:12px">${esc([k.telefon, k.mesto].filter(Boolean).join(' · '))}</div>
        </div>`)) +
      grupa('Proizvodi', proizvodi.map(p => `
        <div class="rezultat-stavka" data-gp="${escAttr(p.id)}">
          <div><b>${esc(p.naziv)}</b></div>
          <div class="mono" style="color:var(--tekst-3);font-size:12px">${esc(p.sku || '')}</div>
        </div>`)) +
      grupa('Pošiljke', (shp.data || []).map(s => `
        <div class="rezultat-stavka" data-gs="${escAttr(s.id)}">
          <div><b class="mono">${esc(s.tracking_broj || '')}</b></div>
          <div style="display:flex;gap:8px;align-items:center">${plombaStatusa('shipment', s.status)}<b>${fmtNovac(s.otkupni_iznos)}</b></div>
        </div>`));
    rez.innerHTML = html || '<div class="prazno" style="padding:16px"><p>Nema rezultata za ovu pretragu.</p></div>';

    rez.querySelectorAll('[data-go]').forEach(x => x.addEventListener('click', () => { m.zatvori(); idiNaDetalj('porudzbine', x.dataset.go); }));
    rez.querySelectorAll('[data-gk]').forEach(x => x.addEventListener('click', () => {
      m.zatvori(); poruStanje.kupci.pretraga = x.dataset.gk; idiNa('porudzbine', 'kupci');
    }));
    rez.querySelectorAll('[data-gp]').forEach(x => x.addEventListener('click', () => {
      m.zatvori(); location.hash = '#/katalog/proizvod/' + x.dataset.gp;
    }));
    rez.querySelectorAll('[data-gs]').forEach(x => x.addEventListener('click', () => { m.zatvori(); idiNaDetalj('posiljke', x.dataset.gs); }));
  }, 320);

  unos.addEventListener('input', e => pretrazi(e.target.value.trim()));
  if (pocetni && pocetni.trim().length >= 2) pretrazi(pocetni.trim());
}

/* ---------- globalno hvatanje grešaka + prečica ---------- */
let poslednjaGreskaTs = 0;
window.addEventListener('unhandledrejection', e => {
  const sada = Date.now();
  if (sada - poslednjaGreskaTs < 3000) return;
  poslednjaGreskaTs = sada;
  try { toast(porukaGreske(e.reason), 'greska', 6000); } catch (x) {}
});

document.addEventListener('keydown', e => {
  if (e.key !== '/' || e.ctrlKey || e.metaKey || e.altKey) return;
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;
  const gp = document.getElementById('glavna-pretraga');
  if (gp) { e.preventDefault(); gp.focus(); }
});
