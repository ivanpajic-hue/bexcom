<!DOCTYPE html>
<html lang="sr-Latn-RS">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEXCOM — Upravljanje e-prodavnicom</title>
<meta name="description" content="BEXCOM — multi-tenant sistem za e-commerce klijente BEX Express kurirske službe.">

<!-- Supabase klijent (obavezan odmah) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Biblioteke za kasnije faze (F9 grafikoni, F11 izveštaji) — učitane unapred, keširaju se -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Naslovni font (uz sistemski fallback ako nema mreže) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   BEXCOM — dizajn sistem (F1)
   Paleta: mastilo (petrol) / papir / signalna kurirska narandžasta
   ============================================================ */
:root{
  --mastilo:#16232b;        /* tamni petrol — bočna traka, naslovi */
  --mastilo-2:#1f313c;      /* svetliji petrol — hover u navigaciji */
  --mastilo-3:#2b414f;      /* ivice na tamnom */
  --papir:#f4f5f2;          /* radna pozadina */
  --karton:#ffffff;         /* kartice */
  --linija:#dfe3e0;         /* ivice */
  --linija-jaka:#c7cdc9;
  --tekst:#1c2a32;
  --tekst-2:#5b6b73;        /* sekundarni tekst */
  --tekst-3:#8a979d;        /* najtiši tekst */
  --signal:#e05a10;         /* kurirska narandžasta — primarna akcija */
  --signal-tamno:#c24c0b;
  --signal-blago:#fdeee3;
  --uspeh:#16803c;
  --uspeh-blago:#e7f4ec;
  --greska:#c0262b;
  --greska-blago:#fbeaea;
  --info:#0b6ba8;
  --info-blago:#e8f2f9;
  --upozorenje:#b45309;
  --upozorenje-blago:#fdf3e3;
  --radius:10px;
  --radius-m:7px;
  --senka:0 1px 2px rgba(22,35,43,.06),0 4px 14px rgba(22,35,43,.05);
  --senka-modal:0 10px 40px rgba(22,35,43,.28);
  --font-naslov:'Archivo',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --font-tekst:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-mono:ui-monospace,'SF Mono','Cascadia Mono','Segoe UI Mono',Consolas,monospace;
  --bocna-sirina:236px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-tekst);font-size:14px;line-height:1.5;
  color:var(--tekst);background:var(--papir);min-height:100vh;
}
::selection{background:var(--signal-blago)}
h1,h2,h3,h4{font-family:var(--font-naslov);color:var(--mastilo);line-height:1.25;font-weight:700}
h1{font-size:22px}h2{font-size:18px}h3{font-size:15px}
a{color:var(--info);text-decoration:none}
a:hover{text-decoration:underline}
code,.mono{font-family:var(--font-mono);font-size:.92em}
:focus-visible{outline:2px solid var(--signal);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ---------- dugmad ---------- */
.dugme{
  display:inline-flex;align-items:center;gap:7px;justify-content:center;
  font:inherit;font-weight:600;padding:8px 15px;border-radius:var(--radius-m);
  border:1px solid var(--linija-jaka);background:var(--karton);color:var(--tekst);
  cursor:pointer;transition:background .12s,border-color .12s,transform .05s;
  white-space:nowrap;
}
.dugme:hover{background:#f6f7f5}
.dugme:active{transform:translateY(1px)}
.dugme.primarno{background:var(--signal);border-color:var(--signal);color:#fff}
.dugme.primarno:hover{background:var(--signal-tamno);border-color:var(--signal-tamno)}
.dugme.opasno{background:var(--karton);border-color:#e3b7b8;color:var(--greska)}
.dugme.opasno:hover{background:var(--greska-blago)}
.dugme.tiho{border-color:transparent;background:transparent;color:var(--tekst-2)}
.dugme.tiho:hover{background:rgba(22,35,43,.06);color:var(--tekst)}
.dugme.malo{padding:4px 10px;font-size:13px}
.dugme:disabled{opacity:.5;cursor:not-allowed;transform:none}
.dugme .ikona{flex:none}

/* ---------- polja ---------- */
.polje{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.polje label{font-size:12.5px;font-weight:600;color:var(--tekst-2);letter-spacing:.01em}
.polje .obavezno::after{content:" *";color:var(--greska)}
.unos, select.unos, textarea.unos{
  font:inherit;padding:8px 11px;border:1px solid var(--linija-jaka);
  border-radius:var(--radius-m);background:var(--karton);color:var(--tekst);width:100%;
}
.unos:focus{border-color:var(--signal);outline:none;box-shadow:0 0 0 3px var(--signal-blago)}
.unos:disabled,.unos[readonly]{background:#f1f2f0;color:var(--tekst-2)}
textarea.unos{resize:vertical;min-height:90px;font-family:var(--font-mono);font-size:12.5px;line-height:1.55}
input[type=color].unos{padding:2px;height:36px;width:52px;cursor:pointer}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--signal);cursor:pointer}
.polje .napomena{font-size:12px;color:var(--tekst-3)}
.red-polja{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0 16px}
.red-cekbox{display:flex;align-items:center;gap:9px;margin-bottom:14px;cursor:pointer}
.red-cekbox span{font-weight:600;font-size:13px;color:var(--tekst-2)}
.greska-teksta{color:var(--greska);font-size:12.5px}

/* ---------- kartice ---------- */
.kartica{
  background:var(--karton);border:1px solid var(--linija);border-radius:var(--radius);
  box-shadow:var(--senka);padding:20px;margin-bottom:16px;
}
.kartica > h3{margin-bottom:4px}
.kartica .podnaslov{color:var(--tekst-2);font-size:13px;margin-bottom:16px}
.kartica-zaglavlje{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.kartica-zaglavlje h3{margin:0}
.mreza-kartica{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.mreza-kartica .kartica{margin:0}

/* brojčane kartice na početnoj */
.mreza-brojki{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.brojka{background:var(--karton);border:1px solid var(--linija);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--senka)}
.brojka .vrednost{font-family:var(--font-naslov);font-size:28px;font-weight:700;color:var(--mastilo);font-variant-numeric:tabular-nums}
.brojka .naziv{font-size:12.5px;font-weight:600;color:var(--tekst-2);text-transform:uppercase;letter-spacing:.05em}

/* ---------- plombe (statusne oznake) ---------- */
.plomba{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  padding:2.5px 9px;border-radius:99px;border:1px solid;white-space:nowrap;
}
.plomba .tacka{width:7px;height:7px;border-radius:50%;background:currentColor;flex:none}
.cip{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:5px;background:var(--info-blago);color:var(--info)}
.cip.faza{background:var(--signal-blago);color:var(--signal-tamno)}
.cip.mock{background:var(--upozorenje-blago);color:var(--upozorenje)}
.cip.live{background:var(--uspeh-blago);color:var(--uspeh)}

/* ---------- tabele ---------- */
.omot-tabele{overflow-x:auto;border:1px solid var(--linija);border-radius:var(--radius);background:var(--karton)}
table.tabela{width:100%;border-collapse:collapse;font-size:13.5px}
.tabela th{
  text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--tekst-2);padding:10px 14px;border-bottom:1px solid var(--linija);
  background:#fafbf9;position:sticky;top:0;white-space:nowrap;
}
.tabela td{padding:10px 14px;border-bottom:1px solid var(--linija);vertical-align:middle}
.tabela tbody tr:last-child td{border-bottom:none}
.tabela tbody tr:hover{background:#fafbf9}
.tabela td.akcije{text-align:right;white-space:nowrap}
.tabela .desno{text-align:right;font-variant-numeric:tabular-nums}

/* ---------- tabovi ---------- */
.tabovi{display:flex;gap:2px;border-bottom:2px solid var(--linija);margin-bottom:20px;flex-wrap:wrap}
.tab{
  font:inherit;font-weight:600;color:var(--tekst-2);background:none;border:none;cursor:pointer;
  padding:9px 14px;border-bottom:2px solid transparent;margin-bottom:-2px;
}
.tab:hover{color:var(--tekst)}
.tab.aktivan{color:var(--signal-tamno);border-bottom-color:var(--signal)}

/* ---------- raspored aplikacije ---------- */
.aplikacija{display:flex;min-height:100vh}
.bocna{
  width:var(--bocna-sirina);flex:none;background:var(--mastilo);color:#c6d2d8;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brend{display:flex;align-items:center;gap:10px;padding:18px 18px 16px;border-bottom:1px solid var(--mastilo-3)}
.brend .logo{
  width:34px;height:34px;border-radius:8px;background:var(--signal);color:#fff;flex:none;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-naslov);font-weight:700;font-size:17px;
}
.brend .ime{font-family:var(--font-naslov);font-weight:700;font-size:17px;color:#fff;letter-spacing:.03em}
.brend .pod{font-size:10.5px;color:#7e919b;letter-spacing:.09em;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-grupa{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#677a85;padding:12px 10px 6px}
.nav a{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;
  color:#c6d2d8;font-weight:500;font-size:13.5px;margin-bottom:1px;
}
.nav a:hover{background:var(--mastilo-2);color:#fff;text-decoration:none}
.nav a.aktivan{background:var(--mastilo-2);color:#fff;box-shadow:inset 3px 0 0 var(--signal)}
.nav a .ikona{flex:none;opacity:.85}
.nav a .cip-faza{margin-left:auto;font-size:9.5px;font-weight:700;color:#7e919b;border:1px solid var(--mastilo-3);border-radius:4px;padding:1px 5px;letter-spacing:.05em}
.bocna-dno{padding:12px 18px;border-top:1px solid var(--mastilo-3);font-size:11px;color:#677a85}
.bocna-dno .mono{color:#8fa2ac}

.glavni{flex:1;min-width:0;display:flex;flex-direction:column}
.zaglavlje{
  height:56px;background:var(--karton);border-bottom:1px solid var(--linija);
  display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:40;
}
.zaglavlje .firma-info{display:flex;align-items:center;gap:10px;min-width:0}
.zaglavlje .firma-naziv{font-weight:700;font-family:var(--font-naslov);color:var(--mastilo);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zaglavlje .razmak{flex:1}
.zaglavlje select.birac-firme{max-width:260px;padding:6px 9px;font-size:13px}
.korisnik-info{display:flex;align-items:center;gap:10px}
.korisnik-info .avatar{
  width:32px;height:32px;border-radius:50%;background:var(--mastilo);color:#fff;flex:none;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
}
.korisnik-info .ime{font-weight:600;font-size:13px;line-height:1.2}
.korisnik-info .uloga{font-size:11px;color:var(--tekst-3)}
.sadrzaj{flex:1;padding:24px 26px 60px;max-width:1240px;width:100%}
.sadrzaj-zaglavlje{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.sadrzaj-zaglavlje h1{margin-right:auto}

/* ---------- ekrani prijave (adresnica motiv) ---------- */
.auth-poz{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:var(--mastilo);
  background-image:repeating-linear-gradient(-45deg,transparent 0 26px,rgba(255,255,255,.025) 26px 52px);
}
.adresnica{
  width:100%;max-width:420px;background:var(--karton);border-radius:14px;box-shadow:var(--senka-modal);
  overflow:hidden;position:relative;
}
.adresnica.siroka{max-width:560px}
.adresnica-vrh{
  background:var(--signal);color:#fff;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.adresnica-vrh .brend-red{display:flex;align-items:center;gap:10px}
.adresnica-vrh .logo{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:var(--font-naslov);font-weight:700;font-size:18px}
.adresnica-vrh .ime{font-family:var(--font-naslov);font-weight:700;font-size:19px;letter-spacing:.03em}
.adresnica-vrh .ruta{font-family:var(--font-mono);font-size:11px;opacity:.85;text-align:right;line-height:1.4}
.perforacija{
  border-top:2px dashed var(--linija-jaka);position:relative;margin:0 0;
}
.adresnica .perforacija::before,.adresnica .perforacija::after{
  content:"";position:absolute;top:-9px;width:18px;height:18px;border-radius:50%;background:var(--mastilo);
}
.perforacija::before{left:-9px}
.perforacija::after{right:-9px}
.adresnica-telo{padding:26px}
.adresnica-telo h1{font-size:19px;margin-bottom:4px}
.adresnica-telo .opis{color:var(--tekst-2);font-size:13px;margin-bottom:18px}
.adresnica-dno{padding:12px 26px;background:#fafbf9;border-top:1px solid var(--linija);font-size:11.5px;color:var(--tekst-3);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.auth-veze{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.barkod{display:flex;gap:2px;align-items:flex-end;height:22px}
.barkod i{display:block;background:var(--mastilo);width:2px;height:100%}
.barkod i:nth-child(3n){width:4px}.barkod i:nth-child(4n){height:70%}.barkod i:nth-child(5n){width:1px}

/* ---------- prazna stanja / poruke ---------- */
.prazno{
  text-align:center;padding:46px 20px;color:var(--tekst-2);
  border:1.5px dashed var(--linija-jaka);border-radius:var(--radius);background:#fbfcfa;
}
.prazno h3{margin-bottom:6px}
.prazno p{max-width:440px;margin:0 auto 14px;font-size:13.5px}
.info-traka{
  display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-radius:var(--radius-m);
  font-size:13px;margin-bottom:16px;border:1px solid;
}
.info-traka.info{background:var(--info-blago);border-color:#bcd8ea;color:#0a4d78}
.info-traka.upozorenje{background:var(--upozorenje-blago);border-color:#ecd3a8;color:#7c3a06}
.info-traka.uspeh{background:var(--uspeh-blago);border-color:#bfe0cb;color:#0f5c2c}
.info-traka .ikona{flex:none;margin-top:1px}

/* ---------- modali ---------- */
.modal-omot{
  position:fixed;inset:0;background:rgba(22,35,43,.5);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:6vh 16px 16px;overflow-y:auto;
  animation:pojava .12s ease-out;
}
.modal{
  background:var(--karton);border-radius:12px;box-shadow:var(--senka-modal);
  width:100%;max-width:520px;animation:modal-ulaz .14s ease-out;
}
.modal.sirok{max-width:760px}
.modal-zaglavlje{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 22px;border-bottom:1px solid var(--linija)}
.modal-zaglavlje h2{font-size:16px}
.modal-telo{padding:20px 22px;max-height:65vh;overflow-y:auto}
.modal-akcije{display:flex;justify-content:flex-end;gap:9px;padding:14px 22px;border-top:1px solid var(--linija);background:#fafbf9;border-radius:0 0 12px 12px}
@keyframes pojava{from{opacity:0}to{opacity:1}}
@keyframes modal-ulaz{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:none}}

/* ---------- toast ---------- */
#tostovi{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:9px;max-width:360px}
.toast{
  background:var(--mastilo);color:#fff;padding:11px 15px;border-radius:9px;box-shadow:var(--senka-modal);
  font-size:13.5px;display:flex;gap:10px;align-items:flex-start;animation:toast-ulaz .18s ease-out;
}
.toast.uspeh{background:var(--uspeh)}
.toast.greska{background:var(--greska)}
.toast .ikona{flex:none;margin-top:1px}
@keyframes toast-ulaz{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- spinner ---------- */
.spiner{width:26px;height:26px;border:3px solid var(--linija);border-top-color:var(--signal);border-radius:50%;animation:vrti .7s linear infinite;margin:0 auto}
.ucitavanje-blok{padding:50px 20px;text-align:center;color:var(--tekst-2);font-size:13px}
.ucitavanje-blok .spiner{margin-bottom:12px}
@keyframes vrti{to{transform:rotate(360deg)}}

/* ---------- razno ---------- */
.opis-liste{list-style:none;display:flex;flex-direction:column;gap:8px;margin:14px 0 0}
.opis-liste li{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--tekst-2)}
.opis-liste li::before{content:"";width:6px;height:6px;border-radius:2px;background:var(--signal);flex:none;margin-top:6px}
.kv{display:grid;grid-template-columns:150px 1fr;gap:6px 14px;font-size:13.5px}
.kv dt{color:var(--tekst-2);font-weight:600}
.kv dd{margin:0}
.koraci{counter-reset:korak;list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:14px}
.koraci li{display:flex;gap:12px;font-size:13.5px;color:var(--tekst-2)}
.koraci li::before{
  counter-increment:korak;content:counter(korak);flex:none;width:22px;height:22px;border-radius:50%;
  background:var(--mastilo);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;
}
.koraci code{background:#f1f2f0;padding:1px 6px;border-radius:4px;word-break:break-all}
.json-pregled{background:#f7f8f6;border:1px solid var(--linija);border-radius:var(--radius-m);padding:12px;font-family:var(--font-mono);font-size:12px;line-height:1.55;overflow-x:auto;white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto}
.dva-stupca{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.filter-traka{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
.filter-traka .polje{margin-bottom:0;min-width:140px}
.centar{text-align:center}
.mt{margin-top:14px}
.status-red{display:grid;grid-template-columns:130px 1fr 60px auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--linija)}
.status-red:last-child{border-bottom:none}
.kod-tag{font-family:var(--font-mono);font-size:12px;color:var(--tekst-2);background:#f1f2f0;border-radius:4px;padding:2px 7px;justify-self:start}

/* ---------- dodaci za module F2–F13 ---------- */
.detalj-zaglavlje{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.detalj-zaglavlje h1{margin-right:auto;font-size:20px}
.traka-akcije{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.zaglavlje-pretraga{flex:1;max-width:330px;min-width:150px}
.zaglavlje-pretraga .unos{padding:7px 11px;font-size:13px}
.tabela .unos{padding:5px 8px;font-size:13px}
.kol-uska{width:86px}.kol-srednja{width:130px}.kol-siroka{min-width:200px}
.zbir-red{display:flex;justify-content:flex-end;gap:26px;font-weight:600;padding:11px 6px 2px;font-variant-numeric:tabular-nums;flex-wrap:wrap}
.klik-red{cursor:pointer}
.minijature{display:flex;gap:10px;flex-wrap:wrap}
.minijatura{width:96px;border:1px solid var(--linija);border-radius:8px;overflow:hidden;position:relative;background:#fff}
.minijatura img{width:100%;height:96px;object-fit:cover;display:block}

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, s =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function escAttr(v){ return esc(v); }

// 1.234,56 — srpski format broja
function fmtBroj(n, dec = 2){
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '—';
  const broj = Number(n);
  const neg = broj < 0;
  const [ceo, dek] = Math.abs(broj).toFixed(dec).split('.');
  const grupisan = ceo.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return (neg ? '−' : '') + grupisan + (dec > 0 ? ',' + dek : '');
}
function fmtNovac(n){ return n === null || n === undefined ? '—' : fmtBroj(n, 2) + ' RSD'; }

// dd.mm.yyyy.
function fmtDatum(v){
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '—';
  return String(d.getDate()).padStart(2,'0') + '.' +
         String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear() + '.';
}
function fmtDatumVreme(v){
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '—';
  return fmtDatum(v) + ' ' + String(d.getHours()).padStart(2,'0') + ':' +
         String(d.getMinutes()).padStart(2,'0');
}
function kratakId(id){ return id ? String(id).slice(0, 8) : '—'; }

function inicijali(ime){
  const delovi = String(ime || '').trim().split(/\s+/).filter(Boolean);
  if (!delovi.length) return '?';
  return (delovi[0][0] + (delovi[1] ? delovi[1][0] : '')).toUpperCase();
}

function generisiLozinku(duzina = 12){
  const skup = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  const niz = new Uint32Array(duzina);
  crypto.getRandomValues(niz);
  let l = Array.from(niz, x => skup[x % skup.length]).join('');
  // garantuj bar jedno veliko slovo, malo slovo i cifru
  if (!/[A-Z]/.test(l)) l = 'B' + l.slice(1);
  if (!/[a-z]/.test(l)) l = l.slice(0, -2) + 'x' + l.slice(-1);
  if (!/\d/.test(l))    l = l.slice(0, -1) + '7';
  return l;
}

async function kopirajTekst(tekst){
  try {
    await navigator.clipboard.writeText(tekst);
    return true;
  } catch (e) {
    try {
      const ta = document.createElement('textarea');
      ta.value = tekst;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      ta.remove();
      return ok;
    } catch (e2) { return false; }
  }
}

// Čitljive poruke za tipične Supabase/Postgres greške
function porukaGreske(error){
  if (!error) return 'Nepoznata greška.';
  const m = String(error.message || error.error_description || error);
  if (/Invalid login credentials/i.test(m)) return 'Pogrešan email ili lozinka.';
  if (/Email not confirmed/i.test(m)) return 'Email adresa nije potvrđena. Proverite prijemno sanduče.';
  if (/User already registered|already been registered/i.test(m)) return 'Korisnik sa ovom email adresom već postoji.';
  if (/rate limit/i.test(m)) return 'Previše pokušaja — sačekajte minut pa pokušajte ponovo.';
  if (/row-level security/i.test(m)) return 'Nemate ovlašćenje za ovu radnju (RLS zaštita).';
  if (/Password should be at least/i.test(m)) return 'Lozinka mora imati najmanje 6 karaktera.';
  if (/JWT expired/i.test(m)) return 'Sesija je istekla — prijavite se ponovo.';
  if (/Signups not allowed|signups.*disabled/i.test(m)) return 'Registracija novih korisnika je isključena u Supabase Auth podešavanjima.';
  if (/Failed to fetch|NetworkError|Load failed/i.test(m)) return 'Nema veze sa serverom. Proverite internet i Supabase URL.';
  return m; // poruke naših trigera su već na srpskom
}

    greskaKonteksta: null

  postavi(delta){ Object.assign(this.st, delta); },
  uloga(){ return this.st.profil ? this.st.profil.uloga : null; },
  jeSuperadmin(){ return this.uloga() === 'superadmin'; },
  firmaId(){ return this.st.firma ? this.st.firma.id : null; },
  // pisanje: superadmin uvek; ostali ako im je uloga na listi

    if (!u) return false;
    return u === 'superadmin' || uloge.includes(u);

let sb = null; // glavni Supabase klijent

function ucitajKonfig(){
  let URL = KONFIG.SUPABASE_URL, KEY = KONFIG.SUPABASE_ANON_KEY;
  if (!URL || !KEY) {
    try {
      const l = JSON.parse(Skladiste.citaj('bexcom_konfig') || 'null');
      if (l && l.URL && l.KEY) { URL = l.URL; KEY = l.KEY; }
    } catch (e) {}
  }
  return (URL && KEY) ? {URL, KEY} : null;
}

async function ucitajPodesavanja(firmaId){
  const {data, error} = await sb.from('settings')
    .select('kljuc,vrednost').eq('company_id', firmaId);
  if (error) { console.error('settings:', error); return; }
  const mapa = {};
  (data || []).forEach(r => { mapa[r.kljuc] = r.vrednost; });
  Store.postavi({podesavanja: mapa});
}

function pod(kljuc, podrazumevano = null){
  const v = Store.st.podesavanja[kljuc];
  return v === undefined ? podrazumevano : v;
}

async function sacuvajPod(kljuc, vrednost){
  const {error} = await sb.from('settings').upsert(
    {company_id: Store.firmaId(), kljuc, vrednost},
    {onConflict: 'company_id,kljuc'}
  );
  if (error) throw error;
  Store.st.podesavanja[kljuc] = vrednost;
}

            (PODRAZUMEVANI_STATUSI[grupa] && PODRAZUMEVANI_STATUSI[grupa][kod]);
  return s || {naziv: kod, boja: '#64748b'};
}

// ---------- toast ----------
function toast(poruka, tip = 'info', trajanje = 4200){
  const omot = document.getElementById('tostovi');
  const t = document.createElement('div');
  t.className = 'toast ' + (tip === 'uspeh' ? 'uspeh' : tip === 'greska' ? 'greska' : '');
  t.innerHTML = ikona(tip === 'uspeh' ? 'kvacica' : tip === 'greska' ? 'upozorenje' : 'info', 17) +
    '<div>' + esc(poruka) + '</div>';
  omot.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .25s'; t.style.opacity = '0';
    setTimeout(() => t.remove(), 260);
  }, trajanje);
}

// ---------- modal ----------
function modal({naslov, telo, akcije = [], sirok = false, poZatvaranju = null}){
  const omot = document.createElement('div');
  omot.className = 'modal-omot';
  omot.innerHTML = `
    <div class="modal ${sirok ? 'sirok' : ''}" role="dialog" aria-modal="true" aria-label="${escAttr(naslov)}">
      <div class="modal-zaglavlje">
        <h2>${esc(naslov)}</h2>
        <button class="dugme tiho malo" data-x aria-label="Zatvori">${ikona('iks', 16)}</button>
      </div>
      <div class="modal-telo"></div>
      <div class="modal-akcije"></div>
    </div>`;
  const teloEl = omot.querySelector('.modal-telo');
  if (typeof telo === 'string') teloEl.innerHTML = telo;
  else if (telo) teloEl.appendChild(telo);

  const akcijeEl = omot.querySelector('.modal-akcije');
  const ref = {
    element: omot,
    telo: teloEl,
    zatvori(){
      omot.remove();
      document.removeEventListener('keydown', naTaster);
      if (poZatvaranju) poZatvaranju();
    }
  };
  if (!akcije.length) akcijeEl.remove();
  akcije.forEach(a => {
    const b = document.createElement('button');
    b.className = 'dugme ' + (a.klasa || '');
    b.innerHTML = a.tekst;
    b.addEventListener('click', () => a.klik && a.klik(ref, b));
    akcijeEl.appendChild(b);
  });
  omot.querySelector('[data-x]').addEventListener('click', ref.zatvori);
  omot.addEventListener('mousedown', e => { if (e.target === omot) ref.zatvori(); });
  function naTaster(e){
    if (e.key === 'Escape' && omot.parentElement && omot.parentElement.lastElementChild === omot) ref.zatvori();
  }
  document.addEventListener('keydown', naTaster);

  document.getElementById('modali').appendChild(omot);
  const prvi = teloEl.querySelector('input,select,textarea,button');
  if (prvi) setTimeout(() => prvi.focus(), 30);
  return ref;
}

function potvrdi(poruka, {naslov = 'Potvrda', tekstDa = 'Potvrdi', opasno = false} = {}){
  return new Promise(resolve => {
    let odgovoreno = false;
    const odgovori = v => { if (!odgovoreno) { odgovoreno = true; resolve(v); } };
    modal({
      naslov,
      telo: '<p>' + esc(poruka) + '</p>',
      akcije: [
        {tekst: 'Odustani', klik: r => { odgovori(false); r.zatvori(); }},
        {tekst: tekstDa, klasa: opasno ? 'opasno' : 'primarno',
         klik: r => { odgovori(true); r.zatvori(); }}
      ],
      poZatvaranju: () => odgovori(false)
    });
  });
}

    <span class="tacka"></span>${esc(tekst)}</span>`;
}
function plombaStatusa(grupa, kod){
  const s = statusInfo(grupa, kod);
  return plomba(s.naziv, s.boja);
}
function plombaAktivnosti(aktivan){

// kolone: [{naziv, cel(red)->html, klasa}] ; redovi: niz objekata
function tabelaHTML(kolone, redovi, praznoPoruka = 'Nema podataka.'){
  if (!redovi || !redovi.length){
    return `<div class="prazno"><p>${esc(praznoPoruka)}</p></div>`;
  }
  const th = kolone.map(k => `<th class="${k.klasa || ''}">${esc(k.naziv)}</th>`).join('');
  const tr = redovi.map(r =>
    '<tr>' + kolone.map(k => `<td class="${k.klasa || ''}">${k.cel(r)}</td>`).join('') + '</tr>'
  ).join('');
  return `<div class="omot-tabele"><table class="tabela">
    <thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div>`;
}

function ucitavanjeHTML(poruka = 'Učitavanje…'){
  return `<div class="ucitavanje-blok"><div class="spiner"></div>${esc(poruka)}</div>`;
}

function infoTraka(tip, html){
  const ik = tip === 'upozorenje' ? 'upozorenje' : tip === 'uspeh' ? 'kvacica' : 'info';
  return `<div class="info-traka ${tip}">${ikona(ik, 17)}<div>${html}</div></div>`;
}

// Vrednosti forme → objekat (checkbox → boolean)
function podaciForme(forma){
  const o = {};
  forma.querySelectorAll('input[name],select[name],textarea[name]').forEach(el => {
    if (el.type === 'checkbox') o[el.name] = el.checked;
    else if (el.type === 'password') o[el.name] = el.value;
    else o[el.name] = el.value.trim();
  });
  return o;
}

// Standardno HTML polje
function poljeHTML({naziv, ime, tip = 'text', vrednost = '', obavezno = false,
                    napomena = '', atributi = '', placeholder = ''}){
  return `<div class="polje">
    <label class="${obavezno ? 'obavezno' : ''}" for="p-${escAttr(ime)}">${esc(naziv)}</label>
    <input class="unos" type="${tip}" id="p-${escAttr(ime)}" name="${escAttr(ime)}"
      value="${escAttr(vrednost ?? '')}" ${obavezno ? 'required' : ''}
      placeholder="${escAttr(placeholder)}" ${atributi}>
    ${napomena ? `<div class="napomena">${napomena}</div>` : ''}
  </div>`;
}
function poljeSelectHTML({naziv, ime, opcije, vrednost = '', napomena = '', atributi = ''}){
  const ops = opcije.map(o =>
    `<option value="${escAttr(o.v)}" ${String(o.v) === String(vrednost) ? 'selected' : ''}>${esc(o.t)}</option>`
  ).join('');
  return `<div class="polje">
    <label for="p-${escAttr(ime)}">${esc(naziv)}</label>
    <select class="unos" id="p-${escAttr(ime)}" name="${escAttr(ime)}" ${atributi}>${ops}</select>
    ${napomena ? `<div class="napomena">${napomena}</div>` : ''}
  </div>`;
}

function otvoriResetLozinke(){
  const m = modal({
    naslov: 'Reset lozinke',
    telo: `
      <p style="margin-bottom:14px;color:var(--tekst-2)">Poslaćemo vam email sa vezom za
      postavljanje nove lozinke. Veza vodi nazad na ovu aplikaciju.</p>
      <form id="reset-forma">
        ${poljeHTML({naziv:'Email adresa', ime:'email', tip:'email', obavezno:true})}
      </form>
      ${infoTraka('info','Adresa aplikacije mora biti dodata u Supabase → Authentication → URL Configuration → Redirect URLs.')}`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Pošalji vezu', klasa:'primarno', klik: async (r, b) => {
        const email = r.telo.querySelector('[name=email]').value.trim();
        if (!email) return;
        b.disabled = true;
        const {error} = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: location.origin === 'null' || location.protocol === 'file:'
            ? undefined
            : location.origin + location.pathname
        });
        if (error) { toast(porukaGreske(error), 'greska'); b.disabled = false; return; }
        r.zatvori();
        toast('Ako nalog postoji, email sa vezom je poslat.', 'uspeh', 6000);
      }}
    ]
  });
  return m;
}

/* ---------- tok sesije ---------- */
let trenutniUid; // undefined = još nije obrađeno

async function pokreni(){
  const k = ucitajKonfig();
  if (!k) { renderKonfig(); return; }
  Store.postavi({konfig: k});

  if (!window.supabase) {
    app().innerHTML = adresnicaOmot(
      '<h1>Biblioteka nije učitana</h1><p class="opis">Supabase klijent (CDN) nije dostupan — proverite internet vezu pa osvežite stranicu.</p>',
      {ruta: 'GREŠKA'});
    return;
  }
  sb = window.supabase.createClient(k.URL, k.KEY);

  // Reset veza u URL-u? (Supabase dodaje #access_token…&type=recovery)
  if (/type=recovery/.test(location.hash)) Store.postavi({rezimOporavka: true});

  renderUcitavanje('Povezivanje…');

  sb.auth.onAuthStateChange((dogadjaj, sesija) => {
    if (dogadjaj === 'PASSWORD_RECOVERY') Store.postavi({rezimOporavka: true});
    obradiSesiju(sesija);
  });

  // rezerva: ako INITIAL_SESSION iz nekog razloga ne stigne
  setTimeout(async () => {
    if (trenutniUid === undefined) {
      const {data} = await sb.auth.getSession();
      if (trenutniUid === undefined) obradiSesiju(data ? data.session : null);
    }
  }, 1600);
}

async function obradiSesiju(sesija){
  const uid = sesija?.user?.id || null;
  Store.postavi({sesija});

  if (!uid) {
    trenutniUid = null;
    Store.postavi({profil: null, firma: null, firme: [], podesavanja: {}, rezimOporavka: false});
    renderPrijava();
    return;
  }
  if (Store.st.rezimOporavka) { trenutniUid = uid; renderNovaLozinka(); return; }
  if (uid === trenutniUid && Store.st.profil) { return; } // već učitano (refresh tokena i sl.)
  trenutniUid = uid;
  await ucitajKontekst();
}

async function ucitajKontekst(){
  renderUcitavanje();
  const uid = Store.st.sesija?.user?.id;
  if (!uid) { renderPrijava(); return; }

  const {data: profil, error} = await sb.from('users').select('*').eq('id', uid).maybeSingle();
  if (error) {
    renderBlokada({naslov: 'Greška pri učitavanju profila',
      opis: esc(porukaGreske(error)), ruta: 'GREŠKA'});
    return;
  }
  Store.postavi({profil});

  if (!profil) { renderBezProfila(); return; }
  if (!profil.aktivan) { renderDeaktiviran(); return; }

  if (profil.uloga === 'superadmin') {
    const {data: firme, error: gf} = await sb.from('companies').select('*').order('naziv');
    if (gf) { toast(porukaGreske(gf), 'greska'); }
    const lista = firme || [];
    const zapamcena = Skladiste.citaj('bexcom_firma');
    const firma = lista.find(f => f.id === zapamcena) || lista[0] || null;
    Store.postavi({firme: lista, firma});
  } else {
    const {data: firma, error: gf} = await sb.from('companies')
      .select('*').eq('id', profil.company_id).maybeSingle();
    if (gf) { toast(porukaGreske(gf), 'greska'); }
    Store.postavi({firme: [], firma: firma || null});
    if (firma && firma.status === 'suspendovana') { renderSuspendovana(); return; }
  }

  if (Store.firmaId()) await ucitajPodesavanja(Store.firmaId());
  else Store.postavi({podesavanja: {}});

  renderApp();
}

async function odjava(){
  await sb.auth.signOut();
  // renderPrijava stiže kroz onAuthStateChange
}

// Superadmin: promena aktivne firme
async function promeniAktivnuFirmu(firmaId){
  const firma = Store.st.firme.find(f => f.id === firmaId) || null;
  Store.postavi({firma});
  if (firma) {
    Skladiste.pisi('bexcom_firma', firma.id);
    await ucitajPodesavanja(firma.id);
  }
  renderApp();
}

function trenutnaRuta(){
  const h = location.hash.replace(/^#\/?/, '');
  const [modul, pod, id] = h.split('/');
  return {modul: modul || 'pocetna', pod: pod || '', id: id || ''};
}
function idiNaDetalj(modul, id){ location.hash = '#/' + modul + '/detalj/' + id; }
function idiNa(modul, pod = ''){
  location.hash = '#/' + modul + (pod ? '/' + pod : '');
}
function modulDostupan(m){
  if (!m.uloge) return true;
  return m.uloge.includes(Store.uloga());
}

function renderApp(){
  const s = Store.st;
  if (!s.konfig) { renderKonfig(); return; }
  if (!s.sesija) { renderPrijava(); return; }
  if (s.rezimOporavka) { renderNovaLozinka(); return; }
  if (!s.profil) { renderBezProfila(); return; }
  if (!s.profil.aktivan) { renderDeaktiviran(); return; }
  if (!Store.jeSuperadmin() && s.firma && s.firma.status === 'suspendovana') { renderSuspendovana(); return; }

  const ruta = trenutnaRuta();
  let modul = MODULI.find(m => m.id === ruta.modul) || MODULI[0];
  if (!modulDostupan(modul)) modul = MODULI[0];

  const grupe = [];
  MODULI.filter(modulDostupan).forEach(m => {
    let g = grupe.find(x => x.naziv === m.grupa);
    if (!g) { g = {naziv: m.grupa, stavke: []}; grupe.push(g); }
    g.stavke.push(m);
  });

  const navHTML = grupe.map(g => `
    <div class="nav-grupa">${esc(g.naziv)}</div>
    ${g.stavke.map(m => `
      <a href="#/${m.id}" class="${m.id === modul.id ? 'aktivan' : ''}">
        ${ikona(m.ikona, 17)}<span>${esc(m.naziv)}</span>
        ${m.render === null ? `<span class="cip-faza">F${m.faza}</span>` : ''}
      </a>`).join('')}
  `).join('');

  const firma = s.firma;
  const firmaHTML = Store.jeSuperadmin()
    ? `<select class="unos birac-firme" id="birac-firme" aria-label="Aktivna firma">
        ${s.firme.length ? s.firme.map(f =>
          `<option value="${escAttr(f.id)}" ${firma && f.id === firma.id ? 'selected' : ''}>
            ${esc(f.naziv)}${f.status === 'suspendovana' ? ' (suspendovana)' : ''}</option>`).join('')
          : '<option value="">— nema firmi —</option>'}
       </select>`
    : `<span class="firma-naziv">${esc(firma ? firma.naziv : '—')}</span>`;

  const statusFirmeHTML = firma
    ? (firma.status === 'aktivna' ? plomba('Aktivna', '#16803c') : plomba('Suspendovana', '#c0262b'))
    : '';

  app().innerHTML = `
  <div class="aplikacija">
    <aside class="bocna">
      <div class="brend">
        <div class="logo">B</div>
        <div>
          <div class="ime">BEXCOM</div>
          <div class="pod">BEXEXPRESS partneri</div>
        </div>
      </div>
      <nav class="nav">${navHTML}</nav>
      <div class="bocna-dno" id="o-aplikaciji" style="cursor:pointer" title="O aplikaciji">Verzija <span class="mono">${esc(VERZIJA)}</span> · Faza 13 od 13</div>
    </aside>
    <div class="glavni">
      <header class="zaglavlje">
        <div class="firma-info">${firmaHTML} ${statusFirmeHTML}</div>
        <div class="razmak"></div>
        <div class="zaglavlje-pretraga">
          <input class="unos" id="glavna-pretraga" type="search"
            placeholder="Pretraga: broj, kupac, SKU, tracking…  ( / )" autocomplete="off">
        </div>
        <div class="korisnik-info">
          <div class="avatar">${esc(inicijali(s.profil.ime_prezime || s.profil.email))}</div>
          <div>
            <div class="ime">${esc(s.profil.ime_prezime || s.profil.email || '')}</div>
            <div class="uloga">${esc(ULOGA_NAZIV[s.profil.uloga] || s.profil.uloga)}</div>
          </div>
        </div>
        <button class="dugme tiho malo" id="dugme-nalog" title="Moj nalog">${ikona('korisnik', 17)}</button>
        <button class="dugme tiho malo" id="dugme-odjava" title="Odjava">${ikona('odjava', 17)}</button>
      </header>
      <main class="sadrzaj" id="sadrzaj"></main>
    </div>
  </div>`;

  const gp = document.getElementById('glavna-pretraga');
  if (gp) gp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); otvoriGlobalnuPretragu(gp.value); }
  });

  const birac = document.getElementById('birac-firme');
  if (birac) birac.addEventListener('change', e => promeniAktivnuFirmu(e.target.value));
  document.getElementById('dugme-nalog').addEventListener('click', otvoriMojNalog);
  document.getElementById('o-aplikaciji').addEventListener('click', otvoriOAplikaciji);
  document.getElementById('dugme-odjava').addEventListener('click', odjava);

  const sadrzaj = document.getElementById('sadrzaj');
  if (modul.render) modul.render(sadrzaj, ruta);
  else renderUPripremi(sadrzaj, modul);
}

/* ---------- moj nalog ---------- */
function otvoriMojNalog(){
  const p = Store.st.profil;
  const m = modal({
    naslov: 'Moj nalog',
    telo: `
      <form id="nalog-forma">
        ${poljeHTML({naziv:'Ime i prezime', ime:'ime_prezime', vrednost: p.ime_prezime, obavezno:true})}
        <div class="red-polja">
          ${poljeHTML({naziv:'Email', ime:'email', vrednost: p.email || '', atributi:'readonly'})}
          ${poljeHTML({naziv:'Telefon', ime:'telefon', vrednost: p.telefon || '', placeholder:'06x xxx xxxx'})}
        </div>
        ${poljeHTML({naziv:'Uloga', ime:'uloga_prikaz', vrednost: ULOGA_NAZIV[p.uloga] || p.uloga, atributi:'readonly',
                     napomena:'Ulogu menja administrator firme.'})}
      </form>
      <div class="perforacija" style="margin:6px 0 16px"></div>
      <h3 style="margin-bottom:10px">Promena lozinke</h3>
      <form id="lozinka-forma">
        <div class="red-polja">
          ${poljeHTML({naziv:'Nova lozinka', ime:'l1', tip:'password', atributi:'minlength="8" autocomplete="new-password"'})}
          ${poljeHTML({naziv:'Ponovite lozinku', ime:'l2', tip:'password', atributi:'autocomplete="new-password"'})}
        </div>
        <button class="dugme">${ikona('kljuc',15)} Sačuvaj lozinku</button>
      </form>`,
    akcije: [
      {tekst:'Zatvori', klik: r => r.zatvori()},
      {tekst:'Sačuvaj podatke', klasa:'primarno', klik: async (r, b) => {
        const d = podaciForme(r.telo.querySelector('#nalog-forma'));
        if (!d.ime_prezime) { toast('Ime i prezime je obavezno.', 'greska'); return; }
        b.disabled = true;
        const {error} = await sb.from('users')
          .update({ime_prezime: d.ime_prezime, telefon: d.telefon || null})
          .eq('id', p.id);
        b.disabled = false;
        if (error) { toast(porukaGreske(error), 'greska'); return; }
        Store.st.profil.ime_prezime = d.ime_prezime;
        Store.st.profil.telefon = d.telefon || null;
        toast('Podaci naloga su sačuvani.', 'uspeh');
        r.zatvori();
        renderApp();
      }}
    ]
  });

  m.telo.querySelector('#lozinka-forma').addEventListener('submit', async e => {
    e.preventDefault();
    const d = podaciForme(e.target);
    if (!d.l1 || d.l1.length < 8) { toast('Lozinka mora imati najmanje 8 karaktera.', 'greska'); return; }
    if (d.l1 !== d.l2) { toast('Lozinke se ne poklapaju.', 'greska'); return; }
    const {error} = await sb.auth.updateUser({password: d.l1});
    if (error) { toast(porukaGreske(error), 'greska'); return; }
    e.target.reset();
    toast('Lozinka je promenjena.', 'uspeh');
  });
}

// Sekundarni Supabase klijent za pozivnice — signUp bez diranja tekuće sesije.
let sbPozivnice = null;
function klijentZaPozivnice(){
  if (!sbPozivnice){
    const k = Store.st.konfig;
    sbPozivnice = window.supabase.createClient(k.URL, k.KEY, {
      auth: {persistSession: false, autoRefreshToken: false,
             detectSessionInUrl: false, storageKey: 'bexcom-pozivnice'}
    });
  }
  return sbPozivnice;
}

function renderNemaPristup(el){
  el.innerHTML = `<div class="prazno">
    <h3>Nemate pristup ovom modulu</h3>
    <p>Administracija je dostupna administratorima firme i superadminu platforme.</p>
    <button class="dugme" onclick="idiNa('pocetna')">Nazad na početnu</button>
  </div>`;
}

function praznoIzaberiFirmu(){
  return `<div class="prazno">
    <h3>Nije izabrana firma</h3>
    <p>Dodajte prvu firmu — podrazumevana podešavanja, magacin, šabloni obaveštenja
       i BEX (mock) nalog kreiraju se automatski.</p>
    ${Store.jeSuperadmin() ? `<button class="dugme primarno" onclick="idiNa('administracija','firme')">${ikona('plus',16)} Dodaj firmu</button>` : ''}
  </div>`;
}

function renderAdministracija(el, ruta){
  if (!Store.mozeDaPise('admin')) { renderNemaPristup(el); return; }

  const tabovi = [];
  if (Store.jeSuperadmin()) tabovi.push({id:'firme', naziv:'Firme'});
  tabovi.push(
    {id:'firma',       naziv:'Firma'},
    {id:'korisnici',   naziv:'Korisnici'},
    {id:'podesavanja', naziv:'Podešavanja'},
    {id:'statusi',     naziv:'Statusi'},
    {id:'kurir',       naziv:'Kurirski nalozi'},
    {id:'audit',       naziv:'Dnevnik izmena'}
  );
  const podrazumevani = Store.jeSuperadmin() ? 'firme' : 'firma';
  let aktivanId = tabovi.some(t => t.id === ruta.pod) ? ruta.pod : podrazumevani;
  if (!Store.firmaId() && Store.jeSuperadmin()) aktivanId = 'firme';

  el.innerHTML = `
    <div class="sadrzaj-zaglavlje"><h1>Administracija</h1></div>
    <div class="tabovi" role="tablist">
      ${tabovi.map(t => `<button class="tab ${t.id === aktivanId ? 'aktivan' : ''}"
        role="tab" data-tab="${t.id}">${esc(t.naziv)}</button>`).join('')}
    </div>
    <div id="admin-sadrzaj"></div>`;

  el.querySelectorAll('[data-tab]').forEach(b =>
    b.addEventListener('click', () => idiNa('administracija', b.dataset.tab)));

  const cilj = document.getElementById('admin-sadrzaj');
  ({firme: tabFirme, firma: tabFirma, korisnici: tabKorisnici,
    podesavanja: tabPodesavanja, statusi: tabStatusi,
    kurir: tabKurir, audit: tabAudit}[aktivanId])(cilj);
}

/* ============================================================
   TAB: FIRME (samo superadmin)
   ============================================================ */
async function tabFirme(el){
  el.innerHTML = `
    <div class="kartica-zaglavlje">
      <div>
        <h3>Sve firme na platformi</h3>
        <div class="podnaslov" style="margin:0">Nova firma dobija podrazumevana podešavanja, magacin, šablone i BEX (mock) nalog automatski.</div>
      </div>
      <button class="dugme primarno" id="nova-firma">${ikona('plus',16)} Nova firma</button>
    </div>
    <div id="firme-lista">${ucitavanjeHTML()}</div>`;
  document.getElementById('nova-firma').addEventListener('click', () => urediFirmu(null));

  const [{data: firme, error}, {data: sviKorisnici}] = await Promise.all([
    sb.from('companies').select('*').order('naziv'),
    sb.from('users').select('company_id')
  ]);
  const lista = document.getElementById('firme-lista');
  if (!lista) return;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }

  Store.postavi({firme: firme || []});
  const brojKorisnika = {};
  (sviKorisnici || []).forEach(u => {
    if (u.company_id) brojKorisnika[u.company_id] = (brojKorisnika[u.company_id] || 0) + 1;
  });

  lista.innerHTML = tabelaHTML([
    {naziv:'Firma', cel: f => `<b>${esc(f.naziv)}</b>${f.id === DEMO_FIRMA_ID ? ' <span class="cip">demo</span>' : ''}
      ${Store.firmaId() === f.id ? ' <span class="cip faza">aktivna</span>' : ''}`},
    {naziv:'PIB', cel: f => `<span class="mono">${esc(f.pib || '—')}</span>`},
    {naziv:'Mesto', cel: f => esc(f.mesto || '—')},
    {naziv:'Status', cel: f => f.status === 'aktivna' ? plomba('Aktivna','#16803c') : plomba('Suspendovana','#c0262b')},
    {naziv:'Paket', cel: f => esc(f.plan)},
    {naziv:'Korisnika', klasa:'desno', cel: f => fmtBroj(brojKorisnika[f.id] || 0, 0)},
    {naziv:'Kreirana', cel: f => fmtDatum(f.created_at)},
    {naziv:'', klasa:'akcije', cel: f => `
      <button class="dugme malo" data-otvori="${escAttr(f.id)}">Otvori</button>
      <button class="dugme tiho malo" data-uredi="${escAttr(f.id)}" title="Uredi">${ikona('olovka',15)}</button>`}
  ], firme || [], 'Još nema nijedne firme.');

  lista.addEventListener('click', async e => {
    const bo = e.target.closest('[data-otvori]');
    const bu = e.target.closest('[data-uredi]');
    if (bo) {
      const f = (Store.st.firme || []).find(x => x.id === bo.dataset.otvori);
      await promeniAktivnuFirmu(bo.dataset.otvori);
      toast('Aktivna firma: ' + (f ? f.naziv : ''), 'uspeh');
    }
    if (bu) {
      const f = (Store.st.firme || []).find(x => x.id === bu.dataset.uredi);
      if (f) urediFirmu(f);
    }
  });
}

function urediFirmu(firma){
  const nova = !firma;
  const f = firma || {naziv:'', pib:'', maticni_broj:'', adresa:'', mesto:'', email:'', telefon:'',
                      status:'aktivna', plan:'standard'};
  modal({
    naslov: nova ? 'Nova firma' : 'Uređivanje firme',
    sirok: true,
    telo: `
      ${nova ? infoTraka('info','Čuvanjem se automatski kreiraju: podrazumevana podešavanja, kanali prodaje, glavni magacin, razlozi povrata, kategorije troškova, email šabloni i BEX kurirski nalog (mock režim).') : ''}
      <form id="firma-modal-forma">
        ${poljeHTML({naziv:'Naziv firme', ime:'naziv', vrednost:f.naziv, obavezno:true, placeholder:'Moja Prodavnica d.o.o.'})}
        <div class="red-polja">
          ${poljeHTML({naziv:'PIB', ime:'pib', vrednost:f.pib || '', atributi:'inputmode="numeric"'})}
          ${poljeHTML({naziv:'Matični broj', ime:'maticni_broj', vrednost:f.maticni_broj || '', atributi:'inputmode="numeric"'})}
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Adresa', ime:'adresa', vrednost:f.adresa || ''})}
          ${poljeHTML({naziv:'Mesto', ime:'mesto', vrednost:f.mesto || ''})}
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Email', ime:'email', tip:'email', vrednost:f.email || ''})}
          ${poljeHTML({naziv:'Telefon', ime:'telefon', vrednost:f.telefon || ''})}
        </div>
        <div class="red-polja">
          ${poljeSelectHTML({naziv:'Status', ime:'status', vrednost:f.status,
            opcije:[{v:'aktivna',t:'Aktivna'},{v:'suspendovana',t:'Suspendovana'}],
            napomena:'Suspendovana firma: korisnici firme gube pristup do ponovne aktivacije.'})}
          ${poljeHTML({naziv:'Paket', ime:'plan', vrednost:f.plan, napomena:'Naplata paketa se uvodi kasnije — informativno polje.'})}
        </div>
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst: nova ? 'Kreiraj firmu' : 'Sačuvaj izmene', klasa:'primarno', klik: async (r, b) => {
        const d = podaciForme(r.telo.querySelector('#firma-modal-forma'));
        if (!d.naziv) { toast('Naziv firme je obavezan.', 'greska'); return; }
        const zapis = {naziv:d.naziv, pib:d.pib || null, maticni_broj:d.maticni_broj || null,
                       adresa:d.adresa || null, mesto:d.mesto || null, email:d.email || null,
                       telefon:d.telefon || null, status:d.status, plan:d.plan || 'standard'};
        b.disabled = true;
        let rezultat;
        if (nova) rezultat = await sb.from('companies').insert(zapis).select().single();
        else      rezultat = await sb.from('companies').update(zapis).eq('id', firma.id).select().single();
        b.disabled = false;
        if (rezultat.error) { toast(porukaGreske(rezultat.error), 'greska'); return; }
        r.zatvori();
        toast(nova ? 'Firma je kreirana sa podrazumevanim podešavanjima.' : 'Firma je sačuvana.', 'uspeh');
        if (nova) await promeniAktivnuFirmu(rezultat.data.id);
        else {
          if (Store.firmaId() === firma.id) Store.postavi({firma: rezultat.data});
          renderApp();
        }
      }}
    ]
  });
}

  const f = Store.st.firma;
  if (!f) { el.innerHTML = praznoIzaberiFirmu(); return; }
  const jeSuper = Store.jeSuperadmin();

  el.innerHTML = `
    <div class="kartica" style="max-width:720px">
      <h3>Podaci firme</h3>
      <p class="podnaslov">Koriste se na dokumentima, adresnicama i u komunikaciji sa kupcima.</p>
      <form id="firma-forma">

        <div class="red-polja">
          ${poljeHTML({naziv:'PIB', ime:'pib', vrednost:f.pib || '', atributi:'inputmode="numeric"'})}
          ${poljeHTML({naziv:'Matični broj', ime:'maticni_broj', vrednost:f.maticni_broj || '', atributi:'inputmode="numeric"'})}
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Adresa', ime:'adresa', vrednost:f.adresa || ''})}
          ${poljeHTML({naziv:'Mesto', ime:'mesto', vrednost:f.mesto || ''})}
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Email', ime:'email', tip:'email', vrednost:f.email || ''})}
          ${poljeHTML({naziv:'Telefon', ime:'telefon', vrednost:f.telefon || ''})}
        </div>
        ${jeSuper ? `
        <div class="red-polja">
          ${poljeSelectHTML({naziv:'Status (superadmin)', ime:'status', vrednost:f.status,
            opcije:[{v:'aktivna',t:'Aktivna'},{v:'suspendovana',t:'Suspendovana'}]})}
          ${poljeHTML({naziv:'Paket (superadmin)', ime:'plan', vrednost:f.plan})}
        </div>` : ''}
        <button class="dugme primarno">Sačuvaj izmene</button>
      </form>
    </div>
    <div class="kartica" style="max-width:720px">
      <h3>Sistemski podaci</h3>
      <dl class="kv mt">
        <dt>ID firme</dt><dd><span class="mono">${esc(f.id)}</span></dd>
        <dt>Status</dt><dd>${f.status === 'aktivna' ? plomba('Aktivna','#16803c') : plomba('Suspendovana','#c0262b')}
          ${jeSuper ? '' : '<span style="color:var(--tekst-3);font-size:12px"> · menja superadmin platforme</span>'}</dd>
        <dt>Paket</dt><dd>${esc(f.plan)}</dd>
        <dt>Kreirana</dt><dd>${fmtDatumVreme(f.created_at)}</dd>
      </dl>
    </div>`;

  document.getElementById('firma-forma').addEventListener('submit', async e => {
    e.preventDefault();
    const d = podaciForme(e.target);
    if (!d.naziv) { toast('Naziv firme je obavezan.', 'greska'); return; }
    const zapis = {naziv:d.naziv, pib:d.pib || null, maticni_broj:d.maticni_broj || null,
                   adresa:d.adresa || null, mesto:d.mesto || null, email:d.email || null,

    Store.postavi({firma: data});
    if (Store.jeSuperadmin()) {
      const i = Store.st.firme.findIndex(x => x.id === data.id);
      if (i >= 0) Store.st.firme[i] = data;
    }
    toast('Podaci firme su sačuvani.', 'uspeh');
    renderApp();
  });
}

async function tabKorisnici(el){
  const fid = Store.firmaId();
  if (!fid) { el.innerHTML = praznoIzaberiFirmu(); return; }

  el.innerHTML = `
    <div class="kartica-zaglavlje">
      <div>
        <h3>Korisnici firme</h3>
        <div class="podnaslov" style="margin:0">Uloge određuju šta ko sme da menja — čitanje podataka firme imaju svi.</div>
      </div>
      <button class="dugme primarno" id="pozovi-korisnika">${ikona('plus',16)} Pozovi korisnika</button>
    </div>
    <div id="korisnici-lista">${ucitavanjeHTML()}</div>`;
  document.getElementById('pozovi-korisnika').addEventListener('click', otvoriPozivnicu);

  const {data: korisnici, error} = await sb.from('users')
    .select('*').eq('company_id', fid).order('ime_prezime');
  const lista = document.getElementById('korisnici-lista');
  if (!lista) return;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }

  const mojId = Store.st.profil.id;
  lista.innerHTML = tabelaHTML([
    {naziv:'Ime i prezime', cel: k => `<b>${esc(k.ime_prezime || '—')}</b>${k.id === mojId ? ' <span class="cip">vi</span>' : ''}`},
    {naziv:'Email', cel: k => esc(k.email || '—')},
    {naziv:'Telefon', cel: k => esc(k.telefon || '—')},
    {naziv:'Uloga', cel: k => esc(ULOGA_NAZIV[k.uloga] || k.uloga)},
    {naziv:'Status', cel: k => plombaAktivnosti(k.aktivan)},
    {naziv:'Dodat', cel: k => fmtDatum(k.created_at)},
    {naziv:'', klasa:'akcije', cel: k =>
      `<button class="dugme tiho malo" data-uredi="${escAttr(k.id)}" title="Uredi">${ikona('olovka',15)}</button>`}
  ], korisnici || [], 'U ovoj firmi još nema korisnika — pozovite prvog.');

  lista.addEventListener('click', e => {
    const b = e.target.closest('[data-uredi]');
    if (!b) return;
    const k = (korisnici || []).find(x => x.id === b.dataset.uredi);
    if (k) urediKorisnika(k, () => tabKorisnici(el));
  });
}

function urediKorisnika(k, poUspehu){
  const jaSam = k.id === Store.st.profil.id;
  const superRed = k.uloga === 'superadmin';
  const zakljucano = jaSam || superRed;
  const napomenaUloge = zakljucano
    ? (jaSam ? 'Sopstvenu ulogu i status ne možete menjati.' : 'Superadmin nalozima upravlja platforma.')
    : (ULOGA_OPIS[k.uloga] || '');

  const m = modal({
    naslov: 'Uređivanje korisnika',
    telo: `
      <form id="korisnik-forma">
        ${poljeHTML({naziv:'Ime i prezime', ime:'ime_prezime', vrednost:k.ime_prezime, obavezno:true})}
        <div class="red-polja">
          ${poljeHTML({naziv:'Email', ime:'email', vrednost:k.email || '', atributi:'readonly',
                       napomena:'Email je vezan za nalog za prijavu.'})}
          ${poljeHTML({naziv:'Telefon', ime:'telefon', vrednost:k.telefon || ''})}
        </div>
        ${superRed
          ? poljeHTML({naziv:'Uloga', ime:'uloga_prikaz', vrednost:ULOGA_NAZIV.superadmin, atributi:'readonly'})
          : poljeSelectHTML({naziv:'Uloga', ime:'uloga', vrednost:k.uloga,
              opcije: ULOGE_FIRME.map(u => ({v:u, t:ULOGA_NAZIV[u]})),
              atributi: jaSam ? 'disabled' : '',
              napomena: `<span id="uloga-opis">${esc(napomenaUloge)}</span>`})}
        <label class="red-cekbox">
          <input type="checkbox" name="aktivan" ${k.aktivan ? 'checked' : ''} ${zakljucano ? 'disabled' : ''}>
          <span>Nalog je aktivan</span>
        </label>
        ${zakljucano ? '' : '<div class="napomena" style="margin-top:-8px;color:var(--tekst-3);font-size:12px">Deaktiviran korisnik ne može da se prijavi niti da menja podatke.</div>'}
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Sačuvaj', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#korisnik-forma');
        const d = podaciForme(forma);
        if (!d.ime_prezime) { toast('Ime i prezime je obavezno.', 'greska'); return; }
        const zapis = {ime_prezime: d.ime_prezime, telefon: d.telefon || null};
        if (!zakljucano) {
          if (d.uloga) zapis.uloga = d.uloga;
          zapis.aktivan = forma.querySelector('[name=aktivan]').checked;
        }
        b.disabled = true;
        const {error} = await sb.from('users').update(zapis).eq('id', k.id);
        b.disabled = false;
        if (error) { toast(porukaGreske(error), 'greska'); return; }
        r.zatvori();
        toast('Korisnik je sačuvan.', 'uspeh');
        if (k.id === Store.st.profil.id) {
          Store.st.profil.ime_prezime = zapis.ime_prezime;
          Store.st.profil.telefon = zapis.telefon;
          renderApp();
        }
        if (poUspehu) poUspehu();
      }}
    ]
  });

  const ulogaSelect = m.telo.querySelector('[name=uloga]');
  if (ulogaSelect) ulogaSelect.addEventListener('change', () => {
    const opis = m.telo.querySelector('#uloga-opis');
    if (opis) opis.textContent = ULOGA_OPIS[ulogaSelect.value] || '';
  });
}

/* ---------- pozivnica novog korisnika ---------- */
function otvoriPozivnicu(){
  const fid = Store.firmaId();
  const lozinka = generisiLozinku();

  const m = modal({
    naslov: 'Pozivnica za novog korisnika',
    telo: `
      <form id="pozivnica-forma">
        ${poljeHTML({naziv:'Ime i prezime', ime:'ime_prezime', obavezno:true})}
        ${poljeHTML({naziv:'Email adresa', ime:'email', tip:'email', obavezno:true,
                     napomena:'Na ovu adresu se korisnik prijavljuje u BEXCOM.'})}
        ${poljeSelectHTML({naziv:'Uloga', ime:'uloga', vrednost:'operater',
          opcije: ULOGE_FIRME.map(u => ({v:u, t:ULOGA_NAZIV[u]})),
          napomena:`<span id="poziv-uloga-opis">${esc(ULOGA_OPIS.operater)}</span>`})}
        <div class="polje">
          <label for="p-lozinka">Privremena lozinka</label>
          <div style="display:flex;gap:8px">
            <input class="unos mono" id="p-lozinka" name="lozinka" value="${escAttr(lozinka)}" readonly style="flex:1">
            <button type="button" class="dugme malo" id="poziv-regenerisi" title="Nova lozinka">${ikona('osvezi',15)}</button>
            <button type="button" class="dugme malo" id="poziv-kopiraj" title="Kopiraj">${ikona('kopiraj',15)}</button>
          </div>
          <div class="napomena">Prosledite je korisniku bezbednim kanalom — neka je promeni pri prvoj prijavi (Moj nalog).</div>
        </div>
      </form>
      ${infoTraka('info','Ako je u Supabase Auth uključena potvrda email adrese, korisnik prvo mora kliknuti na vezu iz emaila pa tek onda može da se prijavi.')}`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Kreiraj nalog', klasa:'primarno', klik: async (r, b) => {
        const d = podaciForme(r.telo.querySelector('#pozivnica-forma'));
        if (!d.ime_prezime || !d.email) { toast('Ime i email su obavezni.', 'greska'); return; }
        b.disabled = true; b.textContent = 'Kreiranje…';
        const {data, error} = await klijentZaPozivnice().auth.signUp({
          email: d.email,
          password: d.lozinka,
          options: {data: {company_id: fid, uloga: d.uloga, ime_prezime: d.ime_prezime}}
        });
        b.disabled = false; b.textContent = 'Kreiraj nalog';
        if (error) {
          toast(porukaGreske(error), 'greska', 6500);
          if (/already/i.test(String(error.message))) prikaziPostojeciKorisnik(d.email);
          return;
        }
        // Supabase pri uključenoj potvrdi emaila vraća "user" bez identiteta ako nalog već postoji
        if (data && data.user && Array.isArray(data.user.identities) && data.user.identities.length === 0) {
          prikaziPostojeciKorisnik(d.email);
          return;
        }
        r.zatvori();
        prikaziKredencijale(d);
      }}
    ]
  });

  m.telo.querySelector('#poziv-regenerisi').addEventListener('click', () => {
    m.telo.querySelector('[name=lozinka]').value = generisiLozinku();
  });
  m.telo.querySelector('#poziv-kopiraj').addEventListener('click', async () => {
    const ok = await kopirajTekst(m.telo.querySelector('[name=lozinka]').value);
    toast(ok ? 'Lozinka je kopirana.' : 'Kopiranje nije uspelo — prepišite ručno.', ok ? 'uspeh' : 'greska');
  });
  const sel = m.telo.querySelector('[name=uloga]');
  sel.addEventListener('change', () => {
    const o = m.telo.querySelector('#poziv-uloga-opis');
    if (o) o.textContent = ULOGA_OPIS[sel.value] || '';
  });
}

function prikaziPostojeciKorisnik(email){
  modal({
    naslov: 'Nalog već postoji',
    telo: `
      <p style="margin-bottom:12px">Korisnik <b>${esc(email)}</b> već ima nalog na ovom Supabase projektu,
      pa pozivnica ne može ponovo da ga kreira.</p>
      ${infoTraka('info', `Superadmin ga dodeljuje firmi iz SQL Editor-a:<br>
        <code>select app.assign_user('${escAttr(email)}', '${escAttr(Store.firmaId() || '<company_id>')}', 'operater');</code>`)}`,
    akcije: [{tekst:'U redu', klasa:'primarno', klik: r => r.zatvori()}]
  });
}

function prikaziKredencijale(d){
  const tekst = `BEXCOM pristup\nEmail: ${d.email}\nPrivremena lozinka: ${d.lozinka}`;
  const m = modal({
    naslov: 'Nalog je kreiran',
    telo: `
      ${infoTraka('uspeh', `<b>${esc(d.ime_prezime)}</b> je dodat u firmu kao ${esc(ULOGA_NAZIV[d.uloga] || d.uloga)}.`)}
      <dl class="kv" style="margin:14px 0">
        <dt>Email</dt><dd class="mono">${esc(d.email)}</dd>
        <dt>Lozinka</dt><dd class="mono">${esc(d.lozinka)}</dd>
      </dl>
      <p style="color:var(--tekst-2);font-size:13px">Ovi podaci se posle zatvaranja prozora više neće prikazati.
      Ako je uključena potvrda emaila, korisnik prvo potvrđuje adresu.</p>`,
    akcije: [
      {tekst: ikona('kopiraj',15) + ' Kopiraj podatke', klik: async () => {
        const ok = await kopirajTekst(tekst);
        toast(ok ? 'Podaci su kopirani.' : 'Kopiranje nije uspelo.', ok ? 'uspeh' : 'greska');
      }},
      {tekst:'Zatvori', klasa:'primarno', klik: r => {
        r.zatvori();
        const ruta = trenutnaRuta();
        if (ruta.modul === 'administracija') renderApp();
      }}
    ]
  });
  return m;
}

/* ============================================================
   TAB: PODEŠAVANJA
   ============================================================ */
function tabPodesavanja(el){
  if (!Store.firmaId()) { el.innerHTML = praznoIzaberiFirmu(); return; }

  const brojevi   = pod('brojevi',   {order_prefix:'PO', padding:5});
  const valuta    = pod('valuta',    {kod:'RSD', format:'1.234,56'});
  const pdv       = pod('pdv',       {podrazumevana_stopa:20});
  const zalihe    = pod('zalihe',    {niska_zaliha_prag:5, rezervisi_pri_potvrdi:true});
  const provizije = pod('provizije', {bex_po_posiljci:0, bex_procenat_otkupnine:0});
  const godina = new Date().getFullYear();
  const primer = (p, pad) => `${p || 'PO'}-${godina}-${String(1).padStart(Number(pad) || 5, '0')}`;

  el.innerHTML = `
    <div class="mreza-kartica">
      <div class="kartica">
        <h3>Brojevi dokumenata</h3>
        <p class="podnaslov">Automatska numeracija porudžbina po firmi i godini.</p>
        <form data-kljuc="brojevi">
          <div class="red-polja">
            ${poljeHTML({naziv:'Prefiks porudžbine', ime:'order_prefix', vrednost:brojevi.order_prefix ?? 'PO',
                         obavezno:true, atributi:'maxlength="8" style="text-transform:uppercase"'})}
            ${poljeHTML({naziv:'Broj cifara', ime:'padding', tip:'number', vrednost:brojevi.padding ?? 5,
                         obavezno:true, atributi:'min="3" max="8"'})}
          </div>
          <div class="napomena" style="margin:-6px 0 12px">Primer: <b class="mono" id="primer-broja">${esc(primer(brojevi.order_prefix, brojevi.padding))}</b></div>
          <button class="dugme primarno">Sačuvaj</button>
        </form>
      </div>

      <div class="kartica">
        <h3>PDV</h3>
        <p class="podnaslov">Podrazumevana stopa za nove proizvode.</p>
        <form data-kljuc="pdv">
          ${poljeHTML({naziv:'Podrazumevana stopa (%)', ime:'podrazumevana_stopa', tip:'number',
                       vrednost:pdv.podrazumevana_stopa ?? 20, obavezno:true, atributi:'min="0" max="100" step="0.01"'})}
          <button class="dugme primarno">Sačuvaj</button>
        </form>
      </div>

      <div class="kartica">
        <h3>Zalihe</h3>
        <p class="podnaslov">Ponašanje rezervacija pri potvrdi porudžbine i prag upozorenja.</p>
        <form data-kljuc="zalihe">
          ${poljeHTML({naziv:'Prag niske zalihe (kom)', ime:'niska_zaliha_prag', tip:'number',
                       vrednost:zalihe.niska_zaliha_prag ?? 5, obavezno:true, atributi:'min="0"'})}
          <label class="red-cekbox">
            <input type="checkbox" name="rezervisi_pri_potvrdi" ${zalihe.rezervisi_pri_potvrdi ? 'checked' : ''}>
            <span>Rezerviši zalihe pri potvrdi porudžbine</span>
          </label>
          <button class="dugme primarno">Sačuvaj</button>
        </form>
      </div>

      <div class="kartica">
        <h3>BEX provizije</h3>
        <p class="podnaslov">Ulaz za obračun kurirskih troškova pri sravnjenju otkupnina.</p>
        <form data-kljuc="provizije">
          <div class="red-polja">
            ${poljeHTML({naziv:'Po pošiljci (RSD)', ime:'bex_po_posiljci', tip:'number',
                         vrednost:provizije.bex_po_posiljci ?? 0, obavezno:true, atributi:'min="0" step="0.01"'})}
            ${poljeHTML({naziv:'Procenat otkupnine (%)', ime:'bex_procenat_otkupnine', tip:'number',
                         vrednost:provizije.bex_procenat_otkupnine ?? 0, obavezno:true, atributi:'min="0" max="100" step="0.01"'})}
          </div>
          <button class="dugme primarno">Sačuvaj</button>
        </form>
      </div>

      <div class="kartica">
        <h3>Valuta</h3>
        <p class="podnaslov">Prikaz iznosa u celoj aplikaciji.</p>
        <form data-kljuc="valuta">
          <div class="red-polja">
            ${poljeHTML({naziv:'Oznaka valute', ime:'kod', vrednost:valuta.kod ?? 'RSD', obavezno:true,
                         atributi:'maxlength="5" style="text-transform:uppercase"'})}
            ${poljeHTML({naziv:'Format broja', ime:'format_prikaz', vrednost:'1.234,56', atributi:'readonly',
                         napomena:'Srpski format je fiksan u F1.'})}
          </div>
          <button class="dugme primarno">Sačuvaj</button>
        </form>
      </div>
    </div>`;

  // živi primer broja porudžbine
  const forma = el.querySelector('[data-kljuc=brojevi]');
  forma.addEventListener('input', () => {
    const d = podaciForme(forma);
    const pr = document.getElementById('primer-broja');
    if (pr) pr.textContent = primer((d.order_prefix || 'PO').toUpperCase(), d.padding);
  });

  el.querySelectorAll('form[data-kljuc]').forEach(f => {
    f.addEventListener('submit', async e => {
      e.preventDefault();
      const d = podaciForme(f);
      const kljuc = f.dataset.kljuc;
      let vrednost;
      try {
        if (kljuc === 'brojevi') {
          const pad = Math.min(8, Math.max(3, parseInt(d.padding, 10) || 5));
          const pref = (d.order_prefix || 'PO').toUpperCase().replace(/[^A-Z0-9]/g, '');
          if (!pref) { toast('Prefiks mora sadržati slova ili cifre.', 'greska'); return; }
          vrednost = {order_prefix: pref, padding: pad};
        } else if (kljuc === 'pdv') {
          vrednost = {podrazumevana_stopa: Math.min(100, Math.max(0, Number(d.podrazumevana_stopa) || 0))};
        } else if (kljuc === 'zalihe') {
          vrednost = {niska_zaliha_prag: Math.max(0, parseInt(d.niska_zaliha_prag, 10) || 0),
                      rezervisi_pri_potvrdi: !!d.rezervisi_pri_potvrdi};
        } else if (kljuc === 'provizije') {
          vrednost = {bex_po_posiljci: Math.max(0, Number(d.bex_po_posiljci) || 0),
                      bex_procenat_otkupnine: Math.min(100, Math.max(0, Number(d.bex_procenat_otkupnine) || 0))};
        } else if (kljuc === 'valuta') {
          const postojece = pod('valuta', {format:'1.234,56'});
          vrednost = {kod: (d.kod || 'RSD').toUpperCase(), format: postojece.format || '1.234,56'};
        }
        await sacuvajPod(kljuc, vrednost);
        toast('Podešavanje je sačuvano.', 'uspeh');
        if (kljuc === 'brojevi' || kljuc === 'valuta') tabPodesavanja(el);
      } catch (err) {
        toast(porukaGreske(err), 'greska');
      }
    });
  });
}

/* ============================================================
   TAB: STATUSI (nazivi i boje)
   ============================================================ */
function tabStatusi(el){
  if (!Store.firmaId()) { el.innerHTML = praznoIzaberiFirmu(); return; }
  const trenutno = pod('statusi', PODRAZUMEVANI_STATUSI);

  el.innerHTML = `
    ${infoTraka('info','Sistemske šifre statusa su fiksne — na njih se vezuje automatika (BEX mapiranje, obaveštenja, sravnjenje). Ovde menjate samo <b>naziv i boju</b> koje vidi vaš tim.')}
    <div class="mreza-kartica">
      ${STATUS_GRUPE.map(g => `
        <div class="kartica">
          <h3>${esc(g.naziv)}</h3>
          <form data-grupa="${escAttr(g.kljuc)}">
            ${Object.keys(PODRAZUMEVANI_STATUSI[g.kljuc]).map(kod => {
              const s = (trenutno[g.kljuc] && trenutno[g.kljuc][kod]) || PODRAZUMEVANI_STATUSI[g.kljuc][kod];
              return `<div class="status-red">
                <span class="kod-tag">${esc(kod)}</span>
                <input class="unos" name="naziv-${escAttr(kod)}" value="${escAttr(s.naziv)}" required>
                <input class="unos" type="color" name="boja-${escAttr(kod)}" value="${escAttr(s.boja)}">
                <span data-pregled="${escAttr(kod)}">${plomba(s.naziv, s.boja)}</span>
              </div>`;
            }).join('')}
            <button class="dugme primarno mt">Sačuvaj ${esc(g.naziv.toLowerCase())}</button>
          </form>
        </div>`).join('')}
    </div>`;

  el.querySelectorAll('form[data-grupa]').forEach(f => {
    const grupa = f.dataset.grupa;
    f.addEventListener('input', () => {
      Object.keys(PODRAZUMEVANI_STATUSI[grupa]).forEach(kod => {
        const naziv = f.querySelector(`[name="naziv-${kod}"]`).value || kod;
        const boja = f.querySelector(`[name="boja-${kod}"]`).value;
        const pregled = f.querySelector(`[data-pregled="${kod}"]`);
        if (pregled) pregled.innerHTML = plomba(naziv, boja);
      });
    });
    f.addEventListener('submit', async e => {
      e.preventDefault();
      const ceo = JSON.parse(JSON.stringify(pod('statusi', PODRAZUMEVANI_STATUSI)));
      const novaGrupa = {};
      let ok = true;
      Object.keys(PODRAZUMEVANI_STATUSI[grupa]).forEach(kod => {
        const naziv = f.querySelector(`[name="naziv-${kod}"]`).value.trim();
        const boja = f.querySelector(`[name="boja-${kod}"]`).value;
        if (!naziv) ok = false;
        novaGrupa[kod] = {naziv, boja};
      });
      if (!ok) { toast('Svaki status mora imati naziv.', 'greska'); return; }
      ceo[grupa] = novaGrupa;
      try {
        await sacuvajPod('statusi', ceo);
        toast('Statusi su sačuvani.', 'uspeh');
      } catch (err) { toast(porukaGreske(err), 'greska'); }
    });
  });
}

    {naziv:'Tajna (Vault)', cel: n => n.secret_ref ? `<span class="mono">${esc(n.secret_ref)}</span>` : '—'},

      <button class="dugme tiho malo" data-obrisi="${escAttr(n.id)}" title="Obriši">${ikona('iks',15)}</button>`}
  ], nalozi || [], 'Nema kurirskih naloga — dodajte BEX nalog.');

  lista.addEventListener('click', async e => {
    const bu = e.target.closest('[data-uredi]');
    const bd = e.target.closest('[data-obrisi]');
    if (bu) {
      const n = (nalozi || []).find(x => x.id === bu.dataset.uredi);
      if (n) urediKurirskiNalog(n, () => tabKurir(el));
    }
    if (bd) {
      const n = (nalozi || []).find(x => x.id === bd.dataset.obrisi);
      if (!n) return;
      const da = await potvrdi(`Obrisati kurirski nalog „${n.naziv}“? Postojeće pošiljke ostaju, ali gube vezu sa nalogom.`,
                               {naslov:'Brisanje naloga', tekstDa:'Obriši', opasno:true});
      if (!da) return;
      const {error: ge} = await sb.from('courier_accounts').delete().eq('id', n.id);
      if (ge) { toast(porukaGreske(ge), 'greska'); return; }
      toast('Nalog je obrisan.', 'uspeh');
      tabKurir(el);
    }
  });
}

            Dozvoljene vrednosti: <span class="mono">${esc(dozvoljeniStatusi.join(', '))}</span>.

        const d = podaciForme(forma);
        if (!d.naziv) { toast('Naziv naloga je obavezan.', 'greska'); return; }

        let mapiranje;
        try {
          mapiranje = JSON.parse(d.mapiranje || '{}');
          if (typeof mapiranje !== 'object' || Array.isArray(mapiranje) || mapiranje === null) throw new Error();
        } catch (e) {

          .insert({company_id: Store.firmaId(), provajder: 'bex', ...zapis});
        else rez = await sb.from('courier_accounts').update(zapis).eq('id', nalog.id);

        toast(nov ? 'Kurirski nalog je dodat.' : 'Kurirski nalog je sačuvan.', 'uspeh');
        if (poUspehu) poUspehu();
      }}
    ]
  });

async function ucitajAudit(dodaj = false){
  const lista = document.getElementById('audit-lista');
  const josDugme = document.getElementById('audit-jos');
  if (!lista) return;
  if (!dodaj) lista.innerHTML = ucitavanjeHTML();
  if (josDugme) { josDugme.disabled = true; }

  const f = auditStanje.filteri;
  const od = auditStanje.redovi.length;
  let upit = sb.from('audit_log').select('*')
    .eq('company_id', Store.firmaId())
    .order('created_at', {ascending: false})
    .range(od, od + 49);
  if (f.tabela) upit = upit.eq('tabela', f.tabela);
  if (f.akcija) upit = upit.eq('akcija', f.akcija);
  if (f.od) upit = upit.gte('created_at', f.od + 'T00:00:00');
  if (f.do) upit = upit.lte('created_at', f.do + 'T23:59:59');

  const {data, error} = await upit;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }

  auditStanje.redovi = auditStanje.redovi.concat(data || []);
  auditStanje.kraj = !data || data.length < 50;
  prikaziAudit();
}

// '1.234,56' | '1234.56' | '1 234,5' → Number
function parsirajBroj(v){
  if (v === null || v === undefined) return 0;
  let s = String(v).trim().replace(/\s+/g, '').replace('−', '-');
  if (!s) return 0;
  if (s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}
function danasISO(){ return new Date().toISOString().slice(0, 10); }
function preNDana(n){ const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
function debounce(fn, ms = 300){
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}
function bezDijakritika(s){
  const mapa = {'š':'s','đ':'dj','č':'c','ć':'c','ž':'z','Š':'S','Đ':'Dj','Č':'C','Ć':'C','Ž':'Z'};
  return String(s ?? '').replace(/[šđčćžŠĐČĆŽ]/g, x => mapa[x]);
}
function atributiTekst(a){
  if (!a || typeof a !== 'object') return '';
  const v = Object.values(a).filter(Boolean);
  return v.length ? v.join(' / ') : '';
}
function nazivVarijante(proizvod, varijanta){
  const at = atributiTekst(varijanta && varijanta.atributi);
  return (proizvod ? proizvod.naziv : (varijanta && varijanta.naziv_snapshot) || '') + (at ? ' · ' + at : '');
}
function efektivno(varijanta, proizvod, polje){
  const v = varijanta ? varijanta[polje] : null;
  if (v !== null && v !== undefined) return Number(v);
  return proizvod ? Number(proizvod[polje] || 0) : 0;
}
function redPlacanja(nacin){ return esc(NACIN_PLACANJA[nacin] || nacin); }

/* ---------- Storage ---------- */
async function otpremiFajl(bucket, putanja, telo, contentType){
  const {error} = await sb.storage.from(bucket)
    .upload(putanja, telo, {contentType, upsert: true});
  if (error) throw error;
  return putanja;
}
async function preuzmiFajl(bucket, putanja, imeFajla){
  const {data, error} = await sb.storage.from(bucket).download(putanja);
  if (error) throw error;
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url; a.download = imeFajla || putanja.split('/').pop();
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

function izveziXLSX(imeFajla, listovi){ // listovi: [{naziv, zaglavlje:[..], redovi:[[..]]}]
  if (typeof XLSX === 'undefined') { toast('Excel biblioteka (CDN) nije učitana.', 'greska'); return; }
  const wb = XLSX.utils.book_new();
  listovi.forEach(l => {
    const ws = XLSX.utils.aoa_to_sheet([l.zaglavlje, ...l.redovi]);
    XLSX.utils.book_append_sheet(wb, ws, l.naziv.slice(0, 31));
  });
  XLSX.writeFile(wb, imeFajla);
}
