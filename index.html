/* ---------- birači (varijanta, kupac) ---------- */
function birajVarijantu(onIzbor){
  const m = modal({
    naslov: 'Izbor artikla',
    sirok: true,
    telo: `
      <div class="polje"><input class="unos" id="bv-pretraga" placeholder="Naziv, SKU ili barkod… (min. 2 znaka)" autocomplete="off"></div>
      <div id="bv-rezultati"><div class="prazno"><p>Ukucajte deo naziva ili SKU.</p></div></div>`,
    akcije: [{tekst:'Zatvori', klik: r => r.zatvori()}]
  });
  const rez = m.telo.querySelector('#bv-rezultati');
  const pretrazi = debounce(async (q) => {
    if (!q || q.length < 2) return;
    rez.innerHTML = ucitavanjeHTML('Pretraga…');
    const fid = Store.firmaId();
    const like = `%${q}%`;
    const [pr, vr] = await Promise.all([
      sb.from('products').select('id,naziv,sku,prodajna_cena,nabavna_cena,pdv_stopa,aktivan')
        .eq('company_id', fid).eq('aktivan', true)
        .or(`naziv.ilike.${like},sku.ilike.${like},barkod.ilike.${like}`).limit(12),
      sb.from('product_variants').select('id,product_id,sku,atributi,prodajna_cena,nabavna_cena,aktivan')
        .eq('company_id', fid).eq('aktivan', true)
        .or(`sku.ilike.${like},barkod.ilike.${like}`).limit(12)
    ]);
    if (pr.error || vr.error) { rez.innerHTML = infoTraka('upozorenje', esc(porukaGreske(pr.error || vr.error))); return; }
    const idProizvoda = new Set((pr.data || []).map(p => p.id));
    (vr.data || []).forEach(v => idProizvoda.add(v.product_id));
    if (!idProizvoda.size) { rez.innerHTML = '<div class="prazno"><p>Nema artikala za ovu pretragu.</p></div>'; return; }
    const {data: varijante, error} = await sb.from('product_variants')
      .select('id,product_id,sku,atributi,prodajna_cena,nabavna_cena,je_default,aktivan')
      .eq('company_id', fid).eq('aktivan', true)
      .in('product_id', [...idProizvoda]).limit(60);
    if (error) { rez.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
    const {data: proizvodi} = await sb.from('products')
      .select('id,naziv,sku,prodajna_cena,nabavna_cena,pdv_stopa')
      .eq('company_id', fid).in('id', [...idProizvoda]);
    const pMapa = {}; (proizvodi || []).forEach(p => pMapa[p.id] = p);
    rez.innerHTML = (varijante || []).map(v => {
      const p = pMapa[v.product_id] || {};
      return `<div class="rezultat-stavka" data-vid="${escAttr(v.id)}">
        <div><b>${esc(nazivVarijante(p, v))}</b>
          <div style="font-size:12px;color:var(--tekst-3)" class="mono">${esc(v.sku || p.sku || '—')}</div></div>
        <div class="mono" style="white-space:nowrap">${fmtNovac(efektivno(v, p, 'prodajna_cena'))}</div>
      </div>`;
    }).join('') || '<div class="prazno"><p>Nema aktivnih varijanti.</p></div>';
    rez.querySelectorAll('[data-vid]').forEach(el => el.addEventListener('click', () => {
      const v = varijante.find(x => x.id === el.dataset.vid);
      const p = pMapa[v.product_id] || {};
      m.zatvori();
      onIzbor({varijanta: v, proizvod: p});
    }));
  }, 320);
  m.telo.querySelector('#bv-pretraga').addEventListener('input', e => pretrazi(e.target.value.trim()));
}

async function aktivniMagacini(){
  const {data} = await sb.from('warehouses').select('*')
    .eq('company_id', Store.firmaId()).eq('aktivan', true).order('created_at');
  return data || [];
}
async function nazivVarijantiMapa(variantIds){
  const ids = [...new Set(variantIds.filter(Boolean))];
  if (!ids.length) return {};
  const {data: varijante} = await sb.from('product_variants')
    .select('id,product_id,sku,atributi').in('id', ids);
  const pids = [...new Set((varijante || []).map(v => v.product_id))];
  const {data: proizvodi} = pids.length
    ? await sb.from('products').select('id,naziv,sku').in('id', pids)
    : {data: []};
  const pMapa = {}; (proizvodi || []).forEach(p => pMapa[p.id] = p);
  const mapa = {};
  (varijante || []).forEach(v => {
    const p = pMapa[v.product_id] || {};
    mapa[v.id] = {naziv: nazivVarijante(p, v), sku: v.sku || p.sku || ''};
  });
  return mapa;
}

// Neotpuštene rezervacije za porudžbinu: {'wid|vid': kolicina}
async function otvoreneRezervacije(orderId){
  const {data} = await sb.from('stock_movements')
    .select('warehouse_id,variant_id,tip,kolicina')
    .eq('company_id', Store.firmaId()).eq('ref_tip', 'order').eq('ref_id', orderId)
    .in('tip', ['rezervacija', 'otpust']);
  const mapa = {};
  (data || []).forEach(r => {
    const k = r.warehouse_id + '|' + r.variant_id;
    mapa[k] = (mapa[k] || 0) + (r.tip === 'rezervacija' ? 1 : -1) * Number(r.kolicina);
  });
  Object.keys(mapa).forEach(k => { if (mapa[k] <= 0) delete mapa[k]; });
  return mapa;
}

const katalogStanje = {pretraga:'', prikaziNeaktivne:false, redovi:[], kraj:false};

function renderKatalog(el, ruta){
  if (!Store.firmaId()) { el.innerHTML = praznoIzaberiFirmu(); return; }
  if (ruta.pod === 'proizvod' && ruta.id) { renderProizvodDetalj(el, ruta.id); return; }

  const tabovi = [{id:'proizvodi', naziv:'Proizvodi'}, {id:'dobavljaci', naziv:'Dobavljači'}, {id:'kanali', naziv:'Kanali prodaje'}];
  const aktivan = tabovi.some(t => t.id === ruta.pod) ? ruta.pod : 'proizvodi';
  el.innerHTML = `
    <div class="sadrzaj-zaglavlje"><h1>Katalog</h1></div>
    <div class="tabovi">${tabovi.map(t =>
      `<button class="tab ${t.id === aktivan ? 'aktivan' : ''}" data-tab="${t.id}">${esc(t.naziv)}</button>`).join('')}</div>
    <div id="katalog-sadrzaj"></div>`;

async function ucitajProizvode(dodaj = false){
  const lista = document.getElementById('pr-lista');
  const jos = document.getElementById('pr-jos');
  if (!lista) return;
  if (!dodaj) lista.innerHTML = ucitavanjeHTML();

  let upit = sb.from('products').select('*')
    .eq('company_id', Store.firmaId())
    .order('created_at', {ascending: false})
    .range(katalogStanje.redovi.length, katalogStanje.redovi.length + 24);
  if (!katalogStanje.prikaziNeaktivne) upit = upit.eq('aktivan', true);
  if (katalogStanje.pretraga) {
    const like = `%${katalogStanje.pretraga}%`;
    upit = upit.or(`naziv.ilike.${like},sku.ilike.${like},barkod.ilike.${like},kategorija.ilike.${like}`);
  }
  const {data, error} = await upit;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  katalogStanje.redovi = katalogStanje.redovi.concat(data || []);
  katalogStanje.kraj = !data || data.length < 25;

  lista.innerHTML = tabelaHTML([
    {naziv:'Proizvod', cel: p => `<b>${esc(p.naziv)}</b>${p.kategorija ? `<div style="font-size:12px;color:var(--tekst-3)">${esc(p.kategorija)}</div>` : ''}`},
    {naziv:'SKU', cel: p => `<span class="mono">${esc(p.sku || '—')}</span>`},
    {naziv:'Nabavna', klasa:'desno', cel: p => fmtNovac(p.nabavna_cena)},
    {naziv:'Prodajna', klasa:'desno', cel: p => fmtNovac(p.prodajna_cena)},
    {naziv:'PDV', klasa:'desno', cel: p => fmtBroj(p.pdv_stopa, 0) + '%'},
    {naziv:'Status', cel: p => plombaAktivnosti(p.aktivan)},
    {naziv:'', klasa:'akcije', cel: p => `<button class="dugme malo" data-otvori="${escAttr(p.id)}">Otvori</button>`}
  ], katalogStanje.redovi, 'Nema proizvoda — dodajte prvi.');

  if (jos) jos.style.display = katalogStanje.kraj ? 'none' : '';
  lista.querySelectorAll('[data-otvori]').forEach(b =>
    b.addEventListener('click', () => { location.hash = '#/katalog/proizvod/' + b.dataset.otvori; }));
}

function urediProizvod(p, poUspehu){
  const nov = !p;
  const z = p || {naziv:'', sku:'', barkod:'', kategorija:'', nabavna_cena:0, prodajna_cena:0,
                  pdv_stopa: (pod('pdv', {podrazumevana_stopa:20}).podrazumevana_stopa ?? 20),
                  tezina_kg:'', opis:'', supplier_id:'', aktivan:true};
  const m = modal({
    naslov: nov ? 'Novi proizvod' : 'Uređivanje proizvoda',
    sirok: true,
    telo: `
      <form id="proizvod-forma">
        ${poljeHTML({naziv:'Naziv', ime:'naziv', vrednost:z.naziv, obavezno:true})}
        <div class="red-polja">
          ${poljeHTML({naziv:'SKU', ime:'sku', vrednost:z.sku || '', napomena:'Jedinstven u okviru firme.'})}
          ${poljeHTML({naziv:'Barkod', ime:'barkod', vrednost:z.barkod || ''})}
          ${poljeHTML({naziv:'Kategorija', ime:'kategorija', vrednost:z.kategorija || ''})}
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Nabavna cena (RSD)', ime:'nabavna_cena', vrednost:fmtBroj(z.nabavna_cena), atributi:'inputmode="decimal"'})}
          ${poljeHTML({naziv:'Prodajna cena (RSD)', ime:'prodajna_cena', vrednost:fmtBroj(z.prodajna_cena), atributi:'inputmode="decimal"'})}
          ${poljeHTML({naziv:'PDV stopa (%)', ime:'pdv_stopa', tip:'number', vrednost:z.pdv_stopa, atributi:'min="0" max="100" step="0.01"'})}
          ${poljeHTML({naziv:'Težina (kg)', ime:'tezina_kg', vrednost:z.tezina_kg ?? '', atributi:'inputmode="decimal"'})}
        </div>
        <div class="polje"><label>Dobavljač</label><select class="unos" name="supplier_id" id="pf-dobavljac"><option value="">— bez dobavljača —</option></select></div>
        <div class="polje"><label>Opis</label><textarea class="unos" name="opis" rows="3" style="font-family:var(--font-tekst)">${esc(z.opis || '')}</textarea></div>
        <label class="red-cekbox"><input type="checkbox" name="aktivan" ${z.aktivan ? 'checked' : ''}><span>Proizvod je aktivan</span></label>
        ${nov ? '<div class="napomena">Uz proizvod se automatski kreira podrazumevana varijanta — zalihe i porudžbine uvek idu preko varijante.</div>' : ''}
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst: nov ? 'Kreiraj proizvod' : 'Sačuvaj', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#proizvod-forma');
        const d = podaciForme(forma);
        if (!d.naziv) { toast('Naziv je obavezan.', 'greska'); return; }
        const zapis = {
          naziv: d.naziv, sku: d.sku || null, barkod: d.barkod || null,
          kategorija: d.kategorija || null, supplier_id: d.supplier_id || null,
          nabavna_cena: parsirajBroj(d.nabavna_cena), prodajna_cena: parsirajBroj(d.prodajna_cena),
          pdv_stopa: Math.min(100, Math.max(0, Number(d.pdv_stopa) || 0)),
          tezina_kg: d.tezina_kg === '' ? null : parsirajBroj(d.tezina_kg),
          opis: d.opis || null, aktivan: forma.querySelector('[name=aktivan]').checked
        };
        b.disabled = true;
        let rez;
        if (nov) {
          rez = await sb.from('products').insert({company_id: Store.firmaId(), ...zapis}).select().single();
          if (!rez.error) {
            const v = await sb.from('product_variants').insert({
              company_id: Store.firmaId(), product_id: rez.data.id, je_default: true, atributi: {}
            });
            if (v.error) { toast('Proizvod je kreiran, ali varijanta nije: ' + porukaGreske(v.error), 'greska', 7000); }
          }
        } else {
          rez = await sb.from('products').update(zapis).eq('id', p.id).select().single();
        }
        b.disabled = false;
        if (rez.error) { toast(porukaGreske(rez.error), 'greska'); return; }
        r.zatvori();
        toast(nov ? 'Proizvod je kreiran.' : 'Proizvod je sačuvan.', 'uspeh');
        if (nov) location.hash = '#/katalog/proizvod/' + rez.data.id;
        else if (poUspehu) poUspehu(rez.data);
      }}
    ]
  });
  // dobavljači u select
  sb.from('suppliers').select('id,naziv').eq('company_id', Store.firmaId()).eq('aktivan', true)
    .order('naziv').then(({data}) => {
      const sel = m.telo.querySelector('#pf-dobavljac');
      if (!sel) return;
      (data || []).forEach(s => {
        const o = document.createElement('option');
        o.value = s.id; o.textContent = s.naziv;
        if (z.supplier_id === s.id) o.selected = true;
        sel.appendChild(o);
      });
    });
}

      urediVarijantu(null, p, () => renderProizvodDetalj(el, pid)));
    const inputSlika = el.querySelector('#pd-slika');
    if (inputSlika) inputSlika.addEventListener('change', async e => {
      const fajlovi = [...e.target.files];
      if (!fajlovi.length) return;
      toast(`Otpremanje ${fajlovi.length} slika…`);
      for (const f of fajlovi) {
        try {
          const ime = f.name.replace(/[^\w.\-]+/g, '_');
          const putanja = `${Store.firmaId()}/${pid}/${Date.now()}_${ime}`;
          await otpremiFajl('product-images', putanja, f, f.type || 'image/jpeg');
          const {error: ge} = await sb.from('product_images').insert({
            company_id: Store.firmaId(), product_id: pid, storage_path: putanja,
            redosled: (slike ? slike.length : 0) + 1
          });
          if (ge) throw ge;
        } catch (err) { toast('Slika nije otpremljena: ' + porukaGreske(err), 'greska', 6000); }
      }
      toast('Slike su otpremljene.', 'uspeh');
      renderProizvodDetalj(el, pid);
    });
  }

  prikaziVarijante(el.querySelector('#pd-varijante'), varijante || [], p, mozeK, () => renderProizvodDetalj(el, pid));
  prikaziSlike(el.querySelector('#pd-slike'), slike || [], mozeK, () => renderProizvodDetalj(el, pid));
}

function urediVarijantu(v, p, poUspehu){
  const nov = !v;
  const z = v || {sku:'', barkod:'', atributi:{}, nabavna_cena:null, prodajna_cena:null, je_default:false, aktivan:true};
  const atributiJSON = JSON.stringify(z.atributi || {}, null, 2);
  modal({
    naslov: nov ? 'Nova varijanta' : 'Uređivanje varijante',
    telo: `
      <form id="var-forma">
        <div class="red-polja">
          ${poljeHTML({naziv:'SKU varijante', ime:'sku', vrednost:z.sku || ''})}
          ${poljeHTML({naziv:'Barkod', ime:'barkod', vrednost:z.barkod || ''})}
        </div>
        <div class="polje">
          <label>Atributi (JSON)</label>
          <textarea class="unos" name="atributi" rows="4">${esc(atributiJSON)}</textarea>
          <div class="napomena">Npr. {"boja":"crna","velicina":"L"}</div>
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Nabavna (prazno = nasleđuje)', ime:'nabavna_cena',
                       vrednost: z.nabavna_cena === null ? '' : fmtBroj(z.nabavna_cena), atributi:'inputmode="decimal"'})}
          ${poljeHTML({naziv:'Prodajna (prazno = nasleđuje)', ime:'prodajna_cena',
                       vrednost: z.prodajna_cena === null ? '' : fmtBroj(z.prodajna_cena), atributi:'inputmode="decimal"'})}
        </div>
        <label class="red-cekbox"><input type="checkbox" name="je_default" ${z.je_default ? 'checked' : ''}><span>Podrazumevana varijanta</span></label>
        <label class="red-cekbox"><input type="checkbox" name="aktivan" ${z.aktivan ? 'checked' : ''}><span>Aktivna</span></label>
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst: nov ? 'Dodaj' : 'Sačuvaj', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#var-forma');
        const d = podaciForme(forma);
        let atributi;
        try {
          atributi = JSON.parse(d.atributi || '{}');
          if (typeof atributi !== 'object' || Array.isArray(atributi)) throw 0;
        } catch (e) { toast('Atributi nisu ispravan JSON objekat.', 'greska'); return; }
        const zapis = {
          sku: d.sku || null, barkod: d.barkod || null, atributi,
          nabavna_cena: d.nabavna_cena === '' ? null : parsirajBroj(d.nabavna_cena),
          prodajna_cena: d.prodajna_cena === '' ? null : parsirajBroj(d.prodajna_cena),
          je_default: forma.querySelector('[name=je_default]').checked,
          aktivan: forma.querySelector('[name=aktivan]').checked
        };
        b.disabled = true;
        let rez;
        if (nov) rez = await sb.from('product_variants')
          .insert({company_id: Store.firmaId(), product_id: p.id, ...zapis}).select().single();
        else rez = await sb.from('product_variants').update(zapis).eq('id', v.id).select().single();
        if (!rez.error && zapis.je_default) {
          await sb.from('product_variants').update({je_default: false})
            .eq('product_id', p.id).neq('id', rez.data.id);
        }
        b.disabled = false;
        if (rez.error) { toast(porukaGreske(rez.error), 'greska'); return; }
        r.zatvori(); toast('Varijanta je sačuvana.', 'uspeh');
        if (poUspehu) poUspehu();
      }}
    ]
  });
}

async function prikaziSlike(el, slike, mozeK, osvezi){
  if (!el || !slike.length) return;
  const potpisane = await Promise.all(slike.map(s =>
    sb.storage.from('product-images').createSignedUrl(s.storage_path, 3600)
      .then(r => ({s, url: r.data ? r.data.signedUrl : null}))));
  el.innerHTML = potpisane.map(({s, url}) => `
    <div class="minijatura">
      ${url ? `<img src="${escAttr(url)}" alt="">` : '<div style="padding:30px 6px;text-align:center;font-size:11px;color:var(--tekst-3)">nedostupno</div>'}
      ${mozeK ? `<button class="dugme tiho malo x" data-sb="${escAttr(s.id)}" title="Obriši">${ikona('iks',13)}</button>` : ''}
    </div>`).join('');
  if (!mozeK) return;
  el.querySelectorAll('[data-sb]').forEach(b => b.addEventListener('click', async () => {
    const s = slike.find(x => x.id === b.dataset.sb);
    const da = await potvrdi('Obrisati ovu sliku?', {tekstDa:'Obriši', opasno:true});
    if (!da) return;
    await sb.storage.from('product-images').remove([s.storage_path]);
    const {error} = await sb.from('product_images').delete().eq('id', s.id);
    if (error) { toast(porukaGreske(error), 'greska'); return; }
    toast('Slika je obrisana.', 'uspeh'); osvezi();
  }));
}

/* ---------- stanje ---------- */
async function tabStanjeZaliha(el){
  const magacini = await aktivniMagacini();
  const f = zaliheStanje.stanje;
  const prag = Number(pod('zalihe', {niska_zaliha_prag:5}).niska_zaliha_prag ?? 5);

  el.innerHTML = `
    <div class="filter-traka">
      <div class="polje"><label>Magacin</label>
        <select class="unos" id="zs-magacin"><option value="">Svi magacini</option>
          ${magacini.map(m => `<option value="${m.id}" ${f.magacin === m.id ? 'selected' : ''}>${esc(m.naziv)}</option>`).join('')}
        </select></div>
      <div class="polje" style="flex:1;min-width:200px"><label>Pretraga</label>
        <input class="unos" id="zs-pretraga" placeholder="Naziv ili SKU" value="${escAttr(f.pretraga)}"></div>
      <label class="red-cekbox" style="margin:0 0 2px">
        <input type="checkbox" id="zs-niske" ${f.samoNiske ? 'checked' : ''}>
        <span>Samo niske (dostupno ≤ ${fmtBroj(prag, 0)})</span></label>
      <button class="dugme" id="zs-izvoz">${ikona('dokument',15)} Excel</button>
    </div>
    <div id="zs-lista">${ucitavanjeHTML()}</div>`;

  let podaci = [];
  const nacrtaj = () => {
    const q = f.pretraga.toLowerCase();
    const redovi = podaci.filter(r =>
      (!f.magacin || r.warehouse_id === f.magacin) &&
      (!f.samoNiske || Number(r.dostupno) <= prag) &&
      (!q || r._naziv.toLowerCase().includes(q) || r._sku.toLowerCase().includes(q)));
    document.getElementById('zs-lista').innerHTML = tabelaHTML([
      {naziv:'Artikal', cel: r => `<b>${esc(r._naziv)}</b>`},
      {naziv:'SKU', cel: r => `<span class="mono">${esc(r._sku || '—')}</span>`},
      {naziv:'Magacin', cel: r => esc(r._magacin)},
      {naziv:'Količina', klasa:'desno', cel: r => fmtBroj(r.kolicina, 0)},
      {naziv:'Rezervisano', klasa:'desno', cel: r => fmtBroj(r.rezervisano, 0)},
      {naziv:'Dostupno', klasa:'desno', cel: r => Number(r.dostupno) <= prag
        ? `<b class="negativno">${fmtBroj(r.dostupno, 0)}</b>` : `<b>${fmtBroj(r.dostupno, 0)}</b>`},
      {naziv:'Ažurirano', cel: r => fmtDatum(r.updated_at)}
    ], redovi, 'Nema zaliha — evidentirajte prvi ulaz u tabu Promet.');
    const izvoz = document.getElementById('zs-izvoz');
    if (izvoz) izvoz.onclick = () => izveziXLSX(`bexcom_zalihe_${danasISO()}.xlsx`, [{
      naziv: 'Zalihe',
      zaglavlje: ['Artikal','SKU','Magacin','Kolicina','Rezervisano','Dostupno'],
      redovi: redovi.map(r => [r._naziv, r._sku, r._magacin, Number(r.kolicina), Number(r.rezervisano), Number(r.dostupno)])
    }]);
  };

  const {data, error} = await sb.from('stock').select('*')
    .eq('company_id', Store.firmaId()).order('updated_at', {ascending: false}).limit(500);
  if (error) { document.getElementById('zs-lista').innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  const mapa = await nazivVarijantiMapa((data || []).map(r => r.variant_id));
  const mMapa = {}; magacini.forEach(m => mMapa[m.id] = m.naziv);
  podaci = (data || []).map(r => ({...r,
    _naziv: (mapa[r.variant_id] || {}).naziv || kratakId(r.variant_id),
    _sku: (mapa[r.variant_id] || {}).sku || '',
    _magacin: mMapa[r.warehouse_id] || kratakId(r.warehouse_id)}));
  nacrtaj();

  el.querySelector('#zs-magacin').addEventListener('change', e => { f.magacin = e.target.value; nacrtaj(); });
  el.querySelector('#zs-pretraga').addEventListener('input', debounce(e => { f.pretraga = e.target.value.trim(); nacrtaj(); }, 250));
  el.querySelector('#zs-niske').addEventListener('change', e => { f.samoNiske = e.target.checked; nacrtaj(); });
}

          ${Object.entries(PROMET_TIP).map(([v, t]) => `<option value="${v}" ${f.tip === v ? 'selected' : ''}>${esc(t.naziv)}</option>`).join('')}</select></div>
      <div class="polje"><label>Od</label><input class="unos" type="date" id="zp-od" value="${escAttr(f.od)}"></div>
      <div class="polje"><label>Do</label><input class="unos" type="date" id="zp-do" value="${escAttr(f.do)}"></div>
      <button class="dugme" id="zp-primeni">Primeni</button>
      ${mozeP ? `<button class="dugme primarno" id="zp-novi">${ikona('plus',16)} Novi promet</button>` : ''}
    </div>
    ${infoTraka('info','Promet je nepromenjiv dnevnik — ispravka je uvek nova stavka suprotnog smera ili popis-korekcija.')}
    <div id="zp-lista">${ucitavanjeHTML()}</div>
    <div class="centar mt"><button class="dugme" id="zp-jos" style="display:none">Učitaj još</button></div>`;

  el.querySelector('#zp-primeni').addEventListener('click', () => {
    Object.assign(f, {
      magacin: el.querySelector('#zp-magacin').value,
      tip: el.querySelector('#zp-tip').value,
      od: el.querySelector('#zp-od').value,
      do: el.querySelector('#zp-do').value,
      redovi: [], kraj: false
    });
    ucitajPromet(magacini);
  });
  el.querySelector('#zp-jos').addEventListener('click', () => ucitajPromet(magacini, true));
  if (mozeP) el.querySelector('#zp-novi').addEventListener('click', () =>
    noviPromet(magacini, () => { f.redovi = []; f.kraj = false; ucitajPromet(magacini); }));

  f.redovi = []; f.kraj = false;
  ucitajPromet(magacini);
}

async function ucitajPromet(magacini, dodaj = false){
  const lista = document.getElementById('zp-lista');
  const jos = document.getElementById('zp-jos');
  if (!lista) return;
  if (!dodaj) lista.innerHTML = ucitavanjeHTML();
  const f = zaliheStanje.promet;

  let upit = sb.from('stock_movements').select('*')
    .eq('company_id', Store.firmaId())
    .order('created_at', {ascending: false})
    .range(f.redovi.length, f.redovi.length + 49);
  if (f.magacin) upit = upit.eq('warehouse_id', f.magacin);
  if (f.tip) upit = upit.eq('tip', f.tip);
  if (f.od) upit = upit.gte('created_at', f.od + 'T00:00:00');
  if (f.do) upit = upit.lte('created_at', f.do + 'T23:59:59');
  const {data, error} = await upit;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  f.redovi = f.redovi.concat(data || []);
  f.kraj = !data || data.length < 50;

  const mapa = await nazivVarijantiMapa(f.redovi.map(r => r.variant_id));
  const mMapa = {}; magacini.forEach(m => mMapa[m.id] = m.naziv);
  lista.innerHTML = tabelaHTML([
    {naziv:'Vreme', cel: r => `<span style="white-space:nowrap">${fmtDatumVreme(r.created_at)}</span>`},
    {naziv:'Tip', cel: r => { const t = PROMET_TIP[r.tip] || {naziv:r.tip, boja:'#64748b'}; return plomba(t.naziv, t.boja); }},
    {naziv:'Artikal', cel: r => esc((mapa[r.variant_id] || {}).naziv || kratakId(r.variant_id))},
    {naziv:'Magacin', cel: r => esc(mMapa[r.warehouse_id] || kratakId(r.warehouse_id))},
    {naziv:'Količina', klasa:'desno', cel: r => {
      const s = (PROMET_TIP[r.tip] || {}).smer || 0;
      const k = fmtBroj(r.kolicina, 0);
      return s > 0 ? `<b class="pozitivno">+${k}</b>` : s < 0 ? `<b class="negativno">−${k}</b>` : `<b>${k}</b>`;
    }},
    {naziv:'Veza / napomena', cel: r => esc([r.ref_tip, r.napomena].filter(Boolean).join(' · ') || '—')}
  ], f.redovi, 'Nema prometa za izabrane filtere.');
  if (jos) jos.style.display = f.kraj ? 'none' : '';
}

function noviPromet(magacini, poUspehu){
  if (!magacini.length) { toast('Prvo dodajte magacin (tab Magacini).', 'greska'); return; }
  let izabrano = null; // {varijanta, proizvod}
  const m = modal({
    naslov: 'Novi promet zaliha',
    telo: `
      <form id="promet-forma">
        ${poljeSelectHTML({naziv:'Tip prometa', ime:'tip', vrednost:'ulaz', opcije:[
          {v:'ulaz', t:'Ulaz (nabavka, početno stanje)'},
          {v:'izlaz', t:'Izlaz (ručno razduženje)'},
          {v:'prenos', t:'Prenos između magacina'},
          {v:'popis_korekcija', t:'Korekcija (± na stanje)'}
        ]})}
        <div class="polje">
          <label class="obavezno">Artikal</label>
          <button type="button" class="dugme" id="np-artikal" style="justify-content:flex-start">${ikona('kutija',15)} Izaberi artikal…</button>
        </div>
        <div class="red-polja" id="np-magacini">
          ${poljeSelectHTML({naziv:'Magacin', ime:'warehouse_id',
            opcije: magacini.map(x => ({v:x.id, t:x.naziv}))})}
        </div>
        ${poljeHTML({naziv:'Količina', ime:'kolicina', vrednost:'1', obavezno:true, atributi:'inputmode="decimal"',
          napomena:'Kod korekcije može biti negativna (npr. −2).'})}
        ${poljeHTML({naziv:'Napomena', ime:'napomena', placeholder:'npr. prijem od dobavljača'})}
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Evidentiraj', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#promet-forma');
        const d = podaciForme(forma);
        if (!izabrano) { toast('Izaberite artikal.', 'greska'); return; }
        const kol = parsirajBroj(d.kolicina);
        if (!kol) { toast('Količina ne sme biti nula.', 'greska'); return; }
        const fid = Store.firmaId();
        b.disabled = true;
        let greska = null;
        if (d.tip === 'prenos') {
          const iz = forma.querySelector('[name=warehouse_id]').value;
          const u = forma.querySelector('[name=warehouse_u]').value;
          if (iz === u) { toast('Izaberite dva različita magacina.', 'greska'); b.disabled = false; return; }
          if (kol <= 0) { toast('Za prenos količina mora biti veća od nule.', 'greska'); b.disabled = false; return; }
          const r1 = await sb.from('stock_movements').insert({company_id: fid, warehouse_id: iz,
            variant_id: izabrano.varijanta.id, tip: 'prenos_out', kolicina: kol, ref_tip: 'prenos', napomena: d.napomena || null});
          greska = r1.error;
          if (!greska) {
            const r2 = await sb.from('stock_movements').insert({company_id: fid, warehouse_id: u,
              variant_id: izabrano.varijanta.id, tip: 'prenos_in', kolicina: kol, ref_tip: 'prenos', napomena: d.napomena || null});
            greska = r2.error;
            if (greska) toast('PAŽNJA: izlazna strana prenosa je evidentirana, ulazna nije — evidentirajte ručni ulaz.', 'greska', 9000);
          }
        } else {
          let tip = d.tip, kolicina = kol;
          if (tip !== 'popis_korekcija' && kolicina < 0) kolicina = Math.abs(kolicina);
          const rez = await sb.from('stock_movements').insert({company_id: fid,
            warehouse_id: d.warehouse_id, variant_id: izabrano.varijanta.id,
            tip, kolicina, ref_tip: 'rucno', napomena: d.napomena || null});
          greska = rez.error;
        }
        b.disabled = false;
        if (greska) { toast(porukaGreske(greska), 'greska', 7000); return; }
        r.zatvori(); toast('Promet je evidentiran.', 'uspeh');
        if (poUspehu) poUspehu();
      }}
    ]
  });

  m.telo.querySelector('#np-artikal').addEventListener('click', () => birajVarijantu(({varijanta, proizvod}) => {
    izabrano = {varijanta, proizvod};
    m.telo.querySelector('#np-artikal').innerHTML = ikona('kvacica', 15) + ' ' + esc(nazivVarijante(proizvod, varijanta));
  }));
  m.telo.querySelector('[name=tip]').addEventListener('change', e => {
    const omot = m.telo.querySelector('#np-magacini');
    if (e.target.value === 'prenos') {
      omot.innerHTML = poljeSelectHTML({naziv:'Iz magacina', ime:'warehouse_id',
          opcije: magacini.map(x => ({v:x.id, t:x.naziv}))}) +
        poljeSelectHTML({naziv:'U magacin', ime:'warehouse_u',
          opcije: magacini.map(x => ({v:x.id, t:x.naziv})), vrednost: magacini[1] ? magacini[1].id : magacini[0].id});
    } else {
      omot.innerHTML = poljeSelectHTML({naziv:'Magacin', ime:'warehouse_id',
        opcije: magacini.map(x => ({v:x.id, t:x.naziv}))});
    }
  });
}

async function renderPopisDetalj(el, popisId){
  el.innerHTML = ucitavanjeHTML('Učitavanje popisa…');
  const mozeP = Store.mozeDaPise('admin', 'magacioner');
  const [{data: popis, error}, {data: stavke}, magacini] = await Promise.all([
    sb.from('stock_counts').select('*').eq('id', popisId).maybeSingle(),
    sb.from('stock_count_items').select('*').eq('stock_count_id', popisId).order('id'),
    aktivniMagacini()
  ]);
  if (error || !popis) {
    el.innerHTML = `<div class="prazno"><h3>Popis nije pronađen</h3>
      <button class="dugme" onclick="idiNa('zalihe','popisi')">Nazad</button></div>`;
    return;
  }
  const mMapa = {}; magacini.forEach(m => mMapa[m.id] = m.naziv);
  const uToku = popis.status === 'u_toku';
  const mapa = await nazivVarijantiMapa((stavke || []).map(s => s.variant_id));
  const POPIS_STATUS = {u_toku:{t:'U toku', b:'#b45309'}, zakljucen:{t:'Zaključen', b:'#16803c'}, otkazan:{t:'Otkazan', b:'#8a979d'}};

  el.innerHTML = `
    <div class="detalj-zaglavlje">
      <button class="dugme tiho malo" onclick="idiNa('zalihe','popisi')">← Popisi</button>
      <h1>Popis · ${esc(mMapa[popis.warehouse_id] || '')}</h1>
      ${plomba(POPIS_STATUS[popis.status].t, POPIS_STATUS[popis.status].b)}
      ${uToku && mozeP ? `<div class="traka-akcije">
        <button class="dugme" id="pd-dodaj">${ikona('plus',15)} Dodaj artikal</button>
        <button class="dugme opasno" id="pd-otkazi">Otkaži</button>
        <button class="dugme primarno" id="pd-zakljuci">${ikona('kvacica',15)} Zaključi popis</button>
      </div>` : ''}
    </div>
    ${popis.napomena ? `<p style="color:var(--tekst-2);margin:-8px 0 14px">${esc(popis.napomena)}</p>` : ''}
    ${uToku ? infoTraka('info','Unesite izbrojane količine — zaključenjem se za svaku razliku automatski knjiži <b>popis-korekcija</b> u prometu.') : ''}
    <div class="kartica"><div id="pd-stavke"></div></div>`;

  const nacrtaj = (lista) => {
    document.getElementById('pd-stavke').innerHTML = tabelaHTML([
      {naziv:'Artikal', cel: s => `<b>${esc((mapa[s.variant_id] || {}).naziv || kratakId(s.variant_id))}</b>
        <div class="mono" style="font-size:11.5px;color:var(--tekst-3)">${esc((mapa[s.variant_id] || {}).sku || '')}</div>`},
      {naziv:'Sistemsko', klasa:'desno', cel: s => fmtBroj(s.sistemsko, 0)},
      {naziv:'Izbrojano', klasa:'desno kol-uska', cel: s => uToku && mozeP
        ? `<input class="unos" style="text-align:right" data-iz="${escAttr(s.id)}" value="${escAttr(fmtBroj(s.izbrojano, 0))}" inputmode="decimal">`
        : fmtBroj(s.izbrojano, 0)},
      {naziv:'Razlika', klasa:'desno', cel: s => {
        const r = Number(s.izbrojano) - Number(s.sistemsko);
        return r === 0 ? '0' : r > 0 ? `<b class="pozitivno">+${fmtBroj(r, 0)}</b>` : `<b class="negativno">${fmtBroj(r, 0)}</b>`;
      }},
      {naziv:'', klasa:'akcije', cel: s => uToku && mozeP
        ? `<button class="dugme tiho malo" data-ob="${escAttr(s.id)}">${ikona('iks',14)}</button>` : ''}
    ], lista, 'Popis je prazan — dodajte artikle.');

    document.querySelectorAll('[data-iz]').forEach(inp => inp.addEventListener('change', async e => {
      const id = e.target.dataset.iz;
      const v = parsirajBroj(e.target.value);
      const {error: ge} = await sb.from('stock_count_items').update({izbrojano: v}).eq('id', id);
      if (ge) { toast(porukaGreske(ge), 'greska'); return; }
      const s = lista.find(x => x.id === id); s.izbrojano = v;
      nacrtaj(lista);
    }));
    document.querySelectorAll('[data-ob]').forEach(b => b.addEventListener('click', async () => {
      const {error: ge} = await sb.from('stock_count_items').delete().eq('id', b.dataset.ob);
      if (ge) { toast(porukaGreske(ge), 'greska'); return; }
      renderPopisDetalj(el, popisId);
    }));
  };
  nacrtaj(stavke || []);

  if (!(uToku && mozeP)) return;

  el.querySelector('#pd-dodaj').addEventListener('click', () => birajVarijantu(async ({varijanta}) => {
    if ((stavke || []).some(s => s.variant_id === varijanta.id)) { toast('Artikal je već na popisu.', 'greska'); return; }
    const {data: st} = await sb.from('stock').select('kolicina')
      .eq('warehouse_id', popis.warehouse_id).eq('variant_id', varijanta.id).maybeSingle();
    const sistemsko = st ? Number(st.kolicina) : 0;
    const {error: ge} = await sb.from('stock_count_items').insert({
      company_id: Store.firmaId(), stock_count_id: popisId,
      variant_id: varijanta.id, sistemsko, izbrojano: sistemsko});
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    renderPopisDetalj(el, popisId);
  }));

  el.querySelector('#pd-otkazi').addEventListener('click', async () => {
    if (!await potvrdi('Otkazati popis? Uneseni brojevi se čuvaju, ali se ništa ne knjiži.', {tekstDa:'Otkaži popis', opasno:true})) return;
    const {error: ge} = await sb.from('stock_counts').update({status:'otkazan'}).eq('id', popisId);
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    renderPopisDetalj(el, popisId);
  });

  el.querySelector('#pd-zakljuci').addEventListener('click', async () => {
    const {data: sveze} = await sb.from('stock_count_items').select('*').eq('stock_count_id', popisId);
    const saRazlikom = (sveze || []).filter(s => Number(s.izbrojano) !== Number(s.sistemsko));
    // pre-provera: negativna korekcija ne sme oboriti stanje ispod nule
    for (const s of saRazlikom) {
      const razlika = Number(s.izbrojano) - Number(s.sistemsko);
      if (razlika < 0) {
        const {data: st} = await sb.from('stock').select('kolicina')
          .eq('warehouse_id', popis.warehouse_id).eq('variant_id', s.variant_id).maybeSingle();
        if (!st || Number(st.kolicina) + razlika < 0) {
          toast(`Korekcija za „${(mapa[s.variant_id] || {}).naziv || ''}“ bi oborila stanje ispod nule — proverite izbrojano.`, 'greska', 8000);
          return;
        }
      }
    }
    if (!await potvrdi(`Zaključiti popis? Knjiži se ${saRazlikom.length} korekcija.`, {tekstDa:'Zaključi'})) return;
    for (const s of saRazlikom) {
      const razlika = Number(s.izbrojano) - Number(s.sistemsko);
      const {error: ge} = await sb.from('stock_movements').insert({
        company_id: Store.firmaId(), warehouse_id: popis.warehouse_id,
        variant_id: s.variant_id, tip: 'popis_korekcija', kolicina: razlika,
        ref_tip: 'stock_count', ref_id: popisId, napomena: 'Popis'});
      if (ge) { toast('Korekcija nije prošla: ' + porukaGreske(ge), 'greska', 8000); return; }
    }
    const {error: ge} = await sb.from('stock_counts').update({status:'zakljucen'}).eq('id', popisId);
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    toast('Popis je zaključen i korekcije su proknjižene.', 'uspeh');
    renderPopisDetalj(el, popisId);
  });
}

      ${poljeSelectHTML({naziv:'Tip', ime:'tip', vrednost:z.tip,
        opcije: Object.entries(MAGACIN_TIP).map(([v, t]) => ({v, t}))})}
      ${poljeHTML({naziv:'Adresa', ime:'adresa', vrednost:z.adresa || ''})}
      <label class="red-cekbox"><input type="checkbox" name="aktivan" ${z.aktivan ? 'checked' : ''}><span>Aktivan</span></label>
    </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Sačuvaj', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#mag-forma');
        const d = podaciForme(forma);
        if (!d.naziv) { toast('Naziv je obavezan.', 'greska'); return; }
        const zapis = {naziv:d.naziv, tip:d.tip, adresa:d.adresa || null,
          aktivan: forma.querySelector('[name=aktivan]').checked};
        b.disabled = true;
        const rez = nov
          ? await sb.from('warehouses').insert({company_id: Store.firmaId(), ...zapis})
          : await sb.from('warehouses').update(zapis).eq('id', m.id);
        b.disabled = false;
        if (rez.error) { toast(porukaGreske(rez.error), 'greska'); return; }
        r.zatvori(); toast('Magacin je sačuvan.', 'uspeh');
        if (poUspehu) poUspehu();
      }}
    ]
  });
}
/* ============================================================================
   14. MODUL: PORUDŽBINE (F4)
   ============================================================================ */
const poruStanje = {
  lista: {status:'', od:'', do:'', pretraga:'', redovi:[], kraj:false},
  kupci: {pretraga:'', redovi:[], kraj:false},
  otvoriNovu: false
};

const ORDER_PRELAZI = {
  nova:       ['potvrdjena', 'otkazana'],
  potvrdjena: ['spakovana', 'nova', 'otkazana'],
  spakovana:  ['poslata', 'potvrdjena', 'otkazana'],
  poslata:    ['isporucena', 'vracena'],
  isporucena: ['vracena'],
  otkazana:   ['nova'],
  vracena:    []
};

function renderPorudzbine(el, ruta){
  if (!Store.firmaId()) { el.innerHTML = praznoIzaberiFirmu(); return; }
  if (ruta.pod === 'detalj' && ruta.id) { renderPorudzbinaDetalj(el, ruta.id); return; }

  const tabovi = [{id:'lista', naziv:'Porudžbine'}, {id:'kupci', naziv:'Kupci'}];
  const aktivan = tabovi.some(t => t.id === ruta.pod) ? ruta.pod : 'lista';
  el.innerHTML = `
    <div class="sadrzaj-zaglavlje"><h1>Porudžbine</h1></div>
    <div class="tabovi">${tabovi.map(t =>
      `<button class="tab ${t.id === aktivan ? 'aktivan' : ''}" data-tab="${t.id}">${esc(t.naziv)}</button>`).join('')}</div>
    <div id="poru-sadrzaj"></div>`;
  el.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => idiNa('porudzbine', b.dataset.tab)));
  const cilj = document.getElementById('poru-sadrzaj');
  ({lista: tabPorudzbineLista, kupci: tabKupci}[aktivan])(cilj);
}

/* ---------- lista porudžbina ---------- */
async function tabPorudzbineLista(el){
  const mozeO = Store.mozeDaPise('admin', 'operater');
  const f = poruStanje.lista;
  const statusi = pod('statusi', PODRAZUMEVANI_STATUSI).order || PODRAZUMEVANI_STATUSI.order;

  el.innerHTML = `
    <div class="filter-traka">
      <div class="polje"><label>Status</label>
        <select class="unos" id="pl-status"><option value="">Svi</option>
          ${Object.keys(statusi).map(k => `<option value="${k}" ${f.status === k ? 'selected' : ''}>${esc(statusi[k].naziv)}</option>`).join('')}</select></div>
      <div class="polje"><label>Od</label><input class="unos" type="date" id="pl-od" value="${escAttr(f.od)}"></div>
      <div class="polje"><label>Do</label><input class="unos" type="date" id="pl-do" value="${escAttr(f.do)}"></div>
      <div class="polje" style="flex:1;min-width:180px"><label>Pretraga</label>
        <input class="unos" id="pl-pretraga" placeholder="Broj ili ime kupca" value="${escAttr(f.pretraga)}"></div>
      <button class="dugme" id="pl-primeni">Primeni</button>
      ${mozeO ? `<button class="dugme primarno" id="pl-nova">${ikona('plus',16)} Nova porudžbina</button>` : ''}
    </div>
    <div id="pl-lista">${ucitavanjeHTML()}</div>
    <div class="centar mt"><button class="dugme" id="pl-jos" style="display:none">Učitaj još</button></div>`;

  el.querySelector('#pl-primeni').addEventListener('click', () => {
    Object.assign(f, {
      status: el.querySelector('#pl-status').value,
      od: el.querySelector('#pl-od').value,
      do: el.querySelector('#pl-do').value,
      pretraga: el.querySelector('#pl-pretraga').value.trim(),
      redovi: [], kraj: false
    });
    ucitajPorudzbine();
  });
  el.querySelector('#pl-pretraga').addEventListener('keydown', e => {
    if (e.key === 'Enter') el.querySelector('#pl-primeni').click();
  });
  el.querySelector('#pl-jos').addEventListener('click', () => ucitajPorudzbine(true));
  if (mozeO) el.querySelector('#pl-nova').addEventListener('click', () => novaPorudzbina());

  f.redovi = []; f.kraj = false;
  ucitajPorudzbine();
  if (poruStanje.otvoriNovu && mozeO) { poruStanje.otvoriNovu = false; novaPorudzbina(); }
}

async function ucitajPorudzbine(dodaj = false){
  const lista = document.getElementById('pl-lista');
  const jos = document.getElementById('pl-jos');
  if (!lista) return;
  if (!dodaj) lista.innerHTML = ucitavanjeHTML();
  const f = poruStanje.lista;

  let upit = sb.from('orders').select('*')
    .eq('company_id', Store.firmaId())
    .order('created_at', {ascending: false})
    .range(f.redovi.length, f.redovi.length + 24);
  if (f.status) upit = upit.eq('status', f.status);
  if (f.od) upit = upit.gte('created_at', f.od + 'T00:00:00');
  if (f.do) upit = upit.lte('created_at', f.do + 'T23:59:59');
  if (f.pretraga) {
    const like = `%${f.pretraga}%`;
    upit = upit.or(`broj.ilike.${like},kupac_ime.ilike.${like}`);
  }
  const {data, error} = await upit;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  f.redovi = f.redovi.concat(data || []);
  f.kraj = !data || data.length < 25;

  lista.innerHTML = tabelaHTML([
    {naziv:'Broj', cel: o => `<b class="mono">${esc(o.broj)}</b>`},
    {naziv:'Datum', cel: o => fmtDatumVreme(o.created_at)},
    {naziv:'Kupac', cel: o => `${esc(o.kupac_ime || '—')}${o.kupac_mesto ? `<div style="font-size:12px;color:var(--tekst-3)">${esc(o.kupac_mesto)}</div>` : ''}`},
    {naziv:'Status', cel: o => plombaStatusa('order', o.status)},
    {naziv:'Plaćanje', cel: o => redPlacanja(o.nacin_placanja)},
    {naziv:'Iznos', klasa:'desno', cel: o => `<b>${fmtNovac(o.iznos_ukupno)}</b>`},
    {naziv:'', klasa:'akcije', cel: o => `<button class="dugme malo" data-od="${escAttr(o.id)}">Otvori</button>`}
  ], f.redovi, 'Nema porudžbina za izabrane filtere.');
  if (jos) jos.style.display = f.kraj ? 'none' : '';
  lista.querySelectorAll('[data-od]').forEach(b =>
    b.addEventListener('click', () => idiNaDetalj('porudzbine', b.dataset.od)));
}

/* ---------- nova porudžbina ---------- */
async function novaPorudzbina(){
  const [{data: kanali}] = await Promise.all([
    sb.from('sales_channels').select('id,naziv').eq('company_id', Store.firmaId()).eq('aktivan', true).order('created_at')
  ]);
  const stavke = []; // {variant_id, naziv, sku, kolicina, cena, nabavna, pdv, popust}
  let kupacId = null;

  const m = modal({
    naslov: 'Nova porudžbina',
    sirok: true,
    telo: `
      <form id="np-forma">
        <div class="kartica-zaglavlje" style="margin-bottom:8px">
          <h3 style="font-size:14px">Kupac</h3>
          <button type="button" class="dugme malo" id="np-postojeci">${ikona('korisnik',14)} Izaberi postojećeg</button>
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Ime i prezime', ime:'kupac_ime', obavezno:true})}
          ${poljeHTML({naziv:'Telefon', ime:'kupac_telefon'})}
          ${poljeHTML({naziv:'Email', ime:'kupac_email', tip:'email'})}
        </div>
        <div class="red-polja">
          ${poljeHTML({naziv:'Adresa', ime:'kupac_adresa'})}
          ${poljeHTML({naziv:'Mesto', ime:'kupac_mesto'})}
          ${poljeHTML({naziv:'Poštanski broj', ime:'kupac_postanski_broj'})}
        </div>
        <label class="red-cekbox" id="np-sacuvaj-omot"><input type="checkbox" name="sacuvaj_kupca" checked><span>Sačuvaj u adresar kupaca</span></label>

        <div class="kartica-zaglavlje" style="margin:14px 0 8px">
          <h3 style="font-size:14px">Stavke</h3>
          <button type="button" class="dugme malo primarno" id="np-dodaj">${ikona('plus',14)} Dodaj artikal</button>
        </div>
        <div id="np-stavke"></div>

        <div class="red-polja" style="margin-top:14px">
          ${poljeSelectHTML({naziv:'Kanal prodaje', ime:'channel_id',
            opcije: (kanali || []).map(k => ({v:k.id, t:k.naziv}))})}
          ${poljeSelectHTML({naziv:'Način plaćanja', ime:'nacin_placanja', vrednost:'pouzece',
            opcije: Object.entries(NACIN_PLACANJA).map(([v, t]) => ({v, t}))})}
          ${poljeHTML({naziv:'Dostava — naplaćeno kupcu (RSD)', ime:'trosak_dostave_kupac', vrednost:'0', atributi:'inputmode="decimal"'})}
        </div>
        ${poljeHTML({naziv:'Napomena', ime:'napomena'})}
      </form>`,
    akcije: [
      {tekst:'Odustani', klik: r => r.zatvori()},
      {tekst:'Kreiraj porudžbinu', klasa:'primarno', klik: async (r, b) => {
        const forma = r.telo.querySelector('#np-forma');
        const d = podaciForme(forma);
        if (!d.kupac_ime) { toast('Ime kupca je obavezno.', 'greska'); return; }
        if (!stavke.length) { toast('Dodajte bar jednu stavku.', 'greska'); return; }
        b.disabled = true;
        const fid = Store.firmaId();
        if (!kupacId && forma.querySelector('[name=sacuvaj_kupca]').checked) {
          const {data: nk, error: ke} = await sb.from('customers').insert({
            company_id: fid, tip: 'fizicko', ime_prezime: d.kupac_ime,
            telefon: d.kupac_telefon || null, email: d.kupac_email || null,
            adresa: d.kupac_adresa || null, mesto: d.kupac_mesto || null,
            postanski_broj: d.kupac_postanski_broj || null
          }).select().single();
          if (ke) { toast('Kupac nije sačuvan: ' + porukaGreske(ke), 'greska'); }
          else kupacId = nk.id;
        }
        const {data: o, error} = await sb.from('orders').insert({
          company_id: fid, broj: '', customer_id: kupacId,
          channel_id: d.channel_id || null, nacin_placanja: d.nacin_placanja,
          kupac_ime: d.kupac_ime, kupac_telefon: d.kupac_telefon || null,
          kupac_email: d.kupac_email || null, kupac_adresa: d.kupac_adresa || null,
          kupac_mesto: d.kupac_mesto || null, kupac_postanski_broj: d.kupac_postanski_broj || null,
          trosak_dostave_kupac: parsirajBroj(d.trosak_dostave_kupac),
          napomena: d.napomena || null
        }).select().single();
        if (error) { b.disabled = false; toast(porukaGreske(error), 'greska', 7000); return; }
        const {error: se} = await sb.from('order_items').insert(stavke.map(s => ({
          company_id: fid, order_id: o.id, variant_id: s.variant_id,
          naziv_snapshot: s.naziv, sku_snapshot: s.sku || null,
          kolicina: s.kolicina, cena: s.cena,
          nabavna_cena_snapshot: s.nabavna, pdv_stopa: s.pdv, popust_procenat: s.popust
        })));
        b.disabled = false;
        if (se) { toast('Porudžbina je kreirana, ali stavke nisu: ' + porukaGreske(se), 'greska', 8000); }
        r.zatvori();
        toast(`Porudžbina ${o.broj} je kreirana.`, 'uspeh');
        idiNaDetalj('porudzbine', o.id);
      }}
    ]
  });

  const nacrtajStavke = () => {
    const omot = m.telo.querySelector('#np-stavke');
    if (!stavke.length) { omot.innerHTML = '<div class="prazno" style="padding:14px"><p>Još nema stavki.</p></div>'; return; }
    const zbir = stavke.reduce((a, s) => a + s.kolicina * s.cena * (1 - s.popust / 100), 0);
    omot.innerHTML = `<div class="omot-tabele"><table class="tabela"><thead><tr>
        <th>Artikal</th><th class="desno kol-uska">Kol.</th><th class="desno kol-srednja">Cena</th>
        <th class="desno kol-uska">Popust %</th><th class="desno">Ukupno</th><th></th>
      </tr></thead><tbody>
      ${stavke.map((s, i) => `<tr>
        <td>${esc(s.naziv)}${s.sku ? `<div class="mono" style="font-size:11.5px;color:var(--tekst-3)">${esc(s.sku)}</div>` : ''}</td>
        <td class="desno"><input class="unos" style="text-align:right" data-k="${i}" value="${escAttr(fmtBroj(s.kolicina, 0))}" inputmode="decimal"></td>
        <td class="desno"><input class="unos" style="text-align:right" data-c="${i}" value="${escAttr(fmtBroj(s.cena))}" inputmode="decimal"></td>
        <td class="desno"><input class="unos" style="text-align:right" data-p="${i}" value="${escAttr(fmtBroj(s.popust, 0))}" inputmode="decimal"></td>
        <td class="desno"><b>${fmtNovac(s.kolicina * s.cena * (1 - s.popust / 100))}</b></td>
        <td class="akcije"><button type="button" class="dugme tiho malo" data-x="${i}">${ikona('iks',14)}</button></td>
      </tr>`).join('')}
      </tbody></table></div>
      <div class="zbir-red"><span>Stavke: <b>${fmtNovac(zbir)}</b></span></div>`;
    omot.querySelectorAll('[data-k]').forEach(inp => inp.addEventListener('change', e => {
      stavke[Number(e.target.dataset.k)].kolicina = Math.max(0.001, parsirajBroj(e.target.value) || 1); nacrtajStavke();
    }));
    omot.querySelectorAll('[data-c]').forEach(inp => inp.addEventListener('change', e => {
      stavke[Number(e.target.dataset.c)].cena = Math.max(0, parsirajBroj(e.target.value)); nacrtajStavke();
    }));
    omot.querySelectorAll('[data-p]').forEach(inp => inp.addEventListener('change', e => {
      stavke[Number(e.target.dataset.p)].popust = Math.min(100, Math.max(0, parsirajBroj(e.target.value))); nacrtajStavke();
    }));
    omot.querySelectorAll('[data-x]').forEach(b => b.addEventListener('click', () => {
      stavke.splice(Number(b.dataset.x), 1); nacrtajStavke();
    }));
  };
  nacrtajStavke();

  m.telo.querySelector('#np-dodaj').addEventListener('click', () => birajVarijantu(({varijanta, proizvod}) => {
    stavke.push({
      variant_id: varijanta.id,
      naziv: nazivVarijante(proizvod, varijanta),
      sku: varijanta.sku || proizvod.sku || '',
      kolicina: 1,
      cena: efektivno(varijanta, proizvod, 'prodajna_cena'),
      nabavna: efektivno(varijanta, proizvod, 'nabavna_cena'),
      pdv: Number(proizvod.pdv_stopa ?? 20),
      popust: 0
    });
    nacrtajStavke();
  }));

  m.telo.querySelector('#np-postojeci').addEventListener('click', () => birajKupca(k => {
    kupacId = k.id;
    const forma = m.telo.querySelector('#np-forma');
    forma.querySelector('[name=kupac_ime]').value = k.ime_prezime || '';
    forma.querySelector('[name=kupac_telefon]').value = k.telefon || '';
    forma.querySelector('[name=kupac_email]').value = k.email || '';
    forma.querySelector('[name=kupac_adresa]').value = k.adresa || '';
    forma.querySelector('[name=kupac_mesto]').value = k.mesto || '';
    forma.querySelector('[name=kupac_postanski_broj]').value = k.postanski_broj || '';
    m.telo.querySelector('#np-sacuvaj-omot').style.display = 'none';
    toast('Kupac je izabran iz adresara.', 'uspeh');
  }));
}

      {naziv:'Popust', klasa:'desno kol-uska', cel: s => jeNova && mozeO
        ? `<input class="unos" style="text-align:right" data-sp="${escAttr(s.id)}" value="${escAttr(fmtBroj(s.popust_procenat, 0))}" inputmode="decimal">` : fmtBroj(s.popust_procenat, 0) + '%'},
      {naziv:'PDV', klasa:'desno', cel: s => fmtBroj(s.pdv_stopa, 0) + '%'},
      {naziv:'Ukupno', klasa:'desno', cel: s => `<b>${fmtNovac(s.kolicina * s.cena * (1 - s.popust_procenat / 100))}</b>`},
      {naziv:'', klasa:'akcije', cel: s => jeNova && mozeO
        ? `<button class="dugme tiho malo" data-sx="${escAttr(s.id)}">${ikona('iks',14)}</button>` : ''}
    ], stavke || [], 'Porudžbina nema stavki.');

    const azuriraj = async (id, polja) => {
      const {error: ge} = await sb.from('order_items').update(polja).eq('id', id);
      if (ge) { toast(porukaGreske(ge), 'greska'); return; }
      renderPorudzbinaDetalj(el, oid);
    };
    document.querySelectorAll('[data-sk]').forEach(i => i.addEventListener('change', e =>
      azuriraj(e.target.dataset.sk, {kolicina: Math.max(0.001, parsirajBroj(e.target.value) || 1)})));
    document.querySelectorAll('[data-sc]').forEach(i => i.addEventListener('change', e =>
      azuriraj(e.target.dataset.sc, {cena: Math.max(0, parsirajBroj(e.target.value))})));
    document.querySelectorAll('[data-sp]').forEach(i => i.addEventListener('change', e =>
      azuriraj(e.target.dataset.sp, {popust_procenat: Math.min(100, Math.max(0, parsirajBroj(e.target.value)))})));
    document.querySelectorAll('[data-sx]').forEach(b => b.addEventListener('click', async () => {
      if (!await potvrdi('Ukloniti stavku?', {tekstDa:'Ukloni', opasno:true})) return;
      const {error: ge} = await sb.from('order_items').delete().eq('id', b.dataset.sx);
      if (ge) { toast(porukaGreske(ge), 'greska'); return; }
      renderPorudzbinaDetalj(el, oid);
    }));
  };
  nacrtajStavke();

  // pošiljke porudžbine
  document.getElementById('od-posiljke').innerHTML = (posiljke && posiljke.length)
    ? posiljke.map(p => `<div class="rezultat-stavka" data-ps="${escAttr(p.id)}">
        <div><b class="mono">${esc(p.tracking_broj || 'bez broja')}</b>
          <div style="font-size:12px;color:var(--tekst-3)">${fmtDatum(p.created_at)} · otkupnina ${fmtNovac(p.otkupni_iznos)}</div></div>
        <div>${plombaStatusa('shipment', p.status)}</div>
      </div>`).join('')
    : '<p style="color:var(--tekst-3);font-size:13px">Još nema pošiljki.</p>';
  document.querySelectorAll('[data-ps]').forEach(d =>
    d.addEventListener('click', () => idiNaDetalj('posiljke', d.dataset.ps)));

  // istorija
  const korisnici = {};
  if (log && log.length) {
    const {data: us} = await sb.from('users').select('id,ime_prezime,email').eq('company_id', Store.firmaId());
    (us || []).forEach(u => korisnici[u.id] = u.ime_prezime || u.email);
  }
  document.getElementById('od-log').innerHTML = (log && log.length)
    ? log.map(l => `<div style="padding:7px 0;border-bottom:1px dashed var(--linija);font-size:13px">
        ${l.iz_statusa ? plombaStatusa('order', l.iz_statusa) + ' → ' : ''}${plombaStatusa('order', l.u_status)}
        <div style="color:var(--tekst-3);font-size:11.5px;margin-top:3px">${fmtDatumVreme(l.created_at)} · ${esc(l.user_id ? (korisnici[l.user_id] || 'korisnik') : 'sistem')}${l.napomena ? ' · ' + esc(l.napomena) : ''}</div>
      </div>`).join('')
    : '<p style="color:var(--tekst-3);font-size:13px">Nema zabeleženih promena.</p>';

  // akcije
  el.querySelectorAll('[data-prelaz]').forEach(b => b.addEventListener('click', () =>
    promeniStatusPorudzbine(o, stavke || [], b.dataset.prelaz, () => renderPorudzbinaDetalj(el, oid))));
  const dost = document.getElementById('od-dostava');
  if (dost) dost.addEventListener('change', async e => {
    const {error: ge} = await sb.from('orders').update({trosak_dostave_kupac: Math.max(0, parsirajBroj(e.target.value))}).eq('id', oid);
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    renderPorudzbinaDetalj(el, oid);
  });
  const bp = document.getElementById('od-posiljka');
  if (bp) bp.addEventListener('click', () => kreirajPosiljku(o, () => renderPorudzbinaDetalj(el, oid)));
  const bv = document.getElementById('od-povrat');
  if (bv) bv.addEventListener('click', () => noviPovrat(o, () => renderPorudzbinaDetalj(el, oid)));
  const bk = document.getElementById('od-kupac');
  if (bk) bk.addEventListener('click', () => urediKupcaPorudzbine(o, () => renderPorudzbinaDetalj(el, oid)));
  const bd = document.getElementById('od-dodaj');
  if (bd) bd.addEventListener('click', () => birajVarijantu(async ({varijanta, proizvod}) => {
    const {error: ge} = await sb.from('order_items').insert({
      company_id: Store.firmaId(), order_id: oid, variant_id: varijanta.id,
      naziv_snapshot: nazivVarijante(proizvod, varijanta),
      sku_snapshot: varijanta.sku || proizvod.sku || null,
      kolicina: 1, cena: efektivno(varijanta, proizvod, 'prodajna_cena'),
      nabavna_cena_snapshot: efektivno(varijanta, proizvod, 'nabavna_cena'),
      pdv_stopa: Number(proizvod.pdv_stopa ?? 20)});
    if (ge) { toast(porukaGreske(ge), 'greska'); return; }
    renderPorudzbinaDetalj(el, oid);
  }));
  const bs = document.getElementById('od-slobodna');
  if (bs) bs.addEventListener('click', () => {
    modal({
      naslov: 'Slobodna stavka',
      telo: `<form id="ss-forma">
        ${poljeHTML({naziv:'Naziv', ime:'naziv', obavezno:true, placeholder:'npr. Usluga montaže'})}
        <div class="red-polja">
          ${poljeHTML({naziv:'Količina', ime:'kolicina', vrednost:'1', atributi:'inputmode="decimal"'})}
          ${poljeHTML({naziv:'Cena (RSD)', ime:'cena', vrednost:'0', atributi:'inputmode="decimal"'})}
        </div></form>`,
      akcije: [
        {tekst:'Odustani', klik: r => r.zatvori()},
        {tekst:'Dodaj', klasa:'primarno', klik: async (r, b2) => {
          const d = podaciForme(r.telo.querySelector('#ss-forma'));
          if (!d.naziv) { toast('Naziv je obavezan.', 'greska'); return; }
          b2.disabled = true;
          const {error: ge} = await sb.from('order_items').insert({
            company_id: Store.firmaId(), order_id: oid, variant_id: null,
            naziv_snapshot: d.naziv, kolicina: Math.max(0.001, parsirajBroj(d.kolicina) || 1),
            cena: Math.max(0, parsirajBroj(d.cena)), nabavna_cena_snapshot: 0,
            pdv_stopa: Number(pod('pdv', {podrazumevana_stopa:20}).podrazumevana_stopa ?? 20)});
          b2.disabled = false;
          if (ge) { toast(porukaGreske(ge), 'greska'); return; }

        }}

}

      </div>
      <div class="red-polja">

        ${poljeHTML({naziv:'Mesto', ime:'kupac_mesto', vrednost:o.kupac_mesto || ''})}

/* ---------- prelazi statusa + choreografija zaliha ---------- */
async function promeniStatusPorudzbine(o, stavke, uStatus, poUspehu){
  const dozvoljeni = ORDER_PRELAZI[o.status] || [];
  if (!dozvoljeni.includes(uStatus)) { toast('Ovaj prelaz statusa nije dozvoljen.', 'greska'); return; }
  const varStavke = (stavke || []).filter(s => s.variant_id);
  const postavke = pod('zalihe', {rezervisi_pri_potvrdi: true});

  const samoStatus = async (napomena) => {
    const {error} = await sb.from('orders').update({status: uStatus}).eq('id', o.id);
    if (error) { toast(porukaGreske(error), 'greska', 7000); return false; }
    toast(`Status: ${statusInfo('order', uStatus).naziv}${napomena ? ' · ' + napomena : ''}.`, 'uspeh');
    if (poUspehu) poUspehu();
    return true;
  };

  // otpust svih otvorenih rezervacija (otkaz / vraćanje u „nova“)
  const otpustiSve = async () => {
    const rez = await otvoreneRezervacije(o.id);
    for (const kljuc of Object.keys(rez)) {
      const [wid, vid] = kljuc.split('|');
      const {error} = await sb.from('stock_movements').insert({
        company_id: Store.firmaId(), warehouse_id: wid, variant_id: vid,
        tip: 'otpust', kolicina: rez[kljuc], ref_tip: 'order', ref_id: o.id, napomena: o.broj});
      if (error) { toast('Otpust rezervacije nije prošao: ' + porukaGreske(error), 'greska', 8000); return false; }
    }
    return true;
  };

  // POTVRDA: opciona rezervacija zaliha
  if (o.status === 'nova' && uStatus === 'potvrdjena' && postavke.rezervisi_pri_potvrdi && varStavke.length) {
    const magacini = await aktivniMagacini();
    if (!magacini.length) { await samoStatus('bez rezervacije (nema magacina)'); return; }
    modal({
      naslov: 'Potvrda porudžbine',
      telo: `
        ${infoTraka('info', `Rezerviše se ${varStavke.length} stavki — dostupna količina se umanjuje, roba ostaje na stanju do slanja.`)}
        <form id="rz-forma">
          ${poljeSelectHTML({naziv:'Magacin za rezervaciju', ime:'warehouse_id',
            opcije: magacini.map(x => ({v: x.id, t: x.naziv}))})}
          <label class="red-cekbox"><input type="checkbox" name="preskoci"><span>Preskoči rezervaciju (dropshipping / roba nije na stanju)</span></label>
        </form>`,
      akcije: [
        {tekst:'Odustani', klik: r => r.zatvori()},
        {tekst:'Potvrdi porudžbinu', klasa:'primarno', klik: async (r, b) => {
          const forma = r.telo.querySelector('#rz-forma');
          const preskoci = forma.querySelector('[name=preskoci]').checked;
          const wid = forma.querySelector('[name=warehouse_id]').value;
          b.disabled = true;
          if (!preskoci) {
            for (const s of varStavke) {
              const {error} = await sb.from('stock_movements').insert({
                company_id: Store.firmaId(), warehouse_id: wid, variant_id: s.variant_id,
                tip: 'rezervacija', kolicina: Number(s.kolicina),
                ref_tip: 'order', ref_id: o.id, napomena: o.broj});
              if (error) { b.disabled = false; toast(porukaGreske(error), 'greska', 8000); return; }
            }
          }
          b.disabled = false; r.zatvori();
          await samoStatus(preskoci ? 'bez rezervacije' : 'zalihe rezervisane');
        }}
      ]
    });
    return;
  }

  // SLANJE: otpust rezervacija + izlaz sa stanja
  if (uStatus === 'poslata' && varStavke.length) {
    const magacini = await aktivniMagacini();
    const rez = await otvoreneRezervacije(o.id);
    const rezPoVar = {}; // vid -> {wid, kol}
    Object.keys(rez).forEach(k => {
      const [wid, vid] = k.split('|');
      rezPoVar[vid] = {wid, kol: rez[k]};
    });
    modal({
      naslov: 'Slanje porudžbine',
      telo: `
        <form id="sl-forma">
          ${magacini.length ? poljeSelectHTML({naziv:'Magacin razduženja (za stavke bez rezervacije)', ime:'warehouse_id',
            opcije: magacini.map(x => ({v: x.id, t: x.naziv})),
            vrednost: Object.values(rezPoVar)[0] ? Object.values(rezPoVar)[0].wid : ''}) : ''}
          <label class="red-cekbox"><input type="checkbox" name="preskoci" ${!magacini.length ? 'checked' : ''}><span>Preskoči promet zaliha (dropshipping — roba ne ide sa našeg stanja)</span></label>
        </form>
        ${infoTraka('info','Razduženje: za svaku stavku se otpušta rezervacija (ako postoji) i knjiži izlaz. Ako stanja nema dovoljno, prelaz se prekida.')}`,
      akcije: [
        {tekst:'Odustani', klik: r => r.zatvori()},
        {tekst:'Pošalji', klasa:'primarno', klik: async (r, b) => {
          const forma = r.telo.querySelector('#sl-forma');
          const preskoci = forma.querySelector('[name=preskoci]').checked;
          const podrazumevaniW = magacini.length ? forma.querySelector('[name=warehouse_id]').value : null;
          b.disabled = true;
          if (!preskoci) {
            for (const s of varStavke) {
              const kol = Number(s.kolicina);
              const r0 = rezPoVar[s.variant_id];
              const wid = r0 ? r0.wid : podrazumevaniW;
              if (!wid) { b.disabled = false; toast('Nema magacina za razduženje.', 'greska'); return; }
              if (r0 && r0.kol > 0) {
                const otp = Math.min(kol, r0.kol);
                const {error: e1} = await sb.from('stock_movements').insert({
                  company_id: Store.firmaId(), warehouse_id: wid, variant_id: s.variant_id,
                  tip: 'otpust', kolicina: otp, ref_tip: 'order', ref_id: o.id, napomena: o.broj});
                if (e1) { b.disabled = false; toast(porukaGreske(e1), 'greska', 8000); return; }
                r0.kol -= otp;
              }
              const {error: e2} = await sb.from('stock_movements').insert({
                company_id: Store.firmaId(), warehouse_id: wid, variant_id: s.variant_id,
                tip: 'izlaz', kolicina: kol, ref_tip: 'order', ref_id: o.id, napomena: o.broj});
              if (e2) {
                b.disabled = false;
                toast(`Razduženje „${s.naziv_snapshot}“ nije prošlo: ${porukaGreske(e2)} Prelaz je prekinut.`, 'greska', 9000);
                return;
              }
            }
          }
          b.disabled = false; r.zatvori();
          await samoStatus(preskoci ? 'bez razduženja' : 'zalihe razdužene');
        }}
      ]
    });
    return;
  }

  // OTKAZ ili VRAĆANJE U „NOVA“: oslobodi rezervacije
  if ((uStatus === 'otkazana' && ['potvrdjena', 'spakovana'].includes(o.status)) ||
      (uStatus === 'nova' && o.status === 'potvrdjena')) {
    if (uStatus === 'otkazana' && !await potvrdi(`Otkazati porudžbinu ${o.broj}? Otvorene rezervacije se oslobađaju.`, {tekstDa:'Otkaži', opasno:true})) return;
    if (!await otpustiSve()) return;
    await samoStatus('rezervacije oslobođene');
    return;
  }
  if (uStatus === 'otkazana') {
    if (!await potvrdi(`Otkazati porudžbinu ${o.broj}?`, {tekstDa:'Otkaži', opasno:true})) return;
    await samoStatus(); return;
  }
  await samoStatus();
}

/* ---------- kupci ---------- */
async function tabKupci(el){
  const mozeO = Store.mozeDaPise('admin', 'operater');
  const f = poruStanje.kupci;
  el.innerHTML = `
    <div class="filter-traka">
      <div class="polje" style="flex:1;min-width:220px"><label>Pretraga</label>
        <input class="unos" id="ku-pretraga" placeholder="Ime, telefon ili email" value="${escAttr(f.pretraga)}"></div>
      ${mozeO ? `<button class="dugme primarno" id="ku-novi">${ikona('plus',16)} Novi kupac</button>` : ''}
    </div>
    <div id="ku-lista">${ucitavanjeHTML()}</div>
    <div class="centar mt"><button class="dugme" id="ku-jos" style="display:none">Učitaj još</button></div>`;
  el.querySelector('#ku-pretraga').addEventListener('input', debounce(e => {
    f.pretraga = e.target.value.trim(); f.redovi = []; f.kraj = false; ucitajKupce();
  }, 350));
  el.querySelector('#ku-jos').addEventListener('click', () => ucitajKupce(true));
  if (mozeO) el.querySelector('#ku-novi').addEventListener('click', () => urediKupca(null, () => { f.redovi = []; ucitajKupce(); }));
  f.redovi = []; f.kraj = false;
  ucitajKupce();
}

async function ucitajKupce(dodaj = false){
  const lista = document.getElementById('ku-lista');
  const jos = document.getElementById('ku-jos');
  if (!lista) return;
  if (!dodaj) lista.innerHTML = ucitavanjeHTML();
  const f = poruStanje.kupci;
  let upit = sb.from('customers').select('*')
    .eq('company_id', Store.firmaId())
    .order('created_at', {ascending: false})
    .range(f.redovi.length, f.redovi.length + 24);
  if (f.pretraga) {
    const like = `%${f.pretraga}%`;
    upit = upit.or(`ime_prezime.ilike.${like},telefon.ilike.${like},email.ilike.${like}`);
  }
  const {data, error} = await upit;
  if (error) { lista.innerHTML = infoTraka('upozorenje', esc(porukaGreske(error))); return; }
  f.redovi = f.redovi.concat(data || []);
  f.kraj = !data || data.length < 25;
  const mozeO = Store.mozeDaPise('admin', 'operater');

  lista.innerHTML = tabelaHTML([
    {naziv:'Kupac', cel: k => `<b>${esc(k.ime_prezime)}</b>${k.tip === 'pravno' ? ' <span class="cip">pravno</span>' : ''}`},
    {naziv:'Telefon', cel: k => esc(k.telefon || '—')},
    {naziv:'Email', cel: k => esc(k.email || '—')},
    {naziv:'Mesto', cel: k => esc(k.mesto || '—')},
    {naziv:'Dodat', cel: k => fmtDatum(k.created_at)},
    {naziv:'', klasa:'akcije', cel: k => `
      <button class="dugme malo" data-kd="${escAttr(k.id)}">Porudžbine</button>
      ${mozeO ? `<button class="dugme tiho malo" data-ku="${escAttr(k.id)}">${ikona('olovka',15)}</button>` : ''}`}
  ], f.redovi, 'Nema kupaca.');
  if (jos) jos.style.display = f.kraj ? 'none' : '';
  lista.querySelectorAll('[data-ku]').forEach(b => b.addEventListener('click', () =>
    urediKupca(f.redovi.find(x => x.id === b.dataset.ku), () => { f.redovi = []; ucitajKupce(); })));
  lista.querySelectorAll('[data-kd]').forEach(b => b.addEventListener('click', () =>
    kupacDetalj(f.redovi.find(x => x.id === b.dataset.kd))));
}

async function kupacDetalj(k){
  const m = modal({
    naslov: k.ime_prezime,
    telo: `
      <dl class="kv">
        <dt>Telefon</dt><dd>${esc(k.telefon || '—')}</dd>
        <dt>Email</dt><dd>${esc(k.email || '—')}</dd>
        <dt>Adresa</dt><dd>${esc([k.adresa, k.postanski_broj, k.mesto].filter(Boolean).join(', ') || '—')}</dd>
        ${k.tip === 'pravno' ? `<dt>PIB / MB</dt><dd class="mono">${esc(k.pib || '—')} / ${esc(k.maticni_broj || '—')}</dd>` : ''}
        ${k.napomena ? `<dt>Napomena</dt><dd>${esc(k.napomena)}</dd>` : ''}
      </dl>
      <h3 style="margin:14px 0 8px;font-size:14px">Poslednje porudžbine</h3>
      <div id="kd-porudzbine">${ucitavanjeHTML()}</div>`,
    akcije: [{tekst:'Zatvori', klasa:'primarno', klik: r => r.zatvori()}]
  });
  const {data} = await sb.from('orders').select('id,broj,created_at,status,iznos_ukupno')
    .eq('customer_id', k.id).order('created_at', {ascending: false}).limit(5);
  const omot = m.telo.querySelector('#kd-porudzbine');
  omot.innerHTML = (data && data.length)
    ? data.map(o => `<div class="rezultat-stavka" data-op="${escAttr(o.id)}">
        <div><b class="mono">${esc(o.broj)}</b> <span style="color:var(--tekst-3);font-size:12px">${fmtDatum(o.created_at)}</span></div>
        <div style="display:flex;gap:10px;align-items:center">${plombaStatusa('order', o.status)}<b>${fmtNovac(o.iznos_ukupno)}</b></div>
      </div>`).join('')
    : '<p style="color:var(--tekst-3);font-size:13px">Nema porudžbina.</p>';
  omot.querySelectorAll('[data-op]').forEach(d => d.addEventListener('click', () => {

}
